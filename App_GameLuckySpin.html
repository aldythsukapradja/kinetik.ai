<!DOCTYPE html>
<html lang="en">
<head>

<title>Lucky Spin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#2a1830; --ink-dim:#73617e; --ink-faint:#a896b2;
  --card:#ffffff; --line:rgba(42,24,48,.09); --line-2:rgba(42,24,48,.15);
  --pink:#FF4D9D; --pink-d:#D11C6E; --pink-s:#FFE0EE;
  --gold:#F5A623; --gold-d:#D98A0E; --gold-s:#FFEAC2;
  --mint:#18B981; --mint-d:#0E8C61; --mint-s:#D2F4E6;
  --violet:#6C5CE7; --violet-d:#5343C8; --violet-s:#E6E1FF;
  --sky:#2E9BF0; --sky-d:#1A7FCE; --sky-s:#D7ECFD;
  --coral:#FF5A5A; --coral-d:#DD3B3B; --coral-s:#FFDCDC;
  --display:'Baloo 2',system-ui,sans-serif;
  --body:'Nunito',system-ui,sans-serif;
  --shadow:0 12px 34px rgba(120,40,90,.14);
  --shadow-sm:0 6px 18px rgba(120,40,90,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);
  background:radial-gradient(1100px 700px at 85% -8%, var(--pink-s), transparent 55%),radial-gradient(900px 700px at -8% 108%, var(--violet-s), transparent 52%),linear-gradient(165deg,#fdf3f9,#f7f1fc 60%,#fff6ee);
  background-attachment:fixed;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.screen{flex:1;display:none;flex-direction:column;animation:fade .4s ease}
.screen.on{display:flex}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:19px;color:var(--ink)}
.logo{width:34px;height:34px;border-radius:11px;background:conic-gradient(from 0deg,var(--pink),var(--gold),var(--mint),var(--sky),var(--violet),var(--pink));display:grid;place-items:center;box-shadow:0 8px 18px rgba(255,77,157,.4);position:relative}
.logo::after{content:"";position:absolute;width:11px;height:11px;border-radius:50%;background:#fff}
.wallet{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);padding:8px 15px;border-radius:99px;font-family:var(--display);font-weight:700;font-size:15px;box-shadow:var(--shadow-sm)}
.coin{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE9A8,var(--gold) 58%,var(--gold-d));display:grid;place-items:center;font-size:11px;color:#7a5600;box-shadow:0 2px 5px rgba(217,138,14,.45)}
.scroll{flex:1;overflow-y:auto;padding:4px 20px 26px}
.hero{position:relative;border-radius:28px;padding:24px 22px;overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow);background:linear-gradient(135deg,#FF4D9D,#A24BE0 60%,#FF9A3D)}
.hero h1{font-family:var(--display);font-weight:800;font-size:33px;line-height:1;color:#fff;letter-spacing:.3px;margin-bottom:7px;position:relative;z-index:2}
.hero p{color:rgba(255,255,255,.94);font-size:14px;font-weight:600;max-width:23ch;line-height:1.45;position:relative;z-index:2}
.hero .spinmark{position:absolute;right:-18px;bottom:-22px;width:130px;height:130px;z-index:1;opacity:.95;animation:slowspin 14s linear infinite}
@keyframes slowspin{to{transform:rotate(360deg)}}
.section-h{font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-faint);margin:20px 4px 12px}
.opts{display:flex;gap:11px;flex-wrap:wrap}
.opt{flex:1;min-width:90px;background:var(--card);border:2px solid transparent;border-radius:17px;padding:13px 9px;text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .15s,border-color .2s}
.opt:active{transform:scale(.96)}
.opt.sel{border-color:var(--pink)}
.opt .ot{font-family:var(--display);font-weight:700;font-size:14.5px}
.opt .od{font-size:11px;color:var(--ink-dim);font-weight:600;margin-top:1px}
.opt .oe{font-size:22px;display:block;margin-bottom:5px}
.play-btn{margin-top:24px;width:100%;border:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:20px;color:#fff;padding:19px;border-radius:21px;background:linear-gradient(135deg,#FF6FB1,var(--pink) 55%,var(--pink-d));box-shadow:0 14px 30px rgba(209,28,110,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s}
.play-btn:active{transform:translateY(2px) scale(.99)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm)}
.stat .sv{font-family:var(--display);font-weight:800;font-size:23px;color:var(--pink-d)}
.stat .sl{font-size:11px;color:var(--ink-faint);font-weight:700;margin-top:1px;letter-spacing:.3px}
.game-top{padding:13px 18px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.icon-btn{width:42px;height:42px;border-radius:14px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:19px;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-sm)}
.icon-btn:active{transform:scale(.92)}
.scorebar{display:flex;gap:7px;flex:1;justify-content:center;flex-wrap:wrap}
.pchip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);padding:6px 12px 6px 6px;border-radius:99px;font-size:13px;font-weight:700;box-shadow:var(--shadow-sm);opacity:.55;transition:opacity .25s,box-shadow .25s,transform .25s}
.pchip.active{opacity:1;box-shadow:0 0 0 2.5px var(--pc),0 6px 16px rgba(120,40,90,.18);transform:translateY(-1px)}
.pchip .dot{width:24px;height:24px;border-radius:50%;background:var(--pc);display:grid;place-items:center;font-size:13px}
.pchip .sc{font-family:var(--display);font-weight:800;color:var(--pc-d)}
.round-tag{text-align:center;font-family:var(--display);font-weight:700;color:var(--ink-faint);font-size:13px;padding:4px 0 0}
.wheel-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 16px 0;position:relative}
.wheel-wrap{position:relative;width:min(86vw,360px);height:min(86vw,360px);margin:4px 0}
.wheel-wrap canvas{width:100%;height:100%;display:block;border-radius:50%;box-shadow:0 18px 50px rgba(120,40,90,.28),0 0 0 8px #fff,0 0 0 10px rgba(42,24,48,.07)}
.pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:5;filter:drop-shadow(0 3px 3px rgba(0,0,0,.25))}
.hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;background:#fff;z-index:4;display:grid;place-items:center;box-shadow:0 4px 14px rgba(0,0,0,.2);border:3px solid #fff}
.hub span{font-size:24px}
.predict{margin-top:8px;width:100%;max-width:380px}
.predict-h{text-align:center;font-family:var(--display);font-weight:700;font-size:13px;color:var(--ink-dim);margin-bottom:8px}
.pred-row{display:flex;gap:8px}
.pred{flex:1;background:var(--card);border:2px solid transparent;border-radius:14px;padding:9px 4px;text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s,border-color .2s}
.pred:active{transform:scale(.95)}
.pred.sel{border-color:var(--c)}
.pred .pe{font-size:19px;display:block}
.pred .pn{font-size:11px;font-weight:800;font-family:var(--display);margin-top:1px}
.pred .pp{font-size:10px;color:var(--ink-faint);font-weight:700}
.dock{padding:14px 18px calc(18px + env(safe-area-inset-bottom));display:flex;justify-content:center}
.spin-btn{width:100%;max-width:380px;border:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:22px;color:#fff;padding:18px;border-radius:20px;background:linear-gradient(135deg,#FF6FB1,var(--pink) 55%,var(--pink-d));box-shadow:0 14px 30px rgba(209,28,110,.42);transition:transform .15s;letter-spacing:.5px}
.spin-btn:active{transform:translateY(2px) scale(.99)}
.spin-btn:disabled{opacity:.45;pointer-events:none}
.lobby{flex:1;overflow-y:auto;padding:6px 20px 26px}
.lobby-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
.code-box{text-align:center;padding:18px;background:linear-gradient(135deg,var(--pink-s),var(--violet-s));border-radius:18px;margin:6px 0 14px}
.code-box .cl{font-size:12px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:1px}
.code-box .cc{font-family:var(--display);font-weight:800;font-size:42px;letter-spacing:6px;color:var(--pink-d);margin-top:4px}
.field{width:100%;border:2px solid var(--line-2);border-radius:15px;padding:15px;font-family:var(--display);font-weight:700;font-size:18px;text-align:center;letter-spacing:3px;text-transform:uppercase;color:var(--ink);background:#fff;outline:none}
.field:focus{border-color:var(--pink)}
.lobby-list{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.lobby-p{display:flex;align-items:center;gap:11px;background:#faf5f9;border-radius:14px;padding:11px 14px;font-weight:700}
.lobby-p .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;border:2px solid #fff;box-shadow:var(--shadow-sm)}
.lobby-p .me{margin-left:auto;font-size:11px;color:var(--ink-faint);font-weight:700}
.status{text-align:center;font-weight:700;color:var(--ink-dim);font-size:13.5px;padding:8px}
.scrim{position:fixed;inset:0;background:rgba(42,24,48,.45);backdrop-filter:blur(6px);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:0;animation:fade .25s}
.scrim.on{display:flex}
@media(min-width:520px){.scrim{align-items:center;padding:22px}}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:28px 28px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -10px 50px rgba(42,24,48,.25);animation:up .35s cubic-bezier(.34,1.4,.5,1)}
@media(min-width:520px){.sheet{border-radius:28px}}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.mg-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-weight:700;font-size:12px;letter-spacing:.4px;text-transform:uppercase;padding:7px 14px;border-radius:99px;margin-bottom:14px;color:#fff}
.mg-title{font-family:var(--display);font-weight:800;font-size:24px;line-height:1.2;margin-bottom:6px}
.mg-sub{color:var(--ink-dim);font-weight:600;font-size:13.5px;margin-bottom:18px}
.mg-q{font-family:var(--display);font-weight:800;font-size:34px;text-align:center;margin:6px 0 20px;color:var(--ink)}
.answers{display:flex;flex-direction:column;gap:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ans{text-align:center;background:#f6f1fa;border:2px solid transparent;border-radius:16px;padding:16px;font-family:var(--display);font-size:20px;font-weight:800;color:var(--ink);cursor:pointer;transition:transform .12s,border-color .2s,background .2s}
.ans:active{transform:scale(.97)}
.ans.correct{border-color:var(--mint);background:var(--mint-s);color:var(--mint-d)}
.ans.wrong{border-color:var(--coral);background:var(--coral-s);color:var(--coral-d)}
.ans.lock{pointer-events:none}
.tf-row{display:flex;gap:12px}
.tf{flex:1;border:none;border-radius:18px;padding:22px;font-family:var(--display);font-weight:800;font-size:20px;color:#fff;cursor:pointer;transition:transform .12s}
.tf:active{transform:scale(.96)}
.tf.t{background:linear-gradient(135deg,#33d39a,var(--mint-d))}
.tf.f{background:linear-gradient(135deg,#ff7a7a,var(--coral-d))}
.scramble{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;min-height:54px}
.tile{width:46px;height:50px;border-radius:13px;background:#fff;border:2px solid var(--line-2);font-family:var(--display);font-weight:800;font-size:22px;text-transform:uppercase;cursor:pointer;display:grid;place-items:center;color:var(--violet-d);box-shadow:var(--shadow-sm);transition:transform .1s}
.tile:active{transform:scale(.92)}
.tile.used{opacity:.25;pointer-events:none}
.slots{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:8px;min-height:52px}
.slot{width:42px;height:48px;border-radius:12px;background:var(--violet-s);border:2px dashed var(--violet);display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:22px;text-transform:uppercase;color:var(--violet-d)}
.hintline{text-align:center;color:var(--ink-dim);font-weight:700;font-size:13px;margin-bottom:14px}
.mem-pads{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:6px 0 14px}
.pad{aspect-ratio:1;border-radius:18px;background:#f6f1fa;border:2px solid transparent;display:grid;place-items:center;font-size:34px;cursor:pointer;transition:transform .12s,background .2s,box-shadow .2s}
.pad:active{transform:scale(.95)}
.pad.flash{background:var(--gold-s);box-shadow:0 0 0 3px var(--gold),0 6px 16px rgba(217,138,14,.4);transform:scale(1.04)}
.pad.tapped{background:var(--violet-s);box-shadow:0 0 0 3px var(--violet)}
.pad.disabled{pointer-events:none;opacity:.6}
.fact{font-size:14px;color:var(--ink);font-weight:600;line-height:1.55;margin-top:16px;padding:14px 16px;background:var(--gold-s);border-radius:15px;border-left:4px solid var(--gold)}
.sheet-btn{margin-top:18px;width:100%;border:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:17px;color:#fff;padding:16px;border-radius:17px;background:linear-gradient(135deg,#FF6FB1,var(--pink));box-shadow:0 10px 24px rgba(209,28,110,.36)}
.sheet-btn.ghost{background:#f3eef7;color:var(--ink-dim);box-shadow:none;margin-top:11px}
.sheet-btn:active{transform:scale(.98)}
.sheet-btn:disabled{opacity:.5;pointer-events:none}
.result-emoji{font-size:60px;text-align:center;display:block;margin-bottom:6px}
.win-title{font-family:var(--display);font-weight:800;font-size:30px;text-align:center;margin-bottom:3px}
.win-sub{text-align:center;color:var(--ink-dim);font-size:14px;font-weight:600;margin-bottom:20px}
.final-list{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
.final-p{display:flex;align-items:center;gap:11px;background:#faf5f9;border-radius:14px;padding:13px 15px;font-weight:800;font-family:var(--display)}
.final-p .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px}
.final-p .fsc{margin-left:auto;color:var(--pink-d)}
.final-p.first{background:linear-gradient(135deg,var(--gold-s),#fff);box-shadow:0 0 0 2px var(--gold) inset}
canvas#fx{position:fixed;inset:0;pointer-events:none;z-index:60;display:none}
.toast{position:fixed;left:50%;top:74px;transform:translateX(-50%) translateY(-22px);z-index:70;opacity:0;background:#fff;border:1px solid var(--line);padding:12px 22px;border-radius:99px;font-family:var(--display);font-weight:700;font-size:14.5px;transition:.35s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.muted-x.off{position:relative}
.muted-x.off::after{content:"";position:absolute;left:50%;top:50%;width:26px;height:2.5px;background:var(--coral);transform:translate(-50%,-50%) rotate(-45deg);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <section class="screen on" id="home">
    <div class="topbar">
      <div class="brand"><span class="logo"></span> Lucky Spin</div>
      <div class="wallet"><span class="coin">$</span><span id="walletHome">0</span></div>
    </div>
    <div class="scroll">
      <div class="hero">
        <h1>Lucky&nbsp;Spin</h1>
        <p>Spin the wheel, predict where it lands, and win coins by beating brain games.</p>
        <svg class="spinmark" viewBox="0 0 100 100"><g>
          <circle cx="50" cy="50" r="46" fill="none" stroke="#ffffff" stroke-opacity=".35" stroke-width="3" stroke-dasharray="6 6"/>
          <path d="M50 8 A42 42 0 0 1 92 50 L50 50Z" fill="#ffffff" fill-opacity=".22"/>
          <path d="M92 50 A42 42 0 0 1 50 92 L50 50Z" fill="#ffffff" fill-opacity=".12"/>
          <path d="M50 92 A42 42 0 0 1 8 50 L50 50Z" fill="#ffffff" fill-opacity=".22"/>
          <path d="M8 50 A42 42 0 0 1 50 8 L50 50Z" fill="#ffffff" fill-opacity=".12"/>
          <circle cx="50" cy="50" r="9" fill="#fff"/></g></svg>
      </div>
      <div class="section-h">Difficulty</div>
      <div class="opts" id="levels"></div>
      <div class="section-h">Play mode</div>
      <div class="opts" id="modes"></div>
      <button class="play-btn" id="startBtn">▶ Start spinning</button>
      <div class="stats-row">
        <div class="stat"><div class="sv" id="stSpins">0</div><div class="sl">SPINS</div></div>
        <div class="stat"><div class="sv" id="stStreak">0</div><div class="sl">BEST STREAK</div></div>
        <div class="stat"><div class="sv" id="stCorrect">0</div><div class="sl">CORRECT</div></div>
      </div>
    </div>
  </section>

  <section class="screen" id="lobby">
    <div class="game-top"><div class="icon-btn" id="lobbyBack">←</div><div class="brand" style="font-size:17px">Play online</div><div style="width:42px"></div></div>
    <div class="lobby" id="lobbyBody"></div>
  </section>

  <section class="screen" id="game">
    <div class="game-top">
      <div class="icon-btn" id="backBtn">←</div>
      <div class="scorebar" id="scorebar"></div>
      <div class="icon-btn muted-x" id="soundBtn">🔊</div>
    </div>
    <div class="round-tag" id="roundTag"></div>
    <div class="wheel-area">
      <div class="wheel-wrap">
        <div class="pointer"><svg width="34" height="40" viewBox="0 0 34 40"><path d="M17 38 L3 8 Q17 0 31 8 Z" fill="#2a1830"/><circle cx="17" cy="12" r="6" fill="#fff"/></svg></div>
        <canvas id="wheel" width="720" height="720"></canvas>
        <div class="hub"><span id="hubEmoji">🎯</span></div>
      </div>
      <div class="predict" id="predictBox">
        <div class="predict-h">🔮 Predict the landing for <b>2× coins</b> (optional)</div>
        <div class="pred-row" id="predRow"></div>
      </div>
    </div>
    <div class="dock"><button class="spin-btn" id="spinBtn">SPIN</button></div>
  </section>
</div>

<div class="scrim" id="mgScrim"><div class="sheet" id="mgSheet"></div></div>
<div class="scrim" id="winScrim"><div class="sheet" id="winSheet"></div></div>
<canvas id="fx"></canvas>
<div class="toast" id="toast"></div>
<script>
const SAVE_KEY='luckyspin_save';
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return{}}}
function store(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
let save=Object.assign({coins:0,spins:0,correct:0,bestStreak:0,sound:true,name:'',lastDaily:''},load());
function addCoins(n){save.coins+=n;store();renderWallet()}
function renderWallet(){document.getElementById('walletHome').textContent=save.coins.toLocaleString()}

const CATS={
  math:{name:'Math',emoji:'➕',c:'#2E9BF0',d:'#1A7FCE'},
  words:{name:'Words',emoji:'🔤',c:'#6C5CE7',d:'#5343C8'},

// ---- math generator ----
function genMath(level){
  let a,b,op,ans;
  if(level===0){op=Math.random()<.5?'+':'-';a=1+(Math.random()*9|0);b=1+(Math.random()*9|0);if(op==='-'&&b>a){[a,b]=[b,a];}ans=op==='+'?a+b:a-b;}
  else if(level===1){const r=Math.random();if(r<.4){op='+';a=5+(Math.random()*20|0);b=2+(Math.random()*20|0);ans=a+b;}else if(r<.7){op='-';a=10+(Math.random()*25|0);b=1+(Math.random()*a|0);ans=a-b;}else{op='×';a=2+(Math.random()*8|0);b=2+(Math.random()*8|0);ans=a*b;}}
  else{const r=Math.random();if(r<.45){op='×';a=3+(Math.random()*10|0);b=3+(Math.random()*10|0);ans=a*b;}else if(r<.75){op='÷';b=2+(Math.random()*9|0);ans=2+(Math.random()*9|0);a=b*ans;}else{op='+';a=20+(Math.random()*60|0);b=15+(Math.random()*60|0);ans=a+b;}}
  const q=a+' '+op+' '+b;
  const set=new Set([ans]);while(set.size<4){let d=ans+ (Math.random()<.5?-1:1)*(1+(Math.random()*6|0));if(d<0)d=Math.abs(d)+1;set.add(d);}
  const opts=[...set].sort(()=>Math.random()-.5);
  return {q:q,ans:ans,opts:opts};
}

// ---------- wheel ----------
const cv=document.getElementById('wheel');const cx2=cv.getContext('2d');
const SEG=Math.PI*2/WHEEL.length;
let rot=0;
function drawWheel(){
  const W=cv.width,R=W/2;cx2.clearRect(0,0,W,W);cx2.save();cx2.translate(R,R);cx2.rotate(rot);
  for(let i=0;i<WHEEL.length;i++){
    const cat=CATS[WHEEL[i]];const a0=-Math.PI/2+i*SEG,a1=a0+SEG;
    cx2.beginPath();cx2.moveTo(0,0);cx2.arc(0,0,R-6,a0,a1);cx2.closePath();
    const grad=cx2.createRadialGradient(0,0,R*0.2,0,0,R);grad.addColorStop(0,cat.c);grad.addColorStop(1,cat.d);
    cx2.fillStyle=grad;cx2.fill();
    cx2.strokeStyle='rgba(255,255,255,.85)';cx2.lineWidth=4;cx2.stroke();
    // label
    cx2.save();const mid=a0+SEG/2;cx2.rotate(mid);cx2.translate(R*0.62,0);cx2.rotate(Math.PI/2);
    cx2.textAlign='center';cx2.fillStyle='#fff';
    cx2.font='800 '+(R*0.13)+'px "Baloo 2",sans-serif';
    cx2.fillText(cat.emoji,0,-R*0.04);
    cx2.font='800 '+(R*0.066)+'px "Baloo 2",sans-serif';
    cx2.fillText(cat.name.toUpperCase(),0,R*0.10);
    cx2.restore();
  }
  // outer dots
  cx2.rotate(-rot);
  for(let i=0;i<24;i++){const a=i/24*Math.PI*2;cx2.beginPath();cx2.arc(Math.cos(a)*(R-3),Math.sin(a)*(R-3),R*0.012,0,7);cx2.fillStyle='rgba(255,255,255,.9)';cx2.fill();}
  cx2.restore();
}
function landedIndex(){const deg=(rot*180/Math.PI)%360;const norm=((360-(deg%360))%360);return Math.floor(norm/(360/WHEEL.length))%WHEEL.length;}

let spinning=false;
function spinTo(target,done){
  spinning=true;
  const segDeg=360/WHEEL.length;
  const curDeg=(rot*180/Math.PI)%360;
  const targetDeg=(360-(target*segDeg+segDeg/2))%360;
  const spins=4+(Math.random()*2|0);
  let deltaDeg=(targetDeg-curDeg+360)%360 + spins*360;
  const startRot=rot;const endRot=rot+deltaDeg*Math.PI/180;
  const dur=3400+Math.random()*600;const t0=performance.now();
  let lastTickSeg=-1;
  function frame(now){
    let p=(now-t0)/dur;if(p>1)p=1;
    const e=1-Math.pow(1-p,3); // easeOutCubic
    rot=startRot+(endRot-startRot)*e;drawWheel();
    const idxNow=landedIndex();if(idxNow!==lastTickSeg){lastTickSeg=idxNow;sfx('tick');}
    if(p<1)requestAnimationFrame(frame);
    else{spinning=false;rot=endRot;drawWheel();done(landedIndex());}
  }
  requestAnimationFrame(frame);
}
let state=null;let streak=0;

function mkP(name,human,i){return{name:name,human:human,score:0,spinsDone:0,emoji:AVATARS[i],col:PCOL[i]}}
function initGame(players){state={mode:sel.mode,players:players,turn:0,over:false,pred:null};streak=0;

function renderScorebar(){const el=document.getElementById('scorebar');el.innerHTML='';

function catCount(cat){return WHEEL.filter(w=>w===cat).length;}
function renderPredRow(){const row=document.getElementById('predRow');row.innerHTML='';
  PRED_CATS.forEach(k=>{const cat=CATS[k];const pct=Math.round(catCount(k)/WHEEL.length*100);

    d.onclick=()=>{if(spinning)return;const myTurn=state.mode!=='online'||state.turn===net.myIndex;if(state.mode==='cpu'&&!state.players[state.turn].human)return;if(!myTurn)return;state.pred=state.pred===k?null:k;renderPredRow();};

function updateRoundTag(){const t=document.getElementById('roundTag');const cur=state.players[state.turn];
  if(state.mode==='solo'){t.textContent='Spin #'+(cur.spinsDone+1)+'  ·  Streak '+streak;return;}
  const myTurn=state.mode!=='online'||state.turn===net.myIndex;
  let who=(state.mode==='online'&&!myTurn)?cur.name+' is spinning…':(state.mode==='cpu'&&!cur.human?'Bot is spinning…':cur.name+"'s turn");
  t.textContent='Round '+(cur.spinsDone+1)+' / '+ROUNDS+'  ·  '+who;}

function beginTurn(){
  renderScorebar();state.pred=null;renderPredRow();updateRoundTag();
  const cur=state.players[state.turn];document.getElementById('hubEmoji').textContent=cur.emoji;
  const pb=document.getElementById('predictBox');const sb=document.getElementById('spinBtn');
  if(state.mode==='cpu'&&!cur.human){sb.disabled=true;pb.style.opacity=.4;setTimeout(botTurn,900);return;}
  if(state.mode==='online'&&state.turn!==net.myIndex){sb.disabled=true;pb.style.opacity=.4;return;}
  sb.disabled=false;pb.style.opacity=1;
}

function onSpin(){if(spinning||!state)return;const cur=state.players[state.turn];
  if(state.mode==='online'&&state.turn!==net.myIndex)return;
  if(state.mode==='cpu'&&!cur.human)return;
  document.getElementById('spinBtn').disabled=true;document.getElementById('predictBox').style.opacity=.5;
  spinTo(Math.random()*WHEEL.length|0,idx=>resolveLanding(idx));}

function resolveLanding(idx){
  const cat=WHEEL[idx];const isJack=cat==='jackpot';const meta=CATS[cat];
  document.getElementById('hubEmoji').textContent=meta.emoji;sfx('land');
  const hub=document.querySelector('.hub');hub.style.transition='transform .3s';hub.style.transform='translate(-50%,-50%) scale(1.18)';setTimeout(()=>hub.style.transform='translate(-50%,-50%) scale(1)',300);
  const playCat=isJack?PRED_CATS[Math.random()*PRED_CATS.length|0]:cat;
  const predHit=!!(state.pred&&(cat===state.pred||isJack));
  setTimeout(()=>playMiniGame(playCat,isJack,predHit,(correct)=>{
    const diffMult=sel.level+1,wedgeMult=isJack?5:1,predMult=predHit?2:1;
    const coins=correct?10*diffMult*wedgeMult*predMult:0;
    finishTurn(coins,correct);
  }),520);
}

function finishTurn(coins,correct){
  const p=state.players[state.turn];p.score+=coins;
  const byLocalHuman=(state.mode!=='online')?p.human:(state.turn===net.myIndex);
  if(byLocalHuman){save.spins++;if(correct){save.correct++;streak++;if(streak>save.bestStreak)save.bestStreak=streak;}else streak=0;addCoins(coins);store();}
  if(coins>0){toast('+'+coins+' coins '+(correct?'🎉':''));} else toast('No coins this time');
  if(state.mode==='online'&&!net.host){net.hostConn.send({t:'played',coins:coins,correct:correct});return;}
  advanceTurn();
}
function advanceTurn(){
  const p=state.players[state.turn];p.spinsDone++;
  renderScorebar();
  if(state.mode!=='solo'&&state.players.every(pl=>pl.spinsDone>=ROUNDS)){endGame();return;}
  if(state.mode!=='solo')state.turn=(state.turn+1)%state.players.length;
  beginTurn();
  if(net.on&&net.host)broadcastSB();
}
function botTurn(){
  document.getElementById('spinBtn').disabled=true;
  spinTo(Math.random()*WHEEL.length|0,idx=>{
    const cat=WHEEL[idx];const isJack=cat==='jackpot';const playCat=isJack?PRED_CATS[Math.random()*PRED_CATS.length|0]:cat;
    document.getElementById('hubEmoji').textContent=CATS[cat].emoji;sfx('land');
    const success=Math.random()<(0.74-sel.level*0.12);
    const coins=success?10*(sel.level+1)*(isJack?5:1):0;
    setTimeout(()=>showBotResult(playCat,isJack,success,coins,()=>{const p=state.players[state.turn];p.score+=coins;advanceTurn();}),520);
  });
}

function mgMemory(isJack,predHit,cb){const Q=genMemory(sel.level);const sheet=document.getElementById('mgSheet');
  sheet.innerHTML=mgHeader('memory',isJack,predHit,'Memory Flash','Watch the order, then repeat it')+'<div class="mem-status" id="memStat" style="text-align:center;font-family:var(--display);font-weight:800;color:var(--mint-d);font-size:16px;margin-bottom:10px">Watch carefully…</div><div class="mem-pads" id="pads"></div><button class="sheet-btn" id="mgCont" style="display:none">Continue →</button>';
  const padsEl=sheet.querySelector('#pads');const stat=sheet.querySelector('#memStat');const padEls=[];
  Q.pads.forEach((em,i)=>{const p=document.createElement('div');p.className='pad disabled';p.textContent=em;p.dataset.i=i;padsEl.appendChild(p);padEls.push(p);});
  openScrim('mgScrim');
  let step=0;
  function flashNext(){if(step>=Q.seq.length){startInput();return;}const pi=Q.seq[step];const el=padEls[pi];
    setTimeout(()=>{el.classList.add('flash');sfx('tick');setTimeout(()=>{el.classList.remove('flash');step++;flashNext();},500);},250);}
  function startInput(){stat.textContent='Your turn — repeat the order';stat.style.color='var(--violet-d)';
    let idx=0;padEls.forEach(p=>p.classList.remove('disabled'));
    padEls.forEach(p=>{p.onclick=()=>{const pi=+p.dataset.i;p.classList.add('tapped');setTimeout(()=>p.classList.remove('tapped'),200);
      if(pi===Q.seq[idx]){idx++;sfx('hop');if(idx>=Q.seq.length){finish(true);}}else{finish(false);}};});}
  function finish(ok){padEls.forEach(p=>{p.onclick=null;p.classList.add('disabled');});
    if(ok){sfx('correct');stat.textContent='✅ Perfect memory!';stat.style.color='var(--mint-d)';}
    else{sfx('wrong');stat.textContent='❌ Oops! The order slipped.';stat.style.color='var(--coral-d)';}
    const c=sheet.querySelector('#mgCont');c.style.display='block';c.onclick=()=>{closeScrim('mgScrim');cb(ok);};}
  setTimeout(flashNext,500);}

  if(net.on&&net.host)broadcast({t:'end',players:state.players.map(p=>({name:p.name,emoji:p.emoji,col:p.col,score:p.score}))});
  showWinner(state.players);}
function showWinner(players){
  const sorted=players.slice().sort((a,b)=>b.score-a.score);const top=sorted[0];
  const myName=(net.on?save.name:null);
  const iWon=net.on?(top.name===myName):(top.name==='You'||top.name==='Player 1'&&top.score>=sorted[1].score);
  sfx('win');confetti();
  const sheet=document.getElementById('winSheet');
  let list='';sorted.forEach((p,i)=>{list+='<div class="final-p'+(i===0?' first':'')+'"><span class="av" style="background:'+p.col.c+'">'+p.emoji+'</span>'+(i===0?'🏆 ':'')+p.name+'<span class="fsc">'+p.score+'</span></div>';});
  sheet.innerHTML='<span class="result-emoji">🏆</span><div class="win-title">'+top.name+' wins!</div><div class="win-sub">Final scores after '+ROUNDS+' rounds</div><div class="final-list">'+list+'</div><button class="sheet-btn" id="againBtn">Play again</button><button class="sheet-btn ghost" id="homeBtn">Back to menu</button>';
  sheet.querySelector('#againBtn').onclick=()=>{closeScrim('winScrim');if(net.on){if(net.host){state.players.forEach(p=>{p.score=0;p.spinsDone=0;});state.turn=0;state.over=false;beginTurn();broadcastSB();}else toast('Waiting for host…');}else startLocalGame();};
  sheet.querySelector('#homeBtn').onclick=()=>{closeScrim('winScrim');teardownNet();go('home');buildHome();};
  setTimeout(()=>openScrim('winScrim'),700);}
function shortCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.random()*c.length|0];return s;}
function broadcast(msg){net.conns.forEach(c=>{try{c.send(msg)}catch(e){}})}
function broadcastSB(){if(!net.host)return;broadcast({t:'sb',players:state.players.map(p=>({name:p.name,emoji:p.emoji,col:p.col,score:p.score,spinsDone:p.spinsDone})),turn:state.turn,over:state.over,level:sel.level});}
function teardownNet(){try{if(net.peer)net.peer.destroy()}catch(e){}net={on:false,host:false,peer:null,conns:[],myIndex:0,hostConn:null};}
function openLobby(){go('lobby');
  document.getElementById('lobbyBody').innerHTML='<div class="lobby-card"><div class="section-h" style="margin-top:0">Your name</div><input class="field" id="nameIn" placeholder="NAME" maxlength="10" style="text-transform:none;letter-spacing:1px" value="'+(save.name||'')+'"><div style="margin-top:18px"><button class="sheet-btn" id="createBtn" style="margin-top:0">Create a circle</button></div><div class="section-h">Or join with a code</div><input class="field" id="codeIn" placeholder="CODE" maxlength="4"><button class="sheet-btn ghost" id="joinBtn">Join circle</button><div class="status" id="lobbyStatus"></div></div><div class="status" style="font-size:12px;color:var(--ink-faint)">Everyone must be online at the same time. Up to 4 players take turns spinning.</div>';
  document.getElementById('createBtn').onclick=hostCircle;document.getElementById('joinBtn').onclick=joinCircle;document.getElementById('lobbyBack').onclick=()=>{teardownNet();go('home')};}
function lobbyStatus(t){const e=document.getElementById('lobbyStatus');if(e)e.textContent=t;}
function hostCircle(){const name=(document.getElementById('nameIn').value||'Host').trim().slice(0,10)||'Host';save.name=name;store();
  if(typeof Peer==='undefined'){lobbyStatus('Online needs an internet connection.');return;}
  lobbyStatus('Creating your circle…');const code=shortCode();net={on:true,host:true,peer:null,conns:[],myIndex:0,hostConn:null};net.lobby=[{name:name,emoji:AVATARS[0],col:PCOL[0]}];net.code=code;
  const peer=new Peer('ls-'+code,{debug:0});net.peer=peer;
  peer.on('open',()=>renderHostLobby(code));
  peer.on('error',e=>lobbyStatus('Could not start ('+(e.type||'error')+'). Try again.'));
  peer.on('connection',conn=>{conn.on('data',d=>hostHandle(conn,d));conn.on('close',()=>{net.conns=net.conns.filter(c=>c!==conn);net.lobby=net.lobby.filter(p=>p._conn!==conn);reindexLobby();renderHostLobby(net.code);pushLobby();});});}
function reindexLobby(){net.lobby.forEach((p,i)=>{p.col=PCOL[i];p.emoji=AVATARS[i];});}
function hostHandle(conn,d){
  if(d.t==='join'){if(net.started||net.lobby.length>=4){conn.send({t:'full'});return;}const i=net.lobby.length;net.lobby.push({name:(d.name||'Friend').slice(0,10),emoji:AVATARS[i],col:PCOL[i],_conn:conn});net.conns.push(conn);renderHostLobby(net.code);pushLobby();}
  if(d.t==='played'){if(state&&!state.over){state.players[state.turn].score+=d.coins;advanceTurn();}}
}
function pushLobby(){broadcast({t:'lobby',players:net.lobby.map(p=>({name:p.name,emoji:p.emoji,col:p.col}))});}
function renderHostLobby(code){net.code=code;const body=document.getElementById('lobbyBody');
  body.innerHTML='<div class="lobby-card"><div class="code-box"><div class="cl">Circle code</div><div class="cc">'+code+'</div></div><div class="section-h" style="margin-top:0">Players ('+net.lobby.length+'/4)</div><div class="lobby-list" id="ll"></div><button class="sheet-btn" id="startOnline" style="margin-top:18px"'+(net.lobby.length<2?' disabled':'')+'>Start game</button><div class="status">Share the code. Game starts when you tap Start.</div></div>';
  const ll=body.querySelector('#ll');net.lobby.forEach((p,i)=>{const r=document.createElement('div');r.className='lobby-p';r.innerHTML='<span class="av" style="background:'+p.col.c+'">'+p.emoji+'</span>'+p.name+(i===0?'<span class="me">YOU · HOST</span>':'');ll.appendChild(r);});
  const sb=body.querySelector('#startOnline');if(sb&&net.lobby.length>=2)sb.onclick=startOnlineGame;
  document.getElementById('lobbyBack').onclick=()=>{teardownNet();go('home')};}
function startOnlineGame(){net.started=true;const players=net.lobby.map((p,i)=>({name:p.name,human:true,score:0,spinsDone:0,emoji:AVATARS[i],col:PCOL[i]}));
  broadcast({t:'begin',players:players.map(p=>({name:p.name,emoji:p.emoji,col:p.col})),level:sel.level});sel.mode='online';initGame(players);}
function joinCircle(){const name=(document.getElementById('nameIn').value||'Friend').trim().slice(0,10)||'Friend';const code=(document.getElementById('codeIn').value||'').trim().toUpperCase();
  if(code.length<4){lobbyStatus('Enter the 4-letter code.');return;}save.name=name;store();
  if(typeof Peer==='undefined'){lobbyStatus('Online needs an internet connection.');return;}
  lobbyStatus('Connecting…');net={on:true,host:false,peer:null,conns:[],myIndex:0,hostConn:null};
  const peer=new Peer(null,{debug:0});net.peer=peer;
  peer.on('error',e=>lobbyStatus('Could not connect ('+(e.type||'error')+'). Check the code.'));
  peer.on('open',()=>{const conn=peer.connect('ls-'+code,{reliable:true});net.hostConn=conn;
    conn.on('open',()=>{conn.send({t:'join',name:name});lobbyStatus('Connected! Waiting in lobby…');});
    conn.on('data',d=>guestHandle(d));conn.on('close',()=>toast('Disconnected from circle'));});}
function guestHandle(d){
  if(d.t==='full'){lobbyStatus('That circle is full or already started.');return;}
  if(d.t==='lobby'){renderGuestLobby(d.players);}
  if(d.t==='begin'){sel.level=d.level;sel.mode='online';const players=d.players.map((p,i)=>({name:p.name,human:true,score:0,spinsDone:0,emoji:p.emoji,col:p.col}));net.myIndex=guessMyIndex(d.players);
    state={mode:'online',players:players,turn:0,over:false,pred:null};streak=0;document.getElementById('hubEmoji').textContent='🎯';rot=0;drawWheel();renderScorebar();renderPredRow();go('game');beginTurn();}
  if(d.t==='sb'){if(!state)return;sel.level=d.level;state.players=d.players.map(p=>({name:p.name,emoji:p.emoji,col:p.col,score:p.score,spinsDone:p.spinsDone,human:true}));state.turn=d.turn;state.over=d.over;renderScorebar();beginTurn();}
  if(d.t==='end'){showWinner(d.players);}
}
function guessMyIndex(players){const n=save.name;const i=players.findIndex(p=>p.name===n);return i<0?players.length-1:i;}
function renderGuestLobby(players){const body=document.getElementById('lobbyBody');
  body.innerHTML='<div class="lobby-card"><div class="status" style="color:var(--mint-d);font-weight:800">✓ In the circle</div><div class="section-h">Players ('+players.length+'/4)</div><div class="lobby-list" id="ll"></div><div class="status">Waiting for the host to start…</div></div>';
  const ll=body.querySelector('#ll');players.forEach(p=>{const r=document.createElement('div');r.className='lobby-p';r.innerHTML='<span class="av" style="background:'+p.col.c+'">'+p.emoji+'</span>'+p.name+(p.name===save.name?'<span class="me">YOU</span>':'');ll.appendChild(r);});
  document.getElementById('lobbyBack').onclick=()=>{teardownNet();go('home')};}

function openScrim(id){document.getElementById(id).classList.add('on')}
function closeScrim(id){document.getElementById(id).classList.remove('on')}
function go(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById(s).classList.add('on')}
let toastT=null;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}
let actx=null;function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function tone(f,dur,type,vol,sl){if(!save.sound)return;try{const a=ac();const o=a.createOscillator();const g=a.createGain();o.type=type||'sine';o.frequency.value=f;if(sl)o.frequency.exponentialRampToValueAtTime(sl,a.currentTime+dur);g.gain.value=vol||.12;g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+dur);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur);}catch(e){}}
function sfx(k){switch(k){
  case'tick':tone(900,.03,'square',.04);break;
  case'land':tone(440,.12,'triangle',.12);setTimeout(()=>tone(660,.14,'triangle',.12),90);break;
  case'hop':tone(620,.06,'sine',.07);break;
  case'correct':tone(660,.12,'triangle',.12);setTimeout(()=>tone(880,.16,'triangle',.12),110);break;
  case'wrong':tone(220,.25,'sawtooth',.08,120);break;
  case'win':[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,.22,'triangle',.13),i*120));break;}}
const fx=document.getElementById('fx'),fxc=fx.getContext('2d');let parts=[],raf=null;
function sizeFx(){fx.width=innerWidth;fx.height=innerHeight}
function confetti(){sizeFx();fx.style.display='block';const cols=['#FF4D9D','#F5A623','#18B981','#6C5CE7','#2E9BF0','#FF8AC4'];
  for(let i=0;i<150;i++)parts.push({x:innerWidth/2,y:innerHeight*.28,vx:(Math.random()-.5)*14,vy:Math.random()*-16-4,s:5+Math.random()*7,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,life:1});if(!raf)tick();}
function tick(){fxc.clearRect(0,0,fx.width,fx.height);parts.forEach(p=>{p.vy+=.45;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life-=.012;p.vx*=.99;fxc.save();fxc.translate(p.x,p.y);fxc.rotate(p.r);fxc.globalAlpha=Math.max(p.life,0);fxc.fillStyle=p.c;fxc.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.4);fxc.restore();});parts=parts.filter(p=>p.life>0&&p.y<fx.height+40);if(parts.length)raf=requestAnimationFrame(tick);else{raf=null;fxc.clearRect(0,0,fx.width,fx.height);fx.style.display='none';}}
document.getElementById('startBtn').onclick=()=>{ac();if(sel.mode==='online')openLobby();else startLocalGame();};
document.getElementById('spinBtn').onclick=onSpin;
document.getElementById('backBtn').onclick=()=>{teardownNet();go('home');buildHome();};
document.getElementById('soundBtn').onclick=function(){save.sound=!save.sound;store();this.textContent=save.sound?'🔊':'🔈';this.classList.toggle('off',!save.sound);if(save.sound)sfx('hop');};
document.getElementById('soundBtn').classList.toggle('off',!save.sound);
document.getElementById('soundBtn').textContent=save.sound?'🔊':'🔈';
drawWheel();buildHome();
</script>
</body>
