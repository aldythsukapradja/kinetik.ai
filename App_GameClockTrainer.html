      function ladderVisual(q){
        const spaces = q.spaces || [4,12];
        return '<svg viewBox="0 0 240 150"><rect x="24" y="24" width="192" height="98" rx="8" fill="var(--panel)" stroke="var(--line)"/>' + Array.from({length:6}).map(function(_,i){return '<rect x="' + (42+i*27) + '" y="82" width="24" height="24" rx="5" fill="' + (i%2 ? 'var(--soft)' : 'color-mix(in srgb,var(--a) 16%,var(--panel))') + '" stroke="var(--line)"/>';}).join("") + '<path d="M62 104 156 42M86 112 180 50" stroke="var(--a)" stroke-width="8" stroke-linecap="round"/><path d="M88 88h42M112 72h42M136 56h42" stroke="var(--c)" stroke-width="5" stroke-linecap="round"/><circle cx="' + (46 + (spaces[0]%6)*27) + '" cy="94" r="13" fill="var(--b)"/></svg>';
      }
      function agentVisual(q){
        const flow = q.flow || ["Plan","Tool","Verify"];
        return '<svg viewBox="0 0 260 150"><rect x="22" y="24" width="216" height="102" rx="8" fill="var(--panel)" stroke="var(--line)"/>' + flow.map(function(step,i){ return '<g><rect x="' + (38+i*67) + '" y="58" width="54" height="34" rx="7" fill="' + (i%2 ? 'var(--b)' : 'var(--a)') + '" opacity=".9"/><text x="' + (65+i*67) + '" y="79" text-anchor="middle" font-size="9" fill="white" font-weight="900">' + esc(step).slice(0,8) + '</text></g>'; }).join("") + '<path d="M92 75h13M159 75h13" stroke="var(--c)" stroke-width="5" stroke-linecap="round"/></svg>';
      }
      function setTheme(theme, persist){ state.theme = theme === "dark" ? "dark" : "light"; document.documentElement.dataset.theme = state.theme; if(persist){ save(); publishState("theme"); render(); } }
      function save(){ localStorage.setItem(Config.stateKey, JSON.stringify(state)); }
      function readJson(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
      function toast(message){ const n = $("toast"); n.textContent = message; n.classList.add("on"); clearTimeout(toast.t); toast.t = setTimeout(function(){ n.classList.remove("on"); }, 1800); }
      function DAY(){ return new Date().toISOString().slice(0,10); }
      function titleCase(v){ v = String(v || ""); return v.charAt(0).toUpperCase() + v.slice(1); }
      function formatMs(ms){ if(!ms) return "0s"; if(ms < 1000) return ms + "ms"; return (ms/1000).toFixed(ms < 10000 ? 1 : 0) + "s"; }
      function esc(v){ return String(v == null ? "" : v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c];}); }
      function escAttr(v){ return esc(v).replace(/\x60/g,"&#096;"); }
    })();
  </script>
