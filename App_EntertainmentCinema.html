<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema - Kinetik</title>
<script type="application/kinetik-app+json">
{
  "appId": "entertainment-cinema",
  "name": "Cinema",
  "shortName": "Cinema",
  "icon": "<svg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg' aria-hidden='true' fill='none' stroke='white' stroke-width='4.6' stroke-linecap='round' stroke-linejoin='round'><rect x='12' y='16' width='40' height='32' rx='7'/><path d='M22 16l5 9M35 16l5 9M12 26h40'/><path d='M29 32l12 7-12 7z' fill='white' stroke='none'/><\/svg>",
  "homeIcon": "🎬",
  "gradient": [
    "#070b18",
    "#2563eb"
  ],
  "category": "entertainment",
  "tagline": "Your circle video world.",
  "about": "A private circle video and cinematic media space for Kinetik. Today it hosts curated story experiences; later it becomes the YouTube-style home for family, friends, learning clips, and creator channels.",
  "audience": "all",
  "circleTypes": [
    "family",
    "friends"
  ],
  "worksWith": [
    "standalone"
  ],
  "status": "live",
  "minMembers": 1
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Montserrat:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#03050d;
    --gold:#ffd27f;
    --gold-bright:#fff2d0;
    --amber:#ff9d2f;
    --cyan:#22d3ee;
    --ink:#eaf0ff;
    --muted:#8497b8;
    --faint:#4b5a78;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased}
  #scene{position:fixed;inset:0;z-index:1}
  canvas{display:block}

  /* ===== Vignette + grain ===== */
  #vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.45) 100%)}
  #flash{position:fixed;inset:0;z-index:6;pointer-events:none;background:#fff;opacity:0}

  /* ===== connector (pill -> planet) ===== */
  #connector{position:fixed;inset:0;width:100%;height:100%;z-index:4;pointer-events:none;opacity:0;transition:opacity .6s}
  #cline{fill:none;stroke-width:1.3;stroke-dasharray:2 5;stroke-linecap:round}

  /* ===== Overlay layer ===== */
  #overlay{position:fixed;inset:0;z-index:5;pointer-events:none;display:flex;align-items:center;justify-content:center}

  .cap{position:absolute;width:min(1100px,86vw);text-align:center;opacity:0;transform:translateY(18px);
    transition:opacity 1.1s cubic-bezier(.16,1,.3,1), transform 1.1s cubic-bezier(.16,1,.3,1)}
  .cap.show{opacity:1;transform:translateY(0)}

  .kicker{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.42em;
    font-size:clamp(10px,1vw,13px);color:var(--cyan);text-transform:uppercase;margin-bottom:26px;
    opacity:.85}
  .serif{font-family:'Fraunces',serif;font-weight:300;line-height:1.16;
    font-size:clamp(30px,5.4vw,68px);letter-spacing:-.01em}
  .serif em{font-style:italic;color:var(--gold)}
  .sub{font-family:'Montserrat',sans-serif;font-weight:300;color:var(--muted);
    font-size:clamp(14px,1.7vw,20px);line-height:1.6;margin-top:26px;letter-spacing:.01em}
  .open-sig{font-family:'Fraunces',serif;font-style:italic;font-weight:300;
    font-size:clamp(16px,2vw,25px);color:var(--gold);margin-top:34px;opacity:0;
    transition:opacity 1.2s ease .9s}
  .cap.show .open-sig{opacity:1}

  /* staggered memory lines */
  .mem-stack{display:flex;flex-direction:column;gap:4px;margin-top:22px}
  .mem-line{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(19px,2.8vw,36px);
    line-height:1.35;color:var(--ink);opacity:0;transform:translateY(12px);
    transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
  .cap.show .mem-line:nth-child(1){opacity:1;transform:translateY(0);transition-delay:.15s}
  .cap.show .mem-line:nth-child(2){opacity:1;transform:translateY(0);transition-delay:.65s}
  .cap.show .mem-line:nth-child(3){opacity:1;transform:translateY(0);transition-delay:1.15s}
  .cap.show .mem-line:nth-child(4){opacity:1;transform:translateY(0);transition-delay:1.65s}
  .cap.show .mem-line:nth-child(5){opacity:1;transform:translateY(0);transition-delay:2.25s}
  .mem-hero{color:var(--gold);font-style:italic;margin-top:16px}
  .discipline-lead{font-size:clamp(30px,4.8vw,64px)!important;color:var(--ink)!important;margin-bottom:14px}
  .discipline-lead em{font-style:italic;color:var(--gold)}
  .disc{font-size:clamp(15px,1.7vw,21px)!important;color:var(--muted)!important;line-height:1.5!important;
    font-family:'Montserrat',sans-serif!important;font-weight:300!important;max-width:760px}
  .mem-foot{font-family:'JetBrains Mono',monospace;font-weight:300;font-size:clamp(11px,1.1vw,14px);
    color:var(--faint);margin-top:30px;letter-spacing:.16em;opacity:0;transition:opacity 1s ease 3.2s}
  .cap.show .mem-foot{opacity:1}

  .bignum{font-family:'JetBrains Mono',monospace;font-weight:300;
    font-size:clamp(40px,9vw,128px);letter-spacing:-.02em;line-height:1;color:var(--gold-bright)}
  .numrow{display:flex;gap:clamp(28px,6vw,86px);justify-content:center;align-items:flex-start;flex-wrap:wrap}
  .numcell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .numcell .n{font-family:'JetBrains Mono',monospace;font-weight:300;font-size:clamp(34px,6vw,86px);color:var(--gold-bright);line-height:1}
  .numcell .l{font-family:'Orbitron',sans-serif;font-weight:500;letter-spacing:.28em;font-size:clamp(9px,.95vw,12px);color:var(--muted);text-transform:uppercase}

  .arrow{display:inline-block;color:var(--faint);font-weight:200;margin:0 .4em}

  /* ===== Guardian passport ===== */
  #passport{position:absolute;left:clamp(24px,6vw,110px);top:50%;transform:translateY(-50%) translateX(-30px);
    width:min(420px,80vw);opacity:0;transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);
    text-align:left}
  #passport.show{opacity:1;transform:translateY(-50%) translateX(0)}
  .pp-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Orbitron',sans-serif;font-weight:600;
    letter-spacing:.24em;font-size:11px;text-transform:uppercase;padding:7px 14px;border-radius:100px;
    border:1px solid currentColor;margin-bottom:22px}
  .pp-badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 12px currentColor}
  .pp-name{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(34px,4.4vw,56px);
    letter-spacing:.04em;line-height:1;margin-bottom:6px}
  .pp-tag{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:clamp(17px,1.9vw,23px);
    color:var(--gold);margin-bottom:26px}
  .pp-mission{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(18px,2vw,26px);line-height:1.4;
    color:var(--ink);margin-bottom:28px}
  .pp-grid{display:flex;gap:30px;margin-bottom:24px}
  .pp-grid .m{display:flex;flex-direction:column;gap:6px}
  .pp-grid .m .v{font-family:'JetBrains Mono',monospace;font-weight:400;font-size:clamp(22px,2.6vw,34px);color:var(--gold-bright);line-height:1}
  .pp-grid .m .k{font-family:'Orbitron',sans-serif;font-weight:500;letter-spacing:.2em;font-size:9px;color:var(--muted);text-transform:uppercase}
  .pp-value{font-family:'Montserrat',sans-serif;font-weight:300;font-size:clamp(13px,1.4vw,16px);
    line-height:1.6;color:var(--muted);border-left:2px solid var(--faint);padding-left:16px}
  .pp-serve{font-family:'Fraunces',serif;font-style:italic;font-weight:300;
    font-size:clamp(14px,1.55vw,19px);color:var(--gold);margin-top:18px;line-height:1.45}
  .pp-pioneer{display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;
    padding:5px 13px;border-radius:100px;font-family:'Orbitron',sans-serif;font-weight:700;
    letter-spacing:.18em;font-size:9px;text-transform:uppercase;color:#1a1205;
    background:linear-gradient(135deg,#ffe4a8,#ffc266);
    box-shadow:0 0 26px -4px rgba(255,200,110,.7), inset 0 0 0 1px rgba(255,255,255,.35)}

  /* ===== Consultation answer ===== */
  #answer{position:absolute;right:clamp(24px,6vw,110px);top:50%;transform:translateY(-50%) translateX(30px);
    width:min(440px,84vw);opacity:0;transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);text-align:left}
  #answer.show{opacity:1;transform:translateY(-50%) translateX(0)}
  .q-line{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:clamp(20px,2.4vw,30px);
    line-height:1.35;margin-bottom:28px;color:var(--ink)}
  .q-line .cur{display:inline-block;width:2px;height:1.05em;background:var(--cyan);margin-left:3px;
    vertical-align:-3px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .ans-card{background:linear-gradient(180deg, rgba(18,26,46,.66), rgba(10,16,30,.5));
    border:1px solid rgba(120,150,210,.18);border-radius:18px;padding:24px 26px;backdrop-filter:blur(14px);
    box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .ans-head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .ans-head .c{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,var(--amber));
    box-shadow:0 0 18px var(--amber)}
  .ans-head .t{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.18em;font-size:12px;color:var(--gold)}
  .ans-head .d{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .ans-item{display:flex;gap:12px;align-items:flex-start;padding:9px 0;font-size:14px;line-height:1.45;
    border-bottom:1px solid rgba(120,150,210,.08)}
  .ans-item:last-of-type{border-bottom:none}
  .ans-item .src{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);white-space:nowrap;padding-top:2px;min-width:78px}
  .ans-item .tx{color:var(--ink);font-weight:300}
  .ans-rec{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,210,127,.22);
    font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:15px;line-height:1.5;color:var(--gold)}
  .ans-rec b{font-style:normal;font-weight:400;color:var(--gold-bright)}

  /* ===== Finale ===== */
  #finale{position:absolute;width:min(1000px,88vw);text-align:center;opacity:0;
    transition:opacity 1.2s ease;pointer-events:none}
  #finale.show{opacity:1}
  .fin-line{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(20px,3vw,38px);
    line-height:1.3;color:var(--muted);opacity:0;transform:translateY(14px);
    transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);margin:8px 0}
  .fin-line.on{opacity:1;transform:translateY(0);color:var(--ink)}
  .fin-gap{height:clamp(20px,3vh,40px)}
  .fin-hero{font-family:'Fraunces',serif;font-weight:300;font-style:italic;
    font-size:clamp(22px,3.6vw,46px);line-height:1.18;margin:22px 0 4px;color:var(--gold);
    opacity:0;transform:translateY(14px);transition:opacity 1.1s ease,transform 1.1s cubic-bezier(.16,1,.3,1)}
  .fin-hero.on{opacity:1;transform:translateY(0)}
  .fin-sig{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(56px,11vw,150px);line-height:1;
    margin-top:10px;background:linear-gradient(120deg,#fff4e2,#ffd27f 55%,#ffb347 120%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;transform:scale(.92);transition:opacity 1.4s ease,transform 1.6s cubic-bezier(.16,1,.3,1);
    text-shadow:0 0 80px rgba(255,210,127,.3)}
  .fin-sig em{font-style:italic}
  .fin-sig.on{opacity:1;transform:scale(1)}

  /* ===== chrome ===== */
  #progress{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:10px;pointer-events:auto}
  .pdot{width:7px;height:7px;border-radius:50%;background:rgba(140,160,200,.28);cursor:pointer;transition:all .4s}
  .pdot.on{background:var(--gold);box-shadow:0 0 12px var(--gold);transform:scale(1.25)}
  .pdot:hover{background:var(--cyan)}

  #hint{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);z-index:7;
    font-family:'Montserrat',sans-serif;font-weight:300;font-size:12px;letter-spacing:.18em;
    color:var(--faint);text-transform:uppercase;transition:opacity .8s;text-align:center}
  #hint b{color:var(--muted);font-weight:500}

  #brand{position:fixed;top:30px;left:34px;z-index:7;display:flex;align-items:center;gap:12px;opacity:0;transition:opacity 1s}
  #brand.show{opacity:1}
  #brand .orb{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,var(--amber));box-shadow:0 0 16px var(--amber)}
  #brand .txt{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.22em;font-size:12px;color:var(--ink)}
  #brand .txt span{color:var(--muted);font-weight:400}

  #nav{position:fixed;top:28px;right:30px;z-index:7;display:flex;gap:14px;opacity:0;transition:opacity 1s}
  #nav.show{opacity:1}
  .navbtn{pointer-events:auto;cursor:pointer;width:42px;height:42px;border-radius:50%;
    border:1px solid rgba(140,160,200,.2);background:rgba(20,28,48,.4);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .3s}
  .navbtn:hover{border-color:var(--cyan);color:var(--cyan)}
  .navbtn svg{width:16px;height:16px}

  /* ===== Loader ===== */
  #loader{position:fixed;inset:0;z-index:20;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:30px;transition:opacity 1.2s ease}
  #loader.hide{opacity:0;pointer-events:none}
  #loader .lt{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.4em;font-size:13px;color:var(--muted);text-transform:uppercase}
  #loader .lbar{width:200px;height:1px;background:rgba(140,160,200,.18);overflow:hidden;position:relative}
  #loader .lbar i{position:absolute;left:-40%;top:0;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:load 1.3s ease-in-out infinite}
  @keyframes load{to{left:120%}}
  #begin{pointer-events:auto;cursor:pointer;margin-top:6px;font-family:'Montserrat';font-weight:400;letter-spacing:.2em;
    font-size:12px;text-transform:uppercase;color:var(--bg);background:var(--gold);padding:14px 34px;border-radius:100px;
    border:none;opacity:0;transform:translateY(10px);transition:all .8s;box-shadow:0 0 40px rgba(255,210,127,.4)}
  #begin.show{opacity:1;transform:translateY(0)}
  #begin:hover{background:var(--gold-bright);box-shadow:0 0 60px rgba(255,210,127,.6)}

  /* ===== opening word reveal ===== */
  .open-line{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(40px,7.6vw,104px);
    line-height:1.04;letter-spacing:-.015em}
  .open-line span{display:inline-block;opacity:0;transform:translateY(18px);filter:blur(8px);
    transition:opacity 1.1s cubic-bezier(.16,1,.3,1),transform 1.1s cubic-bezier(.16,1,.3,1),filter 1.1s ease}
  .cap.show .open-line span{opacity:1;transform:translateY(0);filter:blur(0)}
  .cap.show .open-line span:nth-child(1){transition-delay:.25s}
  .cap.show .open-line span:nth-child(2){transition-delay:.6s}
  .cap.show .open-line span:nth-child(3){transition-delay:.95s}
  .cap.show .open-line span:nth-child(4){transition-delay:1.25s}
  .cap.show .open-line span:nth-child(5){transition-delay:1.75s}
  .gold-word{color:var(--gold);text-shadow:0 0 50px rgba(255,210,127,.55),0 0 14px rgba(255,210,127,.4)}

  /* ===== guardian nav bar ===== */
  #guardbar{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-14px);z-index:8;
    display:flex;gap:6px;padding:7px;border-radius:100px;
    background:rgba(12,18,34,.5);border:1px solid rgba(120,150,210,.14);backdrop-filter:blur(14px);
    opacity:0;pointer-events:none;transition:opacity .7s,transform .7s}
  #guardbar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .gb-item{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:100px;cursor:pointer;
    color:var(--faint);transition:all .4s;white-space:nowrap}
  .gb-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .gb-item span{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.12em;font-size:10px;text-transform:uppercase;
    max-width:0;overflow:hidden;opacity:0;transition:all .45s}
  .gb-item:hover{color:var(--muted)}
  .gb-item.on{color:#fff;background:color-mix(in srgb, var(--c) 22%, transparent);
    box-shadow:0 0 22px -4px var(--c), inset 0 0 0 1px color-mix(in srgb,var(--c) 60%, transparent)}
  .gb-item.on svg{color:var(--c)}
  .gb-item.on span{max-width:140px;opacity:1;color:#fff}

  /* ===== product tour panel ===== */
  #tourframe{position:fixed;right:clamp(20px,4vw,70px);top:50%;transform:translateY(-50%) translateX(30px);
    width:clamp(320px,33vw,520px);z-index:5;opacity:0;pointer-events:none;
    transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
  #tourframe.show{opacity:1;transform:translateY(-50%) translateX(0)}
  .tf-win{border-radius:16px;overflow:hidden;border:1px solid rgba(150,175,220,.16);
    background:linear-gradient(180deg,rgba(20,28,48,.82),rgba(10,15,28,.78));backdrop-filter:blur(16px);
    box-shadow:0 40px 110px rgba(0,0,0,.6), 0 0 60px -20px var(--c)}
  .tf-bar{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid rgba(150,175,220,.1)}
  .tf-dot{width:9px;height:9px;border-radius:50%;background:rgba(150,175,220,.3)}
  .tf-title{margin-left:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .tf-toggle{margin-left:auto;display:flex;gap:0;border:1px solid rgba(150,175,220,.18);border-radius:100px;overflow:hidden}
  .tf-toggle b{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.1em;font-size:8.5px;padding:5px 11px;text-transform:uppercase}
  .tf-toggle .a{background:var(--c);color:#04060d}
  .tf-toggle .b{color:var(--muted)}
  .tf-body{padding:18px;min-height:210px;position:relative}
  .tf-img{width:100%;border-radius:8px;display:block}
  .tf-mock{display:flex;flex-direction:column;gap:12px}
  .tf-kpis{display:flex;gap:10px}
  .tf-kpi{flex:1;border-radius:9px;padding:12px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(150,175,220,.08)}
  .tf-kpi .v{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--c);line-height:1}
  .tf-kpi .k{font-family:'Montserrat';font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .tf-chart{height:78px;border-radius:9px;background:rgba(255,255,255,.02);border:1px solid rgba(150,175,220,.08);
    display:flex;align-items:flex-end;gap:5px;padding:10px}
  .tf-chart i{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--c),transparent)}
  .tf-cap{position:absolute;bottom:10px;left:18px;font-family:'Orbitron',sans-serif;font-weight:600;
    letter-spacing:.18em;font-size:9px;text-transform:uppercase;color:var(--muted)}
  .tf-foot{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid rgba(150,175,220,.1)}
  .tf-foot .d{width:8px;height:8px;border-radius:50%;background:var(--c);box-shadow:0 0 12px var(--c)}
  .tf-foot .t{font-family:'Orbitron',sans-serif;font-weight:600;letter-spacing:.16em;font-size:9px;text-transform:uppercase;color:var(--muted)}

  @media (max-width:760px){
    #passport{left:18px;right:18px;width:auto;top:auto;bottom:300px;transform:translateY(20px)}
    #passport.show{transform:translateY(0)}
    #answer{right:18px;left:18px;width:auto;top:auto;bottom:90px;transform:translateY(20px)}
    #answer.show{transform:translateY(0)}
    #tourframe{left:18px;right:18px;width:auto;top:auto;bottom:20px;transform:translateY(20px)}
    #tourframe.show{transform:translateY(0)}
    .gb-item.on span{max-width:90px}
  }
</style>
</head>
<body>

  <div id="flash"></div>

  <div id="brand"><div class="orb"></div><div class="txt">RMO&nbsp;COSMO<span>&nbsp;&nbsp;·&nbsp;&nbsp;Operational Memory</span></div></div>
  <div id="nav">
    <div class="navbtn" id="prevBtn" title="Back (←)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="navbtn" id="nextBtn" title="Next (→)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>

  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ============================================================
   GUARDIANS OF AL SHAHEEN — RMO COSMO cinematic opener
   Universe model: Cosmo=Sun · Guardians=Planets ·
   Tables=Satellites · Columns=Signals · Relationships=Gravity
   ============================================================ */

const GUARDIANS = [
  { name:'WELLWATCH', color:0x3b82f6, r:20, size:1.7, sats:6,  pioneer:true,
    role:'Well Surveillance & Diagnostics', tag:'The Watchman',
    mission:'I watch every well and every test \u2014 so no warning waits for you to find it.', tables:8, cols:74,
    value:'Continuous well integrity and live test interpretation, flagged the moment something drifts.' },
  { name:'WELLNOVA', color:0x16d6a3, r:26, size:1.7, sats:10, pioneer:true,
    role:'Reservoir Performance Intelligence', tag:'The Storykeeper',
    mission:'I keep every well\u2019s story current \u2014 so you read it, not rebuild it.', tables:10, cols:96,
    value:'Every well measured against its promise \u2014 what\u2019s delivering, what\u2019s lagging, and why.' },
  { name:'WELLAION', color:0x8b5cf6, r:32, size:1.4, sats:6, pioneer:false,
    role:'Well Maturation & Opportunity', tag:'The Opportunity Scout',
    mission:'I sort the opportunities \u2014 so your time goes only to the ones worth taking.', tables:6, cols:58,
    value:'Stimulation candidates on a hard gate \u2014 good\u2192better only, so weak prospects never reach you.' },
  { name:'WELLNEXUS', color:0xec4899, r:38, size:1.4, sats:6, pioneer:false,
    role:'Flow Assurance & Sweep', tag:'The Pattern Keeper',
    mission:'I watch how the field is swept \u2014 so imbalance surfaces before the water does.', tables:5, cols:52,
    value:'VRR, sweep and connectivity across ~290 patterns \u2014 under- and over-supported flagged early.' },
  { name:'GEAGUARD', color:0xf97316, r:44, size:1.5, sats:5, pioneer:false,
    role:'Geophysical Synthesis', tag:'The Subsurface Sentinel',
    mission:'I tie the seismic to the wells \u2014 so the picture is ready before you ask.', tables:4, cols:46,
    value:'4D seismic, faults and fractures linked to performance and containment \u2014 geophysics and production, one story.' },
  { name:'GEAVISION', color:0x22d3ee, r:50, size:1.9, sats:7, pioneer:false,
    role:'Geological Modelling & 2G&R', tag:'The Integrated Story',
    mission:'I bring the whole subsurface into one view \u2014 so you see it all at a glance.', tables:6, cols:61,
    value:'Instant, deterministic synthesis \u2014 geology, petrophysics, geophysics and production, in one picture.' },
  { name:'PRISMO', color:0xf5b042, r:56, size:1.6, sats:15, pioneer:false,
    role:'Daily Production Surveillance', tag:'The Eyes of the Field',
    mission:'I watch the field\u2019s pulse every morning \u2014 so you never start blind.', tables:15, cols:112,
    value:'Production awareness, anomaly detection and daily prioritisation \u2014 every rate, every well, sorted before you sit down.' },
];

const COSMO = { name:'COSMO', color:0xffb347,
  role:'The Synthesizer \u00b7 Head of the Watch', tag:'Operational Memory of Al Shaheen',
  mission:'I hold what all eight know \u2014 so you ask once, and hear everything.', tables:40, cols:499,
  value:'Cross-domain synthesis across all 40 tables \u2014 every agent\u2019s view drawn into one answer.' };

function hex(c){ return '#'+('000000'+c.toString(16)).slice(-6); }

/* ---------------- Three.js scene ---------------- */
let scene, camera, renderer, clock;
let sun, sunCore, sunGlow, sunShells=[], corona, ember;
let humanCore, humanGlow, humanActive=false, humanPhase=0;
let planets=[]; // {group, core, glow, ring, pivot, angle, speed, data, satGroup}
let starfield, dust;
let orbitSpeed = 1;        // global orbit multiplier
let sunGlowBase = 1;       // dimmable during passports
const sunGlowProxy = {v:1};
let camTarget = new THREE.Vector3(0,0,0);
let focusPlanet = null;    // planet object to track during passport
let autoRotate = 0.018;

const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

function makeGlowTexture(){
  const s=128, c=document.createElement('canvas'); c.width=c.height=s;
  const g=c.getContext('2d');
  const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0,'rgba(255,255,255,1)');
  grd.addColorStop(.2,'rgba(255,255,255,.85)');
  grd.addColorStop(.45,'rgba(255,255,255,.32)');
  grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=grd; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); return t;
}
const GLOW = ()=>makeGlowTexture();
let GLOWTEX;

function initScene(){
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x03050d, 0.0014);
  camera=new THREE.PerspectiveCamera(55, W()/H(), 0.1, 4000);
  camera.position.set(0, 40, 200);
  renderer=new THREE.WebGLRenderer({antialias:true, alpha:false});
  renderer.setSize(W(),H());
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x03050d,1);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.25;
  document.getElementById('scene').appendChild(renderer.domElement);
  clock=new THREE.Clock();
  GLOWTEX=makeGlowTexture();

  buildStars();
  buildDust();
  buildSun();
  buildPlanets();
  buildHumanCore();

  window.addEventListener('resize',onResize);
}

function buildStars(){
  const N=2600, geo=new THREE.BufferGeometry();
  const pos=new Float32Array(N*3), col=new Float32Array(N*3);
  const pal=[[1,1,1],[.7,.8,1],[1,.92,.78],[.6,.85,1]];
  for(let i=0;i<N;i++){
    const r=300+Math.random()*1400;
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.cos(ph)*0.6;
    pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const c=pal[(Math.random()*pal.length)|0], k=.5+Math.random()*.5;
    col[i*3]=c[0]*k; col[i*3+1]=c[1]*k; col[i*3+2]=c[2]*k;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat=new THREE.PointsMaterial({size:2.2,vertexColors:true,transparent:true,opacity:.9,
    sizeAttenuation:true,depthWrite:false,blending:THREE.AdditiveBlending,map:GLOWTEX});
  starfield=new THREE.Points(geo,mat); scene.add(starfield);
}

function buildDust(){
  const N=700, geo=new THREE.BufferGeometry(), pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=40+Math.random()*120, a=Math.random()*Math.PI*2;
    pos[i*3]=Math.cos(a)*r; pos[i*3+1]=(Math.random()-.5)*40; pos[i*3+2]=Math.sin(a)*r;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({size:1.1,color:0x8fb4ff,transparent:true,opacity:.25,
    depthWrite:false,blending:THREE.AdditiveBlending,map:GLOWTEX,sizeAttenuation:true});
  dust=new THREE.Points(geo,mat); scene.add(dust);
}

function glowSprite(color,scale,opacity){
  const m=new THREE.SpriteMaterial({map:GLOWTEX,color:color,transparent:true,
    opacity:opacity,blending:THREE.AdditiveBlending,depthWrite:false});
  const s=new THREE.Sprite(m); s.scale.set(scale,scale,1); return s;
}

function buildSun(){
  sun=new THREE.Group(); scene.add(sun);
  // core
  sunCore=new THREE.Mesh(new THREE.SphereGeometry(5,48,48),
    new THREE.MeshBasicMaterial({color:0xfff2d0}));
  sun.add(sunCore);
  // additive shells
  const shellCols=[0xffd27f,0xff9d2f,0xff7b2f];
  shellCols.forEach((c,i)=>{
    const sh=new THREE.Mesh(new THREE.SphereGeometry(5+1.4*(i+1),32,32),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.16-i*0.04,
        blending:THREE.AdditiveBlending,depthWrite:false}));
    sun.add(sh); sunShells.push(sh);
  });
  // big glow
  sunGlow=glowSprite(0xffb347,46,.9); sun.add(sunGlow);
  const sunGlow2=glowSprite(0xfff2d0,20,.95); sun.add(sunGlow2); sunShells.push(sunGlow2);
  // corona particles
  const N=240, geo=new THREE.BufferGeometry(), pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=6+Math.random()*4, a=Math.random()*Math.PI*2, b=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(b)*Math.cos(a); pos[i*3+1]=r*Math.cos(b); pos[i*3+2]=r*Math.sin(b)*Math.sin(a);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  corona=new THREE.Points(geo,new THREE.PointsMaterial({size:1.8,color:0xffd27f,transparent:true,
    opacity:.7,blending:THREE.AdditiveBlending,depthWrite:false,map:GLOWTEX}));
  sun.add(corona);
  sun.scale.setScalar(0.001); // hidden until ignition
  sun.visible=false;
  // central ember — a quiet focal point during the opening, before ignition
  ember=glowSprite(0xffb347,9,0); ember.position.set(0,0,0); scene.add(ember);
}

/* The human guardian — a warm, slow-breathing light the whole system orbits.
   Revealed near the end: the guardian was never an agent. It is the engineer. */
function buildHumanCore(){
  humanCore=new THREE.Group();
  const core=new THREE.Mesh(new THREE.SphereGeometry(6.4,48,48),
    new THREE.MeshBasicMaterial({color:0xfff4e2}));
  humanCore.add(core);                       // children[0] = core
  const shells=[];
  [0xffe6c2,0xffd49a,0xffc488].forEach((c,i)=>{
    const sh=new THREE.Mesh(new THREE.SphereGeometry(6.4+2.2*(i+1),32,32),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:0,
        blending:THREE.AdditiveBlending,depthWrite:false}));
    humanCore.add(sh); shells.push(sh);
  });
  humanGlow=glowSprite(0xffd9a0,64,0); humanCore.add(humanGlow);
  const hg2=glowSprite(0xfff4e2,28,0); humanCore.add(hg2);
  humanCore.userData={glows:[humanGlow,hg2], shells};
  humanCore.scale.setScalar(0.001); humanCore.visible=false; humanCore.position.set(0,0,0);
  scene.add(humanCore);
}
function ensureHuman(){
  if(!humanCore) return;
  gsap.killTweensOf(humanCore.scale);
  humanCore.visible=true; humanActive=true;
  gsap.to(humanCore.scale,{x:1,y:1,z:1,duration:2.0,ease:'power2.out'});
  humanCore.userData.glows.forEach((g,i)=>{ gsap.killTweensOf(g.material); gsap.to(g.material,{opacity:i===0?0.9:0.95,duration:1.8}); });
  humanCore.userData.shells.forEach((s,i)=>{ gsap.killTweensOf(s.material); gsap.to(s.material,{opacity:0.15-i*0.045,duration:1.8}); });
}
function hideHuman(){
  if(!humanCore || (!humanActive && !humanCore.visible)) return;
  humanActive=false;
  gsap.killTweensOf(humanCore.scale);
  gsap.to(humanCore.scale,{x:0.001,y:0.001,z:0.001,duration:.9,onComplete:()=>{humanCore.visible=false;}});
  humanCore.userData.glows.forEach(g=>{ gsap.killTweensOf(g.material); gsap.to(g.material,{opacity:0,duration:.8}); });
  humanCore.userData.shells.forEach(s=>{ gsap.killTweensOf(s.material); gsap.to(s.material,{opacity:0,duration:.8}); });
}

function buildPlanets(){
  GUARDIANS.forEach((g,i)=>{
    const pivot=new THREE.Group(); scene.add(pivot);
    const group=new THREE.Group();
    group.position.set(g.r,0,0);
    // core
    const core=new THREE.Mesh(new THREE.SphereGeometry(g.size,36,36),
      new THREE.MeshBasicMaterial({color:g.color}));
    group.add(core);
    // inner bright
    const inner=new THREE.Mesh(new THREE.SphereGeometry(g.size*0.55,24,24),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.5,blending:THREE.AdditiveBlending}));
    group.add(inner);
    // glow
    const glow=glowSprite(g.color,g.size*7,.85); group.add(glow);
    // pioneer gold ring (halo)
    if(g.pioneer){
      const ringGeo=new THREE.TorusGeometry(g.size*1.7,0.08,8,64);
      const ring=new THREE.Mesh(ringGeo,new THREE.MeshBasicMaterial({color:0xffd27f,transparent:true,opacity:.9}));
      ring.rotation.x=Math.PI*0.5; group.add(ring);
      const ringGlow=glowSprite(0xffd27f,g.size*4.4,.5); group.add(ringGlow);
    }
    // satellites (tables)
    const satGroup=new THREE.Group(); group.add(satGroup);
    const sats=[];
    for(let s=0;s<g.sats;s++){
      const sr=g.size*1.8+Math.random()*g.size*1.6;
      const sa=Math.random()*Math.PI*2;
      const sm=new THREE.Mesh(new THREE.SphereGeometry(0.16+Math.random()*0.1,8,8),
        new THREE.MeshBasicMaterial({color:g.color}));
      const tilt=(Math.random()-.5)*0.8;
      sm.userData={sr,sa,sp:0.6+Math.random()*0.9,tilt};
      satGroup.add(sm); sats.push(sm);
    }
    group.scale.setScalar(0.001); group.visible=false;
    pivot.add(group);

    // orbit ring (gravity)
    const oGeo=new THREE.RingGeometry(g.r-0.06,g.r+0.06,160);
    const oMat=new THREE.MeshBasicMaterial({color:g.color,transparent:true,opacity:0,side:THREE.DoubleSide});
    const oRing=new THREE.Mesh(oGeo,oMat); oRing.rotation.x=-Math.PI/2; scene.add(oRing);

    planets.push({pivot,group,core,glow,satGroup,sats,oRing,data:g,
      angle:(i/GUARDIANS.length)*Math.PI*2, speed:(0.16-i*0.012)*0.6, born:false});
  });
}

function onResize(){
  camera.aspect=W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(),H());
}

/* ---------------- animation loop ---------------- */
let _elapsed=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  _elapsed+=dt;
  const t=_elapsed;

  if(starfield){ starfield.rotation.y+=0.00018; }
  if(dust){ dust.rotation.y-=0.0006; }

  // sun pulse
  if(sun&&sun.visible){
    const p=1+Math.sin(t*1.4)*0.025;
    sunCore.scale.setScalar(p);
    if(sunGlow){ sunGlow.material.opacity=(0.78+Math.sin(t*1.4)*0.12)*sunGlowBase; }
    corona.rotation.y+=0.004; corona.rotation.x+=0.002;
    sun.rotation.y+=0.0015;
  }

  // human guardian — slow, calm breathing (distinct from the sun's faster pulse)
  if(humanActive && humanCore && humanCore.visible){
    humanPhase += dt;
    const breath = 1 + Math.sin(humanPhase*1.15)*0.045;
    humanCore.children[0].scale.setScalar(breath);
    if(humanGlow) humanGlow.material.opacity = 0.8 + Math.sin(humanPhase*1.15)*0.12;
    humanCore.rotation.y += 0.0008;
  }

  // planets orbit
  planets.forEach(pl=>{
    if(pl.born){
      pl.angle += pl.speed*orbitSpeed*dt;
      pl.pivot.rotation.y = pl.angle;
      pl.core.rotation.y += 0.01;
      // satellites keep orbiting even when the system revolution is frozen
      pl.sats.forEach(s=>{
        s.userData.sa += s.userData.sp*dt;
        const u=s.userData;
        s.position.set(Math.cos(u.sa)*u.sr, Math.sin(u.sa)*u.sr*u.tilt, Math.sin(u.sa)*u.sr);
      });
    }
  });

  // camera target tracking (focus a planet during passport)
  if(focusPlanet){
    const wp=new THREE.Vector3();
    focusPlanet.group.getWorldPosition(wp);
    camTarget.lerp(wp, 0.08);
  }
  camera.lookAt(camTarget);

  updateConnector(t);

  renderer.render(scene,camera);
}

/* ---------------- world-position helper ---------------- */
function planetWorldPos(pl){
  const wp=new THREE.Vector3(); pl.group.getWorldPosition(wp); return wp;
}

/* ---------------- connector (pill -> planet) ---------------- */
const connEl=document.getElementById('connector');
const cLine=document.getElementById('cline');
const cMark=document.getElementById('cmark');
const cMark2=document.getElementById('cmark2');
let connActive=false;
function showConnector(pl){
  connActive=true; const col=hex(pl.data.color);
  cLine.setAttribute('stroke',col);
  cMark.setAttribute('fill','none'); cMark.setAttribute('stroke',col); cMark.setAttribute('stroke-width','1.6');
  cMark2.setAttribute('fill',col); cMark2.setAttribute('opacity','0.9');
  connEl.style.opacity='1';
}
function hideConnector(){ connActive=false; connEl.style.opacity='0'; }
function updateConnector(t){
  if(!connActive||!focusPlanet) return;
  const wp=planetWorldPos(focusPlanet).project(camera);
  if(wp.z>1){ connEl.style.opacity='0'; return; } else { connEl.style.opacity='1'; }
  const x=(wp.x*0.5+0.5)*W(), y=(-wp.y*0.5+0.5)*H();
  // anchor at the passport badge (the "pill")
  const badge=passportEl.querySelector('.pp-badge');
  let ax=W()*0.18, ay=H()*0.5;
  if(badge){ const r=badge.getBoundingClientRect(); ax=r.right+6; ay=r.top+r.height/2; }
  const mx=(ax+x)/2, my=Math.min(ay,y)-Math.abs(x-ax)*0.12-30;
  cLine.setAttribute('d',`M ${ax.toFixed(1)} ${ay.toFixed(1)} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)}`);
  const pr=10+Math.sin(t*3)*2.4;
  cMark.setAttribute('cx',x); cMark.setAttribute('cy',y); cMark.setAttribute('r',pr.toFixed(1));
  cMark2.setAttribute('cx',ax); cMark2.setAttribute('cy',ay); cMark2.setAttribute('r','3.2');
}

/* ---------------- guardian focus / reset ---------------- */
let activeFly=null;
function heroPlanet(idx){
  planets.forEach((p,i)=>{
    const on=i===idx, s=on?1.25:0.78;
    gsap.to(p.group.scale,{x:s,y:s,z:s,duration:1.1,ease:'power3.out'});
    gsap.to(p.glow.material,{opacity:on?1.0:0.14,duration:1});
    gsap.to(p.oRing.material,{opacity:on?0.34:0.03,duration:1});
  });
  gsap.to(sunGlowProxy,{v:0.2,duration:1,onUpdate:()=>sunGlowBase=sunGlowProxy.v});
}
function flyToGuardian(idx){
  // kill any in-flight move so fast clicks don't stack
  if(activeFly) activeFly.kill();
  gsap.killTweensOf(camera.position); gsap.killTweensOf(camTarget);
  focusPlanet=null;                       // release tracking during the flight
  hideConnector(); hideTour();
  passportEl.classList.remove('show');
  tweenOrbit(0,0.8);                       // freeze the system for a stable hero frame

  const pl=planets[idx], g=pl.data;
  const P=planetWorldPos(pl);
  const radial=new THREE.Vector3(P.x,0,P.z).normalize();
  const tan=new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0),radial).normalize();
  const D=10+g.size*2.2, h=2.4;
  const hero=new THREE.Vector3(P.x+tan.x*D, P.y+h, P.z+tan.z*D);
  // shift the camera so the planet sits left-of-centre, leaving the right for the tour panel
  const fwd=new THREE.Vector3().subVectors(P,hero).normalize();
  const right=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
  hero.add(right.multiplyScalar(11));

  showGuardBar(); setGuardBar(idx);        // context appears right away

  const tl=gsap.timeline(); activeFly=tl;
  // PHASE 1 — pull back to the whole constellation
  tl.call(()=>resetGuardianVisuals(),null,0);
  tl.to(camera.position,{x:0,y:62,z:196,duration:1.1,ease:'power2.inOut'},0);
  tl.to(camTarget,{x:0,y:0,z:0,duration:1.1,ease:'power2.inOut'},0);
  // PHASE 2 — dive into the chosen guardian
  tl.to(camera.position,{x:hero.x,y:hero.y,z:hero.z,duration:1.65,ease:'power3.out'},1.1);
  tl.to(camTarget,{x:P.x,y:P.y,z:P.z,duration:1.65,ease:'power3.out'},1.1);
  tl.call(()=>heroPlanet(idx),null,1.25);  // glow it up as we approach
  tl.call(()=>{ focusPlanet=pl; passport(idx); showTour(g); },null,2.75);
}
function resetGuardianVisuals(){
  hideConnector();
  planets.forEach(p=>{
    gsap.to(p.group.scale,{x:1,y:1,z:1,duration:1.1,ease:'power2.out'});
    gsap.to(p.glow.material,{opacity:0.85,duration:1});
    gsap.to(p.oRing.material,{opacity:0.1,duration:1});
  });
  gsap.to(sunGlowProxy,{v:1,duration:1.2,onUpdate:()=>sunGlowBase=sunGlowProxy.v});
}


/* ============================================================
   STEP MACHINE (the cinematic acts)
   ============================================================ */
const overlay=document.getElementById('overlay');

// build reusable caption nodes
function cap(html){ const d=document.createElement('div'); d.className='cap'; d.innerHTML=html; overlay.appendChild(d); return d; }

// passport + answer + finale containers
const passportEl=document.createElement('div'); passportEl.id='passport'; overlay.appendChild(passportEl);
const answerEl=document.createElement('div'); answerEl.id='answer'; overlay.appendChild(answerEl);
const finaleEl=document.createElement('div'); finaleEl.id='finale'; overlay.appendChild(finaleEl);

function hideAllCaps(){ document.querySelectorAll('.cap').forEach(c=>c.classList.remove('show'));
  passportEl.classList.remove('show'); answerEl.classList.remove('show'); finaleEl.classList.remove('show');
  hideTour(); hideGuardBar(); }

function flash(strength=0.9,dur=0.5){
  const f=document.getElementById('flash');
  gsap.killTweensOf(f); f.style.opacity=strength;
  gsap.to(f,{opacity:0,duration:dur,ease:'power2.out'});
}

function camTo(pos,target,dur=2.2,ease='power2.inOut'){
  gsap.to(camera.position,{x:pos[0],y:pos[1],z:pos[2],duration:dur,ease:ease});
  gsap.to(camTarget,{x:target[0],y:target[1],z:target[2],duration:dur,ease:ease});
}
function camPos(pos,dur=2.0,ease='power2.inOut'){
  gsap.to(camera.position,{x:pos[0],y:pos[1],z:pos[2],duration:dur,ease:ease});
}

function ignite(){
  if(sun.visible) return;
  sun.visible=true;
  flash(0.95,0.9);
  gsap.fromTo(sun.scale,{x:0.001,y:0.001,z:0.001},{x:1,y:1,z:1,duration:1.6,ease:'elastic.out(1,0.6)'});
}

function birthPlanet(idx,delay=0){
  const pl=planets[idx]; if(pl.born) return;
  pl.born=true; pl.group.visible=true;
  gsap.to(pl.group.scale,{x:1,y:1,z:1,duration:1.1,delay:delay,ease:'back.out(1.7)'});
  gsap.to(pl.oRing.material,{opacity:0.10,duration:1.4,delay:delay});
  // little spark
  setTimeout(()=>flash(0.25,0.4), delay*1000);
}

// orbit tween via proxy object
const orbitProxy={v:1};
function tweenOrbit(v,dur=1.5){ gsap.killTweensOf(orbitProxy); gsap.to(orbitProxy,{v:v,duration:dur,ease:'power2.inOut',onUpdate:()=>{orbitSpeed=orbitProxy.v;}});}

const SERVE={
  WELLWATCH:'So your attention goes only where it\u2019s needed.',
  WELLNOVA:'So you read the story instead of assembling it.',
  WELLAION:'So your effort lands on the wells that pay back.',
  WELLNEXUS:'So you rebalance a pattern before it\u2019s a problem.',
  GEAGUARD:'So the seismic is waiting, already joined to the wells.',
  GEAVISION:'So five disciplines become one screen \u2014 in seconds.',
  PRISMO:'So your morning starts with answers, not a blank screen.',
  COSMO:'So you ask once, hear all eight \u2014 and the decision stays yours.'
};
function passport(idx){
  const g = idx<GUARDIANS.length ? GUARDIANS[idx] : null;
  const data = g || COSMO;
  const col = hex(data.color);
  passportEl.style.color=col;
  passportEl.innerHTML=`
    ${data.pioneer ? `<div class="pp-pioneer">\u2605 Qatar\u2019s First</div>` : ''}
    <div class="pp-badge" style="color:${col}"><span class="dot"></span>${data.tag}</div>
    <div class="pp-name" style="color:${col}">${data.name}</div>
    <div class="pp-tag">${data.role}</div>
    <div class="pp-mission">\u201C${data.mission}\u201D</div>
    <div class="pp-grid">
      <div class="m"><div class="v">${data.tables}</div><div class="k">Domains</div></div>
      <div class="m"><div class="v">${data.cols}</div><div class="k">Signals</div></div>
    </div>
    <div class="pp-value">${data.value}</div>
    <div class="pp-serve">\u2192 ${SERVE[data.name]||''}</div>`;
  passportEl.classList.add('show');
}

};
const guardbarEl=document.getElementById('guardbar');
function buildGuardBar(){
  const all=[...GUARDIANS, COSMO];
  // find the step index for each guardian + cosmo from the tagged steps
  const stepFor={};
  STEPS.forEach((s,i)=>{ if(s.gIdx!==undefined) stepFor['g'+s.gIdx]=i; if(s.isCosmo) stepFor.cosmo=i; });
  guardbarEl.innerHTML=all.map((d,i)=>{
    const target = i<GUARDIANS.length ? stepFor['g'+i] : stepFor.cosmo;
    return `<div class="gb-item" data-step="${target}" style="--c:${hex(d.color)}">
      <svg viewBox="0 0 24 24">${ICONS[d.name]||''}</svg><span>${d.name}</span></div>`;
  }).join('');
  guardbarEl.querySelectorAll('.gb-item').forEach(it=>it.onclick=()=>goto(+it.dataset.step));
}
function setGuardBar(idx){ // idx in 0..7 (7 = cosmo)
  guardbarEl.querySelectorAll('.gb-item').forEach((it,i)=>it.classList.toggle('on',i===idx));
}
function showGuardBar(){ guardbarEl.classList.add('show'); document.getElementById('nav').classList.add('show'); }
function hideGuardBar(){ guardbarEl.classList.remove('show'); }

/* ---------------- navigation ---------------- */
function goto(n){
  n=Math.max(0,Math.min(STEPS.length-1,n));
  if(activeFly){ activeFly.kill(); activeFly=null; }
  gsap.killTweensOf(camera.position); gsap.killTweensOf(camTarget);
  if(!STEPS[n].keepHuman) hideHuman();
  step=n; STEPS[n].on(); paintDots();
  // hide hint after first advance
  if(n>0) gsap.to('#hint',{opacity:0,duration:.6});
  else gsap.to('#hint',{opacity:1,duration:.6});
}
function next(){ if(step<STEPS.length-1) goto(step+1); }
function prev(){ if(step>0) goto(step-1); }

/* progress dots */
const prog=document.getElementById('progress');
function buildDots(){
  // group dots into the 6 narrative acts for cleanliness
  const acts=[0,1,3,4,5,12,13,14]; // representative anchors
  // simpler: one dot per step but small
  prog.innerHTML='';
  STEPS.forEach((s,i)=>{ const d=document.createElement('div'); d.className='pdot'; d.dataset.i=i;
    d.onclick=()=>goto(i); prog.appendChild(d); });
}
function paintDots(){ document.querySelectorAll('.pdot').forEach((d,i)=>d.classList.toggle('on',i===step)); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter'){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); prev(); }
  else if(e.key.toLowerCase()==='r'){ resetAll(); }
});
document.getElementById('nextBtn').onclick=next;
document.getElementById('prevBtn').onclick=prev;
renderer_clickable();
function renderer_clickable(){
  document.getElementById('scene').addEventListener('click',()=>next());
}

function resetAll(){
  if(activeFly){ activeFly.kill(); activeFly=null; }
  gsap.killTweensOf(camera.position); gsap.killTweensOf(camTarget);
  // reset planets
  planets.forEach((pl)=>{ pl.born=false; pl.group.visible=false; pl.group.scale.setScalar(0.001);
    pl.oRing.material.opacity=0; pl.glow.material.opacity=0.85; });
  sun.visible=false; sun.scale.setScalar(0.001);
  if(ember) ember.material.opacity=0;
  if(humanCore){ humanActive=false; humanCore.visible=false; humanCore.scale.setScalar(0.001);
    humanCore.userData.glows.forEach(g=>g.material.opacity=0); humanCore.userData.shells.forEach(s=>s.material.opacity=0); }
  orbitSpeed=1; orbitProxy.v=1; focusPlanet=null;
  sunGlowBase=1; sunGlowProxy.v=1; hideConnector();
  goto(0);
}

/* ---------------- boot ---------------- */
function boot(){
  initScene();
  animate();
  buildDots();
  buildGuardBar();
  // reveal begin button when ready
  setTimeout(()=>document.getElementById('begin').classList.add('show'), 900);
}
document.getElementById('begin').onclick=()=>{
  const l=document.getElementById('loader'); l.classList.add('hide');
  document.getElementById('nav').classList.add('show');
  setTimeout(()=>{ l.style.display='none'; goto(0); }, 1200);
};

// kick off after libs load
if(window.THREE && window.gsap){ boot(); }
else { window.addEventListener('load',boot); }
</script>
