:root{--bg:#f4f8ff;--bg2:#eefaff;--ink:#07111f;--muted:#64748b;--faint:#9aa9bd;--panel:rgba(255,255,255,.8);--solid:#fff;--line:rgba(7,17,31,.1);--line2:rgba(7,17,31,.18);--a:#2f6bff;--b:#54c7ec;--good:#12b981;--bad:#ef4444;--shadow:0 20px 52px rgba(47,107,255,.14);--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,sans-serif;color-scheme:light}[data-theme=dark]{--bg:#07111f;--bg2:#101827;--ink:#f6fbff;--muted:#adc1d8;--faint:#71849c;--panel:rgba(17,27,44,.8);--solid:#111b2c;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.18);--shadow:0 20px 52px rgba(0,0,0,.42);color-scheme:dark}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg)}body{font-family:var(--font);color:var(--ink);background:radial-gradient(circle at 18% 0,rgba(47,107,255,.2),transparent 34%),radial-gradient(circle at 90% 12%,rgba(84,199,236,.18),transparent 34%),linear-gradient(180deg,var(--bg),var(--bg2));-webkit-font-smoothing:antialiased}button,input,select{font:inherit;color:inherit}button{border:0;background:none;cursor:pointer}h1,h2,h3,p{margin:0}.app{height:100dvh;max-width:560px;margin:0 auto;position:relative;display:flex;flex-direction:column;overflow:hidden}.safe{height:max(env(safe-area-inset-top),10px)}.top{display:flex;gap:12px;align-items:center;padding:4px 18px 14px}.mark{width:46px;height:46px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:1000;box-shadow:0 8px 24px rgba(47,107,255,.18)}.head{flex:1}.kicker{font-size:11px;font-weight:900;color:var(--faint);letter-spacing:.13em;text-transform:uppercase}.title{font-size:29px;letter-spacing:-.04em;line-height:1.03}.chip{height:38px;border-radius:999px;padding:0 12px;background:var(--panel);border:1px solid var(--line);font-size:13px;font-weight:900}.screens{flex:1;min-height:0;position:relative}.screen{position:absolute;inset:0;display:none;overflow:hidden}.screen.on{display:flex;flex-direction:column;animation:rise .24s both}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}.scroll{flex:1;overflow:auto;overflow-x:hidden;padding:0 18px 112px;scrollbar-width:none}.scroll::-webkit-scrollbar,.sheet-panel::-webkit-scrollbar{display:none}.hero,.card,.stat,.row,.nav,.panel,.sheet-panel,.seg,.match{background:var(--panel);border:1px solid var(--line);box-shadow:0 8px 24px rgba(7,17,31,.09);backdrop-filter:blur(24px)}.hero{border-radius:32px;padding:16px;box-shadow:var(--shadow)}.hero h2{font-size:28px;line-height:1.06;letter-spacing:-.035em}.hero p{font-size:13.5px;line-height:1.43;color:var(--muted);margin-top:8px}.primary{height:52px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:0 18px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-size:15.5px;font-weight:900;box-shadow:0 16px 34px rgba(47,107,255,.22);transition:transform .12s}.primary.ghost{background:var(--solid);color:var(--ink);border:1px solid var(--line);box-shadow:none}.primary:active,.row:active,.nav button:active,.scorebtn:active{transform:scale(.97)}.hero .primary{margin-top:14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px}.stat{min-height:74px;border-radius:20px;padding:11px}.stat b{display:block;font-size:21px}.stat span{font-size:9.8px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.section{display:flex;justify-content:space-between;align-items:center;margin:22px 4px 10px;color:var(--faint);font-size:11px;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.section button{font-size:12px;color:var(--a);font-weight:900;text-transform:none;letter-spacing:0}.row{width:100%;border-radius:24px;padding:14px;margin-bottom:10px;display:flex;gap:13px;align-items:center;text-align:left}.badge{width:48px;height:48px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:1000}.row h3,.card h3{font-size:15.5px}.row p,.card p{font-size:12.5px;color:var(--muted);line-height:1.36;margin-top:3px}.form{display:grid;grid-template-columns:1fr auto;gap:8px}.input{height:48px;border-radius:16px;border:1px solid var(--line);background:var(--solid);padding:0 13px;outline:none}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;border-radius:18px;margin-bottom:12px}.seg button{height:38px;border-radius:14px;color:var(--muted);font-size:13px;font-weight:900}.seg button.on{background:var(--solid);color:var(--ink);box-shadow:0 8px 18px rgba(7,17,31,.08)}.panel{border-radius:26px;padding:16px}.match{border-radius:24px;padding:14px;margin-bottom:10px}.teams{display:grid;gap:8px;margin-top:10px}.team{border-radius:16px;background:var(--solid);border:1px solid var(--line);padding:10px;font-weight:900}.scoregrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.scorebtn{height:52px;border-radius:16px;background:var(--solid);border:1px solid var(--line);font-size:22px;font-weight:1000}.leader{display:grid;grid-template-columns:34px 1fr 58px 52px;gap:8px;align-items:center;border-radius:16px;background:var(--solid);border:1px solid var(--line);padding:10px;margin-bottom:8px;font-weight:900}.nav{position:absolute;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));height:74px;border-radius:28px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);z-index:20}.nav button{border-radius:21px;color:var(--faint);font-size:10.5px;font-weight:900}.nav button.on{background:var(--solid);color:var(--a);box-shadow:0 8px 18px rgba(7,17,31,.08)}.sheet{position:absolute;inset:0;z-index:60;display:none;background:rgba(7,17,31,.32);backdrop-filter:blur(5px)}.sheet.on{display:flex}.sheet-panel{width:calc(100% - 20px);max-height:86dvh;overflow:auto;margin:auto 10px 10px;border-radius:32px;padding:10px 18px calc(18px + env(safe-area-inset-bottom));scrollbar-width:none}.grab{width:42px;height:5px;border-radius:999px;background:var(--line2);margin:0 auto 13px}.toast{position:absolute;left:50%;bottom:calc(94px + env(safe-area-inset-bottom));transform:translate(-50%,16px);opacity:0;z-index:80;padding:12px 16px;border-radius:999px;background:rgba(7,17,31,.94);color:#fff;font-size:13.5px;font-weight:900;transition:.2s}.toast.on{opacity:1;transform:translate(-50%,0)}@media(max-width:430px){.stats{grid-template-columns:repeat(2,1fr)}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}</style></head><body><div class="app"><div class="safe"></div><header class="top"><div class="mark">PA</div><div class="head"><div class="kicker">Americano manager</div><h1 class="title" id="viewTitle">Setup</h1></div><button class="chip" id="themeBtn">Mode</button></header><main class="screens"><section class="screen on" id="s-setup"><div class="scroll"><div class="hero"><h2>Generate fair padel rounds in seconds.</h2><p>Add players, pick points and courts, enter scores, and let the live board do the math.</p><button class="primary" id="sampleBtn">Use sample players</button></div><div class="stats" id="stats"></div><div class="section"><span>Tournament</span><button id="generateBtn">Generate</button></div><div class="panel"><div class="seg" id="formatSeg"><button class="on" data-format="americano">Americano</button><button data-format="mexicano">Mexicano</button><button data-format="social">Social</button></div><div class="seg" id="pointSeg"><button data-points="16">16</button><button class="on" data-points="21">21</button><button data-points="24">24</button></div><div class="form"><input class="input" id="eventName" placeholder="Event name"><button class="primary" id="saveSetup">Save</button></div></div></div></section><section class="screen" id="s-players"><div class="scroll"><div class="section"><span>Players</span><button id="clearPlayers">Clear</button></div><div class="form"><input class="input" id="playerName" placeholder="Add player"><button class="primary" id="addPlayer">Add</button></div><div style="height:12px"></div><div id="playersList"></div></div></section><section class="screen" id="s-matches"><div class="scroll"><div class="section"><span>Matches</span><button id="regenBtn">Regenerate</button></div><div id="matchesList"></div></div></section><section class="screen" id="s-board"><div class="scroll"><div class="section"><span>Leaderboard</span><button id="copyBtn">Copy results</button></div><div id="boardList"></div></div></section></main><nav class="nav"><button class="on" data-tab="setup">Setup</button><button data-tab="players">Players</button><button data-tab="matches">Matches</button><button data-tab="board">Board</button></nav><section class="sheet" id="sheet"><div class="sheet-panel"><div class="grab"></div><h2>Padel Americano rebuilt.</h2><p>Simpler flow: setup, players, matches, board. Designed for courtside use.</p><div class="section" style="margin:16px 0 0"><button class="primary" id="beginBtn">Begin</button><button class="primary ghost" id="laterBtn">Not now</button></div></div></section><div class="toast" id="toast"></div></div><script>
const APP={appId:"padel-americano",storagePrefix:"kinetik_padel_americano_"};const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));const Bridge={embedded:window.self!==window.top,context:{people:[]},send(type,payload){if(this.embedded)parent.postMessage({type,appId:APP.appId,payload},"*")}};if(Bridge.embedded)document.body.classList.add("embedded");const DEF={theme:"light",seenIntro:false,eventName:"Friday Padel",format:"americano",points:21,courts:1,players:[],matches:[],updatedAt:0};let S=load();function load(){try{return{...DEF,...JSON.parse(localStorage.getItem(APP.storagePrefix+"state")||"{}")}}catch(e){return{...DEF}}}function save(){S.updatedAt=Date.now();localStorage.setItem(APP.storagePrefix+"state",JSON.stringify(S));Bridge.send("DATA_UPDATE",{collection:"tournaments",payload:S})}function toast(t){const el=$("#toast");el.textContent=t;el.classList.add("on");Bridge.send("SHOW_TOAST",{message:t});clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove("on"),1500)}function id(){return Math.random().toString(36).slice(2,9)}function render(){document.documentElement.dataset.theme=S.theme;$("#eventName").value=S.eventName;$$("[data-format]").forEach(b=>b.classList.toggle("on",b.dataset.format===S.format));$$("[data-points]").forEach(b=>b.classList.toggle("on",Number(b.dataset.points)===S.points));renderStats();renderPlayers();renderMatches();renderBoard()}function renderStats(){const done=S.matches.filter(m=>Number.isFinite(m.a)&&Number.isFinite(m.b)).length;$("#stats").innerHTML=[["Players",S.players.length],["Matches",S.matches.length],["Scored",done],["Points",S.points]].map(x=>'<div class="stat"><b>'+x[1]+'</b><span>'+x[0]+'</span></div>').join("")}function renderPlayers(){if(!S.players.length){$("#playersList").innerHTML='<div class="panel"><h3>No players yet</h3><p>Add at least 4 players or use sample players.</p></div>';return}$("#playersList").innerHTML=S.players.map((p,i)=>'<div class="row"><div class="badge">'+(i+1)+'</div><div><h3>'+safe(p.name)+'</h3><p>Ready to rotate</p></div><button class="chip" data-remove="'+p.id+'">Remove</button></div>').join("")}function safe(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}function addPlayer(name){name=String(name||"").trim();if(!name)return;if(S.players.some(p=>p.name.toLowerCase()===name.toLowerCase()))return toast("Already added");S.players.push({id:id(),name});save();render()}function generate(){if(S.players.length<4)return toast("Add at least 4 players");const players=[...S.players];const n=players.length;const rounds=Math.min(n%2? n : n-1,8);let arr=[...players];if(arr.length%2)arr.push({id:"bye",name:"Sit out"});const matches=[];for(let r=0;r<rounds;r++){const active=[];for(let i=0;i<arr.length/2;i++){const p1=arr[i],p2=arr[arr.length-1-i];if(p1.id!=="bye")active.push(p1);if(p2.id!=="bye")active.push(p2)}for(let j=0;j+3<active.length;j+=4){matches.push({id:id(),round:r+1,court:j/4+1,teamA:[active[j].id,active[j+3].id],teamB:[active[j+1].id,active[j+2].id],a:null,b:null})}arr=[arr[0],arr[arr.length-1],...arr.slice(1,arr.length-1)]}S.matches=matches;Bridge.send("DATA_CREATE",{collection:"tournaments",payload:{eventName:S.eventName,players:S.players.length,matches:S.matches.length,createdAt:new Date().toISOString()}});save();render();switchTab("matches");toast("Matches generated")}function names(ids){return ids.map(id=>S.players.find(p=>p.id===id)?.name||"?").join(" / ")}function renderMatches(){if(!S.matches.length){$("#matchesList").innerHTML='<div class="panel"><h3>No matches yet</h3><p>Generate matches from setup.</p></div>';return}$("#matchesList").innerHTML=S.matches.map(m=>'<div class="match"><div class="row" style="box-shadow:none;background:transparent;border:0;padding:0;margin:0"><div class="badge">R'+m.round+'</div><div><h3>Court '+m.court+'</h3><p>Match '+m.round+'.'+m.court+'</p></div></div><div class="teams"><div class="team">A: '+safe(names(m.teamA))+'</div><div class="team">B: '+safe(names(m.teamB))+'</div></div><div class="scoregrid"><button class="scorebtn" data-score="'+m.id+'" data-side="a">'+(m.a??"A")+'</button><button class="scorebtn" data-score="'+m.id+'" data-side="b">'+(m.b??"B")+'</button></div></div>').join("")}function board(){const map={};S.players.forEach(p=>map[p.id]={name:p.name,pts:0,diff:0,played:0,w:0});S.matches.forEach(m=>{if(!Number.isFinite(m.a)||!Number.isFinite(m.b))return;[...m.teamA,...m.teamB].forEach(id=>map[id].played++);m.teamA.forEach(id=>{map[id].pts+=m.a;map[id].diff+=m.a-m.b;if(m.a>m.b)map[id].w++});m.teamB.forEach(id=>{map[id].pts+=m.b;map[id].diff+=m.b-m.a;if(m.b>m.a)map[id].w++})});return Object.values(map).sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.w-a.w)}function renderBoard(){const rows=board();$("#boardList").innerHTML=rows.length?rows.map((p,i)=>'<div class="leader"><div>'+Number(i+1)+'</div><div>'+safe(p.name)+'</div><div>'+p.pts+'</div><div>'+(p.diff>=0?"+":"")+p.diff+'</div></div>').join(""):'<div class="panel"><h3>No players yet</h3><p>Add players to see the board.</p></div>'}function score(id,side){const m=S.matches.find(x=>x.id===id);if(!m)return;let current=Number.isFinite(m[side])?m[side]:0;current=(current+1)%(S.points+1);m[side]=current;const other=side==="a"?"b":"a";if(current<=S.points&&!Number.isFinite(m[other]))m[other]=Math.max(0,S.points-current);if(m.a+m.b!==S.points)m[other]=Math.max(0,S.points-current);save();render()}function switchTab(t){$$(".screen").forEach(x=>x.classList.remove("on"));$("#s-"+t).classList.add("on");$$("[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));$("#viewTitle").textContent={setup:"Setup",players:"Players",matches:"Matches",board:"Board"}[t];render()}document.addEventListener("click",e=>{const nav=e.target.closest("[data-tab]");if(nav){switchTab(nav.dataset.tab);return}const fmt=e.target.closest("[data-format]");if(fmt){S.format=fmt.dataset.format;save();render();return}const pts=e.target.closest("[data-points]");if(pts){S.points=Number(pts.dataset.points);S.matches=[];save();render();return}const rem=e.target.closest("[data-remove]");if(rem){S.players=S.players.filter(p=>p.id!==rem.dataset.remove);S.matches=[];save();render();return}const sc=e.target.closest("[data-score]");if(sc){score(sc.dataset.score,sc.dataset.side);return}});$("#addPlayer").onclick=()=>{addPlayer($("#playerName").value);$("#playerName").value=""};$("#playerName").onkeydown=e=>{if(e.key==="Enter")$("#addPlayer").click()};$("#sampleBtn").onclick=()=>{S.players=["Aldyth","Kinara","Mira","Omar","Sara","Noah","Lina","Zaid"].map(name=>({id:id(),name}));save();render();switchTab("players")};$("#generateBtn").onclick=generate;$("#regenBtn").onclick=generate;$("#saveSetup").onclick=()=>{S.eventName=$("#eventName").value||"Padel Americano";save();toast("Setup saved")};$("#clearPlayers").onclick=()=>{if(confirm("Clear players and matches?")){S.players=[];S.matches=[];save();render()}};$("#copyBtn").onclick=()=>{const text=S.eventName+" results\n"+board().map((p,i)=>Number(i+1)+". "+p.name+" - "+p.pts+" pts ("+(p.diff>=0?"+":"")+p.diff+")").join("\n");navigator.clipboard?navigator.clipboard.writeText(text).then(()=>toast("Results copied")):toast(text)};$("#themeBtn").onclick=()=>{S.theme=S.theme==="dark"?"light":"dark";save();render()};$("#beginBtn").onclick=()=>{S.seenIntro=true;save();$("#sheet").classList.remove("on")};$("#laterBtn").onclick=()=>{S.seenIntro=true;save();$("#sheet").classList.remove("on")};addEventListener("message",e=>{const m=e.data||{};if(m.type==="INIT_APP"){Bridge.context={...Bridge.context,...(m.payload||{})};if(m.payload?.theme){S.theme=m.payload.theme==="dark"?"dark":"light"}if(m.payload?.people?.length&&!S.players.length){S.players=m.payload.people.map(p=>({id:p.id||id(),name:p.name||"Player"}));}save();render()}});render();if(!S.seenIntro)setTimeout(()=>$("#sheet").classList.add("on"),300);
</script></body></html>
