<!DOCTYPE html>
<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --ink:#1d2b3a; --ink-dim:#5d7184; --ink-faint:#9aabbd;
  --card:#ffffff; --line:rgba(29,43,58,.09); --line-2:rgba(29,43,58,.15);
  --gold:#F5A623; --gold-d:#D98A0E; --gold-s:#FFEAC2;
  --mint:#18B981; --mint-d:#0E8C61; --mint-s:#D2F4E6;
  --coral:#FF5A5A; --coral-d:#DD3B3B; --coral-s:#FFDCDC;
  --violet:#6C5CE7; --violet-d:#5343C8; --violet-s:#E4DEFF;
  --sky:#2E9BF0; --sky-d:#1A7FCE; --sky-s:#D4ECFD;
  --display:'Baloo 2',system-ui,sans-serif;
  --body:'Nunito',system-ui,sans-serif;
  --world:#6C5CE7; --world-d:#5343C8; --world-s:#E4DEFF;
  --shadow:0 12px 34px rgba(46,76,128,.14);
  --shadow-sm:0 6px 18px rgba(46,76,128,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);
  background:radial-gradient(1100px 700px at 85% -8%, var(--sky-s), transparent 55%),radial-gradient(900px 700px at -8% 108%, var(--mint-s), transparent 52%),linear-gradient(165deg,#f3f7fd,#eef2fb 60%,#f4eeff);
  background-attachment:fixed;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.screen{flex:1;display:none;flex-direction:column;animation:fade .4s ease}
.screen.on{display:flex}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:19px;color:var(--ink)}
.logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(140deg,var(--violet),var(--sky));display:grid;place-items:center;box-shadow:0 8px 18px rgba(108,92,231,.4)}
.wallet{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);padding:8px 15px;border-radius:99px;font-family:var(--display);font-weight:700;font-size:15px;box-shadow:var(--shadow-sm)}
.coin{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE9A8,var(--gold) 58%,var(--gold-d));display:grid;place-items:center;font-size:11px;color:#7a5600;box-shadow:0 2px 5px rgba(217,138,14,.45)}
.scroll{flex:1;overflow-y:auto;padding:4px 20px 26px}
.hero{position:relative;border-radius:28px;padding:24px 22px;overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow);background:linear-gradient(135deg,#7C6CF0,#3FA9F5 70%,#22C7A0)}
.hero h1{font-family:var(--display);font-weight:800;font-size:33px;line-height:1;color:#fff;letter-spacing:.3px;margin-bottom:7px;position:relative;z-index:2}
.hero p{color:rgba(255,255,255,.92);font-size:14px;font-weight:600;max-width:23ch;line-height:1.45;position:relative;z-index:2}
.hero svg{position:absolute;right:-6px;bottom:-4px;width:130px;height:130px;z-index:1;opacity:.96}
.section-h{font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-faint);margin:20px 4px 12px}
.worlds{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.world{position:relative;border-radius:22px;padding:17px 16px;cursor:pointer;background:var(--card);border:2px solid transparent;box-shadow:var(--shadow-sm);transition:transform .15s,border-color .2s}
.world:active{transform:scale(.97)}
.world.sel{border-color:var(--w)}
.world .emoji{font-size:32px;display:block;margin-bottom:9px}
.world .wn{font-family:var(--display);font-weight:700;font-size:17px}
.world .wd{font-size:12px;color:var(--ink-dim);font-weight:600;margin-top:1px}
.world .check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;background:var(--w);display:none;place-items:center;font-size:13px;color:#fff;font-weight:800}
.world.sel .check{display:grid}
.opts{display:flex;gap:11px}
.opt{flex:1;background:var(--card);border:2px solid transparent;border-radius:17px;padding:13px 9px;text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .15s,border-color .2s}
.opt:active{transform:scale(.96)}
.opt.sel{border-color:var(--gold)}
.opt .ot{font-family:var(--display);font-weight:700;font-size:14.5px}
.opt .od{font-size:11px;color:var(--ink-dim);font-weight:600;margin-top:1px}
.opt .oe{font-size:22px;display:block;margin-bottom:5px}
.play-btn{margin-top:24px;width:100%;border:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:20px;color:#fff;padding:19px;border-radius:21px;background:linear-gradient(135deg,#FFB42E,var(--gold) 55%,var(--gold-d));box-shadow:0 14px 30px rgba(217,138,14,.42);display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s}
.play-btn:active{transform:translateY(2px) scale(.99)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm)}
.stat .sv{font-family:var(--display);font-weight:800;font-size:23px;color:var(--violet)}
.stat .sl{font-size:11px;color:var(--ink-faint);font-weight:700;margin-top:1px;letter-spacing:.3px}
.game-top{padding:13px 18px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.icon-btn{width:42px;height:42px;border-radius:14px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:19px;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-sm)}
.icon-btn:active{transform:scale(.92)}
.players{display:flex;gap:7px;flex:1;justify-content:center;flex-wrap:wrap}
.pchip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);padding:6px 13px 6px 6px;border-radius:99px;font-size:13px;font-weight:700;box-shadow:var(--shadow-sm);opacity:.55;transition:opacity .25s,box-shadow .25s,transform .25s}
.pchip.active{opacity:1;box-shadow:0 0 0 2.5px var(--pc),0 6px 16px rgba(46,76,128,.18);transform:translateY(-1px)}
.pchip .dot{width:24px;height:24px;border-radius:50%;background:var(--pc);display:grid;place-items:center;font-size:13px}
.pchip .pos{font-family:var(--display);font-weight:800;color:var(--pc-d)}
.board-wrap{padding:12px 16px 0;display:flex;justify-content:center}
.board{position:relative;width:100%;max-width:448px;aspect-ratio:1;border-radius:24px;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:0 22px 55px rgba(46,76,128,.22)}
.grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);z-index:1}
.cell{position:relative;display:flex;align-items:flex-start;justify-content:flex-start;font-size:9px;font-weight:800;color:rgba(29,43,58,.30);font-family:var(--body);padding:3px 0 0 4px;border-right:1px solid rgba(29,43,58,.04);border-bottom:1px solid rgba(29,43,58,.04)}
.cell.tintA{background:#fbfdff}
.cell.tintB{background:#f1f7fd}
.cell.ladder{background:var(--mint-s)}
.cell.snake{background:var(--coral-s)}
.cell.know{background:var(--violet-s)}
.cell.start{background:var(--gold-s)}
.cell.finish{background:linear-gradient(135deg,#FFF3D6,#FFE7B8)}
.cell .badge{position:absolute;bottom:3px;right:3px;font-size:13px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.12))}
svg.links{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:visible}
.token{position:absolute;width:30px;height:30px;border-radius:50%;z-index:3;display:grid;place-items:center;font-size:15px;border:2.5px solid #fff;box-shadow:0 5px 12px rgba(46,76,128,.4);transition:left .26s cubic-bezier(.34,1.4,.5,1),top .26s cubic-bezier(.34,1.4,.5,1)}
.dock{margin-top:auto;padding:16px 18px calc(18px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:20px}
.dice{width:84px;height:84px;border-radius:24px;cursor:pointer;display:grid;place-items:center;background:linear-gradient(150deg,#fff,#eef3fb);box-shadow:0 14px 28px rgba(46,76,128,.28),inset 0 -5px 0 rgba(46,76,128,.06);border:1px solid var(--line);transition:transform .15s}
.dice:active{transform:scale(.94)}
.dice.rolling{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-18deg) scale(1.05)}40%{transform:rotate(16deg)}60%{transform:rotate(-12deg)}80%{transform:rotate(8deg)}}
.dice.disabled{opacity:.42;pointer-events:none}
.pips{width:56px;height:56px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:3px}
.pip{width:12px;height:12px;border-radius:50%;background:var(--violet);align-self:center;justify-self:center;visibility:hidden}
.hint{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink-dim);max-width:158px;line-height:1.32}
.lobby{flex:1;overflow-y:auto;padding:6px 20px 26px}
.lobby-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
.code-box{text-align:center;padding:18px;background:linear-gradient(135deg,var(--violet-s),var(--sky-s));border-radius:18px;margin:6px 0 14px}
.code-box .cl{font-size:12px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:1px}
.code-box .cc{font-family:var(--display);font-weight:800;font-size:42px;letter-spacing:6px;color:var(--violet-d);margin-top:4px}
.field{width:100%;border:2px solid var(--line-2);border-radius:15px;padding:15px;font-family:var(--display);font-weight:700;font-size:18px;text-align:center;letter-spacing:3px;text-transform:uppercase;color:var(--ink);background:#fff;outline:none}
.field:focus{border-color:var(--violet)}
.lobby-list{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.lobby-p{display:flex;align-items:center;gap:11px;background:#f5f8fc;border-radius:14px;padding:11px 14px;font-weight:700}
.lobby-p .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;border:2px solid #fff;box-shadow:var(--shadow-sm)}
.lobby-p .me{margin-left:auto;font-size:11px;color:var(--ink-faint);font-weight:700}
.status{text-align:center;font-weight:700;color:var(--ink-dim);font-size:13.5px;padding:8px}
.scrim{position:fixed;inset:0;background:rgba(29,43,58,.42);backdrop-filter:blur(6px);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:0;animation:fade .25s}
.scrim.on{display:flex}
@media(min-width:520px){.scrim{align-items:center;padding:22px}}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:28px 28px 0 0;padding:26px 22px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -10px 50px rgba(29,43,58,.25);animation:up .35s cubic-bezier(.34,1.4,.5,1)}
@media(min-width:520px){.sheet{border-radius:28px}}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.q-badge{display:inline-flex;align-items:center;gap:7px;background:var(--world-s);color:var(--world-d);font-family:var(--display);font-weight:700;font-size:12px;letter-spacing:.4px;text-transform:uppercase;padding:7px 14px;border-radius:99px;margin-bottom:15px}
.q-text{font-family:var(--display);font-weight:700;font-size:23px;line-height:1.25;margin-bottom:20px}
.answers{display:flex;flex-direction:column;gap:11px}
.ans{text-align:left;background:#f5f8fc;border:2px solid transparent;border-radius:16px;padding:15px 16px;font-size:16px;font-weight:700;color:var(--ink);cursor:pointer;transition:transform .12s,border-color .2s,background .2s;display:flex;align-items:center;gap:12px}
.ans:active{transform:scale(.985)}
.ans .key{width:27px;height:27px;border-radius:9px;background:#e6edf5;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:14px;flex-shrink:0;color:var(--ink-dim)}
.ans.correct{border-color:var(--mint);background:var(--mint-s)}
.ans.wrong{border-color:var(--coral);background:var(--coral-s)}
.ans.correct .key{background:var(--mint);color:#fff}
.ans.wrong .key{background:var(--coral);color:#fff}
.ans.lock{pointer-events:none}
.fact{font-size:14px;color:var(--ink);font-weight:600;line-height:1.55;margin-top:17px;padding:14px 16px;background:var(--world-s);border-radius:15px;border-left:4px solid var(--world)}
.sheet-btn{margin-top:19px;width:100%;border:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:17px;color:#fff;padding:16px;border-radius:17px;background:linear-gradient(135deg,#FFB42E,var(--gold));box-shadow:0 10px 24px rgba(217,138,14,.36)}
.sheet-btn.ghost{background:#f0f4f9;color:var(--ink-dim);box-shadow:none;margin-top:11px}
.sheet-btn:active{transform:scale(.98)}
.sheet-btn:disabled{opacity:.5;pointer-events:none}
.result-emoji{font-size:60px;text-align:center;display:block;margin-bottom:6px}
.win-title{font-family:var(--display);font-weight:800;font-size:30px;text-align:center;margin-bottom:3px}
.win-sub{text-align:center;color:var(--ink-dim);font-size:14px;font-weight:600;margin-bottom:22px}
.reward-row{display:flex;gap:13px}
.reward{flex:1;background:#f5f8fc;border-radius:17px;padding:16px 10px;text-align:center}
.reward .rv{font-family:var(--display);font-weight:800;font-size:26px;color:var(--gold-d)}
.reward .rl{font-size:11.5px;color:var(--ink-faint);font-weight:700;margin-top:2px}
canvas#fx{position:fixed;inset:0;pointer-events:none;z-index:60;display:none}
.toast{position:fixed;left:50%;top:74px;transform:translateX(-50%) translateY(-22px);z-index:70;opacity:0;background:#fff;border:1px solid var(--line);padding:12px 22px;border-radius:99px;font-family:var(--display);font-weight:700;font-size:14.5px;transition:.35s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.muted-x.off{position:relative}
.muted-x.off::after{content:"";position:absolute;left:50%;top:50%;width:26px;height:2.5px;background:var(--coral);transform:translate(-50%,-50%) rotate(-45deg);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <section class="screen on" id="home">
    <div class="topbar">
      <div class="brand"><span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M7 21V5M7 5l4 3M7 11l4 3M7 16l4 3" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><path d="M17 4c2.2 1 2.2 4 0 5s-2.2 4 0 5-2.2 4-2 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" fill="none"/></svg></span> Wisdom Trail</div>
      <div class="wallet"><span class="coin">$</span><span id="walletHome">0</span></div>
    </div>
    <div class="scroll">
      <div class="hero">
        <h1>Wisdom&nbsp;Trail</h1>
        <p>Roll, climb and learn. Answer right to rise — every snake and ladder teaches you something.</p>
        <svg viewBox="0 0 120 120" fill="none">
          <path d="M30 110V30M30 30l16 11M30 56l16 11M30 83l16 11" stroke="#ffffff" stroke-opacity=".5" stroke-width="4" stroke-linecap="round"/>
          <path d="M88 18c10 5 10 18 0 23s-10 18 0 23-10 18-2 30" stroke="#ffffff" stroke-opacity=".55" stroke-width="9" stroke-linecap="round"/>
          <circle cx="90" cy="16" r="9" fill="#fff" fill-opacity=".7"/><circle cx="87" cy="14" r="2" fill="#3FA9F5"/>
        </svg>
      </div>
      <div class="section-h">Pick your world</div>
      <div class="worlds" id="worlds"></div>
      <div class="section-h">Difficulty</div>
      <div class="opts" id="levels"></div>
      <div class="section-h">Play mode</div>
      <div class="opts" id="modes"></div>
      <button class="play-btn" id="startBtn">▶ Start adventure</button>
      <div class="stats-row">
        <div class="stat"><div class="sv" id="stWins">0</div><div class="sl">WINS</div></div>
        <div class="stat"><div class="sv" id="stGames">0</div><div class="sl">GAMES</div></div>
        <div class="stat"><div class="sv" id="stCorrect">0</div><div class="sl">CORRECT</div></div>
      </div>
    </div>
  </section>
  <section class="screen" id="lobby">
    <div class="game-top">
      <div class="icon-btn" id="lobbyBack">←</div>
      <div class="brand" style="font-size:17px">Play online</div>
      <div style="width:42px"></div>
    </div>
    <div class="lobby" id="lobbyBody"></div>
  </section>
  <section class="screen" id="game">
    <div class="game-top">
      <div class="icon-btn" id="backBtn">←</div>
      <div class="players" id="playerChips"></div>
      <div class="icon-btn muted-x" id="soundBtn">🔊</div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"><div class="grid" id="grid"></div><svg class="links" id="links"></svg></div>
    </div>
    <div class="dock">
      <div class="hint" id="hint">Tap the dice to roll</div>
      <div class="dice" id="dice"><div class="pips" id="pips">
        <div class="pip"></div><div class="pip"></div><div class="pip"></div>
        <div class="pip"></div><div class="pip"></div><div class="pip"></div>
        <div class="pip"></div><div class="pip"></div><div class="pip"></div></div></div>
    </div>
  </section>
</div>
<div class="scrim" id="qScrim"><div class="sheet" id="qSheet"></div></div>
<div class="scrim" id="winScrim"><div class="sheet" id="winSheet"></div></div>
<canvas id="fx"></canvas>
<div class="toast" id="toast"></div>
<script>
const SAVE_KEY='wisdomtrail_save';
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return{}}}
function store(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
let save=Object.assign({coins:0,xp:0,wins:0,games:0,correct:0,sound:true,name:''},load());
function addCoins(n){save.coins+=n;store();renderWallet()}
function renderWallet(){document.getElementById('walletHome').textContent=save.coins.toLocaleString()}

const WORLDS={
  space:{name:'Space',emoji:'🚀',desc:'Planets & stars',c:'#5C6FE0',d:'#3F4FC0',s:'#E1E5FF'},
  ocean:{name:'Ocean',emoji:'🐬',desc:'Seas & creatures',c:'#10AEB6',d:'#0B8088',s:'#CFF3F4'},
  history:{name:'History',emoji:'🏛️',desc:'People & places',c:'#E08A2E',d:'#B86C18',s:'#FCE8CE'},
  science:{name:'Science',emoji:'🔬',desc:'How things work',c:'#E0589C',d:'#BE3F7E',s:'#FBDCEC'}
};
const BANK={
 space:[
  {q:"Which planet is closest to the Sun?",a:["Mercury","Venus","Earth","Mars"],c:0,d:0,f:"Mercury zips around the Sun in just 88 days."},

function ladderSVG(p1,p2){

  s+='<line x1="'+B1[0]+'" y1="'+B1[1]+'" x2="'+B2[0]+'" y2="'+B2[1]+'" stroke="url(#rail)" stroke-width="'+rw+'" stroke-linecap="round"/>';

  s+='<line x1="'+A1[0]+'" y1="'+A1[1]+'" x2="'+A2[0]+'" y2="'+A2[1]+'" stroke="#FFE3B8" stroke-opacity=".55" stroke-width="'+(rw*0.32)+'" stroke-linecap="round"/>';
  s+='<line x1="'+B1[0]+'" y1="'+B1[1]+'" x2="'+B2[0]+'" y2="'+B2[1]+'" stroke="#FFE3B8" stroke-opacity=".55" stroke-width="'+(rw*0.32)+'" stroke-linecap="round"/>';

}
function snakeSVG(head,tail,i,cols){

  const d='M'+head.x+' '+head.y+' C '+c1[0]+' '+c1[1]+' '+c2[0]+' '+c2[1]+' '+tail.x+' '+tail.y;

  s+='<path d="'+d+'" stroke="url(#sg'+i+')" stroke-width="'+bw+'" fill="none" stroke-linecap="round"/>';
  s+='<path d="'+d+'" stroke="'+cols[2]+'" stroke-opacity=".8" stroke-width="'+(bw*0.34)+'" fill="none" stroke-linecap="round"/>';
  s+='<path d="'+d+'" stroke="#ffffff" stroke-opacity=".22" stroke-width="'+(bw*0.55)+'" fill="none" stroke-linecap="round" stroke-dasharray="1.5 '+Math.max(7,cell*0.42)+'"/>';
  const odx=head.x-c1[0],ody=head.y-c1[1],ol=Math.hypot(odx,ody)||1;const oux=odx/ol,ouy=ody/ol;
  const ang=Math.atan2(ouy,oux)*180/Math.PI;const hc=[head.x+oux*cell*0.12,head.y+ouy*cell*0.12];const hrx=cell*0.34,hry=cell*0.28;

  s+='<ellipse cx="'+hc[0]+'" cy="'+hc[1]+'" rx="'+(hrx*0.9)+'" ry="'+(hry*0.78)+'" fill="'+cols[0]+'" transform="rotate('+ang+' '+hc[0]+' '+hc[1]+')"/>';
  const epx=-ouy,epy=oux;const ex=hc[0]+oux*hrx*0.25,ey=hc[1]+ouy*hry*0.25;const e1=[ex+epx*cell*0.13,ey+epy*cell*0.13],e2=[ex-epx*cell*0.13,ey-epy*cell*0.13];const er=cell*0.075;
  s+='<circle cx="'+e1[0]+'" cy="'+e1[1]+'" r="'+er+'" fill="#fff"/><circle cx="'+e1[0]+'" cy="'+e1[1]+'" r="'+(er*0.55)+'" fill="#1d2b3a"/>';
  s+='<circle cx="'+e2[0]+'" cy="'+e2[1]+'" r="'+er+'" fill="#fff"/><circle cx="'+e2[0]+'" cy="'+e2[1]+'" r="'+(er*0.55)+'" fill="#1d2b3a"/>';
  const tt=[hc[0]+oux*hrx*1.5,hc[1]+ouy*hry*1.7],tb=[hc[0]+oux*hrx*1.05,hc[1]+ouy*hry*1.2];
  s+='<path d="M'+tb[0]+' '+tb[1]+' L'+tt[0]+' '+tt[1]+'" stroke="#FF4D6D" stroke-width="'+(cell*0.05)+'" stroke-linecap="round"/>';
  s+='<path d="M'+tt[0]+' '+tt[1]+' l'+(epx*cell*0.08)+' '+(epy*cell*0.08)+' M'+tt[0]+' '+tt[1]+' l'+(-epx*cell*0.08)+' '+(-epy*cell*0.08)+'" stroke="#FF4D6D" stroke-width="'+(cell*0.045)+'" stroke-linecap="round"/>';
  s+='</g>';return s;
}

function endTurn(){if(state.over)return;state.turn=(state.turn+1)%state.players.length;state.phase='await-roll';renderChips();updateDiceUI();
  const np=state.players[state.turn];
  if(net.on){setHint(currentIsLocal()?'Your turn — tap to roll':np.name+"'s turn…");if(net.host)syncState();}
  else setHint(np.human?np.name+', tap to roll':np.name+' is thinking…');
  afterTurnSetup();}
function afterTurnSetup(){const np=state.players[state.turn];if(!net.on&&!np.human&&!state.over){updateDiceUI();setTimeout(doRoll,950);}}
function pickQ(){const pool=BANK[sel.world];let c=pool.filter(x=>x.d===sel.level);if(c.length<2)c=pool;return c[Math.random()*c.length|0];}
function ask(type,cb){const asker=state.turn;
  if(net.on&&asker!==net.myIndex){const Q=pickQ();const conn=connFor(asker);setHint(state.players[asker].name+' is answering…');if(net.host)syncState();state._answerCb=cb;if(conn)conn.send({t:'ask',kind:type,q:Q,world:sel.world});return;}
  showQuestion(type,pickQ(),(ok)=>{cb(ok);});}
let qCb=null;
function showQuestion(type,Q,cb){qCb=cb;const w=WORLDS[sel.world];const sheet=document.getElementById('qSheet');
  const label=type==='snake'?'Snake challenge':'Ladder question';const ord=[0,1,2,3].sort(()=>Math.random()-.5);const keys=['A','B','C','D'];
  sheet.innerHTML='<div class="q-badge">'+w.emoji+' '+label+'</div><div class="q-text">'+Q.q+'</div><div class="answers" id="ansList"></div><div class="fact" id="factBox" style="display:none"></div><button class="sheet-btn" id="contBtn" style="display:none">Continue →</button>';
  const list=sheet.querySelector('#ansList');
  ord.forEach((oi,vi)=>{const b=document.createElement('button');b.className='ans';b.innerHTML='<span class="key">'+keys[vi]+'</span><span>'+Q.a[oi]+'</span>';b.onclick=()=>resolveAns(b,oi===Q.c,Q,list);list.appendChild(b);});
  openScrim('qScrim');}
function resolveAns(btn,ok,Q,list){list.querySelectorAll('.ans').forEach(a=>a.classList.add('lock'));
  if(ok){btn.classList.add('correct');sfx('correct');save.correct++;addCoins(10);store();if(state)state.correct++;}
  else{btn.classList.add('wrong');sfx('wrong');list.querySelectorAll('.ans').forEach(a=>{if(a.querySelector('span:last-child').textContent===Q.a[Q.c])a.classList.add('correct');});}
  const fb=document.getElementById('factBox');fb.style.display='block';fb.innerHTML='<b>💡 '+(ok?'Nice!':'Good to know:')+'</b> '+Q.f;
  const cb=document.getElementById('contBtn');cb.style.display='block';cb.onclick=()=>{closeScrim('qScrim');const f=qCb;qCb=null;f&&f(ok);};}
function factCard(p,after){const local=!net.on||state.turn===net.myIndex;const f=FACTS[Math.random()*FACTS.length|0];
  if(net.on&&!local){const conn=connFor(state.turn);if(conn)conn.send({t:'fact',f:f});state._factAfter=after;setHint(p.name+' found a star ⭐');if(net.host)syncState();return;}
  showFact(f,()=>{addCoins(15);if(state)state.coinsRound+=15;toast('+15 coins ⭐');if(net.on&&!net.host)net.hostConn.send({t:'factdone'});after&&after();});}
function showFact(f,after){const sheet=document.getElementById('qSheet');
  sheet.innerHTML='<span class="result-emoji">⭐</span><div class="q-text" style="text-align:center;font-size:19px">Bonus knowledge star!</div><div class="fact">💡 '+f+'</div><button class="sheet-btn" id="contBtn">Collect +15 coins</button>';
  sheet.querySelector('#contBtn').onclick=()=>{closeScrim('qScrim');after&&after();};openScrim('qScrim');}
function doWin(p){state.over=true;state.phase='over';if(net.on&&net.host)broadcast({t:'win',idx:state.players.indexOf(p),name:p.name});showWin(state.players.indexOf(p),p.name);}
function showWin(idx,name){const iWon=net.on?(idx===net.myIndex):state.players[idx].human;
  save.games++;if(iWon)save.wins++;const bonus=iWon?100:20;addCoins(bonus);if(state)state.coinsRound+=bonus;save.xp+=50;store();buildHome();sfx('win');if(iWon)confetti();
  const title=net.on?(iWon?'You win! 🎉':name+' wins'):(sel.mode==='duo'?name+' wins!':(iWon?'You win! 🎉':'Bot wins'));
  const sheet=document.getElementById('winSheet');
  sheet.innerHTML='<span class="result-emoji">'+(iWon?'🏆':(net.on?'🎈':'🤖'))+'</span><div class="win-title">'+title+'</div><div class="win-sub">Reached square 100 on the Wisdom Trail</div><div class="reward-row"><div class="reward"><div class="rv">+'+(state?state.coinsRound:bonus)+'</div><div class="rl">COINS EARNED</div></div><div class="reward"><div class="rv">'+(state?state.correct:0)+'</div><div class="rl">CORRECT ANSWERS</div></div></div><button class="sheet-btn" id="againBtn">Play again</button><button class="sheet-btn ghost" id="homeBtn">Back to menu</button>';
  sheet.querySelector('#againBtn').onclick=()=>{closeScrim('winScrim');if(net.on){if(net.host){initGame(state.players.map(p=>Object.assign({},p,{pos:0})));}else toast('Waiting for host to restart…');}else startLocalGame();};
  sheet.querySelector('#homeBtn').onclick=()=>{closeScrim('winScrim');teardownNet();go('home')};
  setTimeout(()=>openScrim('winScrim'),iWon?700:300);}
function shortCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.random()*c.length|0];return s;}
function connFor(idx){if(idx===0)return null;return net.conns[idx-1]||null;}
function broadcast(msg){net.conns.forEach(c=>{try{c.send(msg)}catch(e){}})}
function syncState(){if(!net.host)return;broadcast({t:'state',players:state.players.map(p=>({name:p.name,emoji:p.emoji,pos:p.pos,col:p.col})),turn:state.turn,phase:state.phase,over:state.over,hint:document.getElementById('hint').textContent,world:sel.world});}
function teardownNet(){try{if(net.peer)net.peer.destroy()}catch(e){}net={on:false,host:false,peer:null,conns:[],myIndex:0,hostConn:null};}
function openLobby(){go('lobby');
  document.getElementById('lobbyBody').innerHTML='<div class="lobby-card"><div class="section-h" style="margin-top:0">Your name</div><input class="field" id="nameIn" placeholder="NAME" maxlength="10" style="text-transform:none;letter-spacing:1px" value="'+(save.name||'')+'"><div style="margin-top:18px"><button class="sheet-btn" id="createBtn" style="margin-top:0">Create a circle</button></div><div class="section-h">Or join with a code</div><input class="field" id="codeIn" placeholder="CODE" maxlength="4"><button class="sheet-btn ghost" id="joinBtn">Join circle</button><div class="status" id="lobbyStatus"></div></div><div class="status" style="font-size:12px;color:var(--ink-faint)">Everyone must be online at the same time. Best with friends on the same trip or call.</div>';
  document.getElementById('createBtn').onclick=hostCircle;document.getElementById('joinBtn').onclick=joinCircle;document.getElementById('lobbyBack').onclick=()=>{teardownNet();go('home')};}
function lobbyStatus(t){const e=document.getElementById('lobbyStatus');if(e)e.textContent=t;}
function hostCircle(){const name=(document.getElementById('nameIn').value||'Host').trim().slice(0,10)||'Host';save.name=name;store();
  if(typeof Peer==='undefined'){lobbyStatus('Online needs an internet connection.');return;}
  lobbyStatus('Creating your circle…');const code=shortCode();net={on:true,host:true,peer:null,conns:[],myIndex:0,hostConn:null};net.lobby=[{name:name,emoji:AVATARS[0],col:PCOL[0]}];net.code=code;
  const peer=new Peer('wt-'+code,{debug:0});net.peer=peer;
  peer.on('open',()=>renderHostLobby(code));
  peer.on('error',e=>{lobbyStatus('Could not start ('+(e.type||'error')+'). Try again.');});
  peer.on('connection',conn=>{conn.on('data',d=>hostHandle(conn,d));conn.on('close',()=>{net.conns=net.conns.filter(c=>c!==conn);net.lobby=net.lobby.filter(p=>p._conn!==conn);reindexLobby();renderHostLobby(net.code);pushLobby();});});}
function reindexLobby(){net.lobby.forEach((p,i)=>{p.col=PCOL[i];p.emoji=AVATARS[i];});}
function hostHandle(conn,d){
  if(d.t==='join'){if(net.started||net.lobby.length>=4){conn.send({t:'full'});return;}const i=net.lobby.length;const p={name:(d.name||'Friend').slice(0,10),emoji:AVATARS[i],col:PCOL[i],_conn:conn};net.lobby.push(p);net.conns.push(conn);renderHostLobby(net.code);pushLobby();}
  if(d.t==='roll'){if(state&&state.phase==='await-roll'&&state.turn===idxOfConn(conn))doRoll();}
  if(d.t==='answered'){const cb=state&&state._answerCb;state._answerCb=null;if(cb)cb(d.ok);}
  if(d.t==='factdone'){const a=state&&state._factAfter;state._factAfter=null;if(a)a();}
}
function idxOfConn(conn){const ci=net.conns.indexOf(conn);return ci<0?-1:ci+1;}
function pushLobby(){broadcast({t:'lobby',players:net.lobby.map(p=>({name:p.name,emoji:p.emoji,col:p.col}))});}
function renderHostLobby(code){net.code=code;const body=document.getElementById('lobbyBody');
  body.innerHTML='<div class="lobby-card"><div class="code-box"><div class="cl">Circle code</div><div class="cc">'+code+'</div></div><div class="section-h" style="margin-top:0">Players ('+net.lobby.length+'/4)</div><div class="lobby-list" id="ll"></div><button class="sheet-btn" id="startOnline" style="margin-top:18px"'+(net.lobby.length<2?' disabled':'')+'>Start game</button><div class="status">Share the code. Game starts when you tap Start.</div></div>';
  const ll=body.querySelector('#ll');net.lobby.forEach((p,i)=>{const r=document.createElement('div');r.className='lobby-p';r.innerHTML='<span class="av" style="background:'+p.col.c+'">'+p.emoji+'</span>'+p.name+(i===0?'<span class="me">YOU · HOST</span>':'');ll.appendChild(r);});
  const sb=body.querySelector('#startOnline');if(sb&&net.lobby.length>=2)sb.onclick=startOnlineGame;
  document.getElementById('lobbyBack').onclick=()=>{teardownNet();go('home')};}
function startOnlineGame(){net.started=true;applyWorldTheme();const players=net.lobby.map((p,i)=>({name:p.name,human:true,pos:0,emoji:AVATARS[i],col:PCOL[i]}));
  broadcast({t:'begin',players:players.map(p=>({name:p.name,emoji:p.emoji,pos:0,col:p.col})),world:sel.world});initGame(players);}
function joinCircle(){const name=(document.getElementById('nameIn').value||'Friend').trim().slice(0,10)||'Friend';const code=(document.getElementById('codeIn').value||'').trim().toUpperCase();
  if(code.length<4){lobbyStatus('Enter the 4-letter code.');return;}save.name=name;store();
  if(typeof Peer==='undefined'){lobbyStatus('Online needs an internet connection.');return;}
  lobbyStatus('Connecting…');net={on:true,host:false,peer:null,conns:[],myIndex:0,hostConn:null};
  const peer=new Peer(null,{debug:0});net.peer=peer;
  peer.on('error',e=>{lobbyStatus('Could not connect ('+(e.type||'error')+'). Check the code.');});
  peer.on('open',()=>{const conn=peer.connect('wt-'+code,{reliable:true});net.hostConn=conn;
    conn.on('open',()=>{conn.send({t:'join',name:name});lobbyStatus('Connected! Waiting in lobby…');});
    conn.on('data',d=>guestHandle(d));conn.on('close',()=>{toast('Disconnected from circle');});});}
function guestHandle(d){
  if(d.t==='full'){lobbyStatus('That circle is full or already started.');return;}
  if(d.t==='lobby'){renderGuestLobby(d.players);}
  if(d.t==='begin'){sel.world=d.world;applyWorldTheme();const players=d.players.map((p,i)=>({name:p.name,human:false,pos:0,emoji:p.emoji,col:p.col}));net.myIndex=guessMyIndex(d.players);
    state={players:players,turn:0,phase:'busy',over:false,correct:0,coinsRound:0,_world:d.world};buildBoard();renderChips();placeTokens();go('game');setHint('Game starting…');updateDiceUI();}
  if(d.t==='state'){applyGuestState(d);}
  if(d.t==='dice'){showDice(d.v);}
  if(d.t==='ask'){sel.world=d.world;showQuestion(d.kind,d.q,(ok)=>{net.hostConn.send({t:'answered',ok:ok});});}
  if(d.t==='fact'){showFact(d.f,()=>{addCoins(15);toast('+15 coins ⭐');net.hostConn.send({t:'factdone'});});}
  if(d.t==='win'){showWin(d.idx,d.name);}
}
function guessMyIndex(players){const n=save.name;const i=players.findIndex(p=>p.name===n);return i<0?players.length-1:i;}
function applyGuestState(d){if(!state||!state.players)return;
  d.players.forEach((p,i)=>{if(state.players[i]){state.players[i].pos=p.pos;state.players[i].name=p.name;state.players[i].emoji=p.emoji;state.players[i].col=p.col;}});
  state.turn=d.turn;state.phase=d.phase;state.over=d.over;renderChips();state.players.forEach((p,i)=>moveTokenTo(i,p.pos));
  document.getElementById('hint').textContent=(d.turn===net.myIndex&&d.phase==='await-roll')?'Your turn — tap to roll':d.hint;updateDiceUI();}
function renderGuestLobby(players){const body=document.getElementById('lobbyBody');
  body.innerHTML='<div class="lobby-card"><div class="status" style="color:var(--mint-d);font-weight:800">✓ In the circle</div><div class="section-h">Players ('+players.length+'/4)</div><div class="lobby-list" id="ll"></div><div class="status">Waiting for the host to start…</div></div>';
  const ll=body.querySelector('#ll');players.forEach((p)=>{const r=document.createElement('div');r.className='lobby-p';r.innerHTML='<span class="av" style="background:'+p.col.c+'">'+p.emoji+'</span>'+p.name+(p.name===save.name?'<span class="me">YOU</span>':'');ll.appendChild(r);});
  document.getElementById('lobbyBack').onclick=()=>{teardownNet();go('home')};}
function openScrim(id){document.getElementById(id).classList.add('on')}
function closeScrim(id){document.getElementById(id).classList.remove('on')}
function go(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById(s).classList.add('on')}
let toastT=null;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}
let actx=null;function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function tone(f,dur,type,vol,sl){if(!save.sound)return;try{const a=ac();const o=a.createOscillator();const g=a.createGain();o.type=type||'sine';o.frequency.value=f;if(sl)o.frequency.exponentialRampToValueAtTime(sl,a.currentTime+dur);g.gain.value=vol||.12;g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+dur);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur);}catch(e){}}
function sfx(k){switch(k){
  case'roll':tone(180,.12,'square',.05);break;
  case'hop':tone(540,.07,'sine',.07);break;
  case'down':tone(260,.07,'sine',.06);break;
  case'correct':tone(660,.12,'triangle',.12);setTimeout(()=>tone(880,.16,'triangle',.12),110);break;
  case'wrong':tone(220,.25,'sawtooth',.08,120);break;
  case'climb':[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.1),i*70));break;
  case'slide':tone(520,.4,'sawtooth',.09,120);break;
  case'save':tone(700,.1,'triangle',.1);setTimeout(()=>tone(900,.12,'triangle',.1),90);break;
  case'win':[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,.22,'triangle',.13),i*120));break;}}
const fx=document.getElementById('fx'),fxc=fx.getContext('2d');let parts=[],raf=null;
function sizeFx(){fx.width=innerWidth;fx.height=innerHeight}
function confetti(){sizeFx();fx.style.display='block';const cols=['#F5A623','#18B981','#FF5A5A','#6C5CE7','#2E9BF0','#FF8AC4'];
  for(let i=0;i<150;i++)parts.push({x:innerWidth/2,y:innerHeight*.28,vx:(Math.random()-.5)*14,vy:Math.random()*-16-4,s:5+Math.random()*7,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,life:1});if(!raf)tick();}
function burst(c){sizeFx();fx.style.display='block';for(let i=0;i<26;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;parts.push({x:innerWidth/2,y:innerHeight*.45,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,s:4+Math.random()*5,c:c,r:0,vr:0,life:1});}if(!raf)tick();}
function tick(){fxc.clearRect(0,0,fx.width,fx.height);parts.forEach(p=>{p.vy+=.45;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life-=.012;p.vx*=.99;fxc.save();fxc.translate(p.x,p.y);fxc.rotate(p.r);fxc.globalAlpha=Math.max(p.life,0);fxc.fillStyle=p.c;fxc.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.4);fxc.restore();});parts=parts.filter(p=>p.life>0&&p.y<fx.height+40);if(parts.length)raf=requestAnimationFrame(tick);else{raf=null;fxc.clearRect(0,0,fx.width,fx.height);fx.style.display='none';}}
addEventListener('resize',()=>{if(state&&state.players){drawGraphics();placeTokens();}});
document.getElementById('startBtn').onclick=()=>{ac();if(sel.mode==='online')openLobby();else startLocalGame();};
document.getElementById('dice').onclick=onDiceTap;
document.getElementById('backBtn').onclick=()=>{teardownNet();go('home')};
document.getElementById('soundBtn').onclick=function(){save.sound=!save.sound;store();this.textContent=save.sound?'🔊':'🔈';this.classList.toggle('off',!save.sound);if(save.sound)sfx('hop');};
document.getElementById('soundBtn').classList.toggle('off',!save.sound);
document.getElementById('soundBtn').textContent=save.sound?'🔊':'🔈';
applyWorldTheme();buildHome();
</script>
</body>
