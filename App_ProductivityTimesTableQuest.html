<!--
KINETIK APP STANDARD v1.0 — Times Table Quest
A polished single-file Kinetik mini-app. Analog feel: Duolingo (hearts, XP, streaks,
crowns, adaptive difficulty, boss rounds) — interaction quality only, no copied assets.

This is the FLAGSHIP of the Quiz/Drill engine (Batch 1). Architecture is built to be
lifted into siblings (Clock Trainer, Data Detective, …) by swapping the CONTENT pack:
  - Engine = adaptive fact selection + 6 question renderers + progression + retention.
  - Content = the multiplication facts + skill-path nodes below (CONTENT section).

Integration: detects embedded mode, honors INIT_APP theme, persists progress to
localStorage (kinetik_polished_times_table_quest_*), posts XP to the circle via the
DATA_CREATE bridge and reads the circle league via DATA_LIST.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Times Table Quest — Kinetik</title>
<script type="application/kinetik-app+json">
{
  "appId": "times-table-quest",
  "name": "Times Table Quest",
  "shortName": "Times Tables",
  "icon": "✖️",
  "gradient": ["#ffb545", "#ff5d8f"],
  "category": "productivity",
  "tagline": "Fast multiplication quests.",
  "about": "A playful multiplication drill with hearts, XP, streaks, crowns and boss rounds. Adapts to each child — weak facts come back more often until they stick. Parent-ready progress, fully offline.",
  "audience": "kids",
  "circleTypes": ["family", "friends"],
  "worksWith": ["offline", "standalone"],
  "status": "live",
  "minMembers": 1
}
</script>
<meta name="theme-color" content="#fff7f9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{
  --a:#ffb545;--b:#ff5d8f;
  --bg:#f6f8ff;--bg2:#eef2fc;--ink:#141a2b;--muted:#5b6478;--faint:#9aa3b8;
  --panel:rgba(255,255,255,.9);--solid:#fff;--line:rgba(20,26,43,.09);--line2:rgba(20,26,43,.14);
  --good:#19b56b;--goodbg:#e7f9f0;--bad:#ef4444;--badbg:#fdeaea;--warn:#f59e0b;
  --shadow:0 22px 60px rgba(40,55,95,.16);
  --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color-scheme:light;
}
[data-theme=dark]{
  --bg:#080d18;--bg2:#0e1424;--ink:#f5f8ff;--muted:#aeb8cc;--faint:#717c95;
  --panel:rgba(18,25,42,.86);--solid:#121a2c;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.16);
  --goodbg:rgba(25,181,107,.16);--badbg:rgba(239,68,68,.16);--shadow:0 22px 60px rgba(0,0,0,.4);
  color-scheme:dark;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);color:var(--ink);background:
  radial-gradient(120% 70% at 10% -10%,color-mix(in srgb,var(--a) 26%,transparent),transparent 42%),
  radial-gradient(120% 70% at 95% 0%,color-mix(in srgb,var(--b) 22%,transparent),transparent 40%),
  linear-gradient(180deg,var(--bg),var(--bg2));
  -webkit-font-smoothing:antialiased;overflow:hidden}
button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
h1,h2,h3,p{margin:0}
.app{height:100dvh;max-width:620px;margin:0 auto;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.on{display:flex;animation:fade .26s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:0 16px 26px}
.scroll::-webkit-scrollbar{display:none}
.safetop{height:max(env(safe-area-inset-top,0px),8px)}

/* ---------- HOME header ---------- */
.hdr{display:flex;align-items:center;gap:11px;padding:12px 16px 8px}
.mark{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;font-size:23px;color:#fff;
  background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 14px 30px color-mix(in srgb,var(--a) 30%,transparent);flex:0 0 auto}
.htitle{flex:1;min-width:0}
.htitle h1{font-size:19px;letter-spacing:-.02em;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htitle p{font-size:12px;color:var(--muted);font-weight:700;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{width:42px;height:42px;border-radius:13px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;font-size:17px;flex:0 0 auto}
.iconbtn:active{transform:scale(.94)}
.stats{display:flex;gap:8px;padding:2px 16px 10px}
.chip{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;border-radius:999px;background:var(--panel);
  border:1px solid var(--line);font-size:13px;font-weight:850;letter-spacing:-.01em}
.chip b{font-size:13.5px}
.chip.tap{cursor:pointer}.chip.tap:active{transform:scale(.96)}

/* ---------- goal card ---------- */
.goal{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);
  border-radius:24px;padding:15px 17px;box-shadow:var(--shadow);margin:6px 0 20px}
.ring{width:64px;height:64px;flex:0 0 auto}
.goal .gt b{font-size:15px;letter-spacing:-.01em}
.goal .gt p{font-size:12.5px;color:var(--muted);font-weight:650;margin-top:3px;line-height:1.3}

/* ---------- skill path ---------- */
.sectlabel{font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:4px 2px 12px}
.path{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.node{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;padding:7px 0}
.node .bub{width:78px;height:70px;border-radius:50%;display:grid;place-items:center;position:relative;
  background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 12px 26px color-mix(in srgb,var(--b) 26%,transparent),inset 0 -5px 0 rgba(0,0,0,.14),inset 0 2px 0 rgba(255,255,255,.4);
  transition:transform .15s ease;cursor:pointer;border:0}
.node .bub:active{transform:translateY(2px) scale(.97)}
.node .bub span{font-size:21px;font-weight:950;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.18)}
.node.locked .bub{background:linear-gradient(135deg,#aab2c6,#8c95ad);box-shadow:0 8px 18px rgba(0,0,0,.14),inset 0 -5px 0 rgba(0,0,0,.12);cursor:default}
[data-theme=dark] .node.locked .bub{background:linear-gradient(135deg,#39425a,#2b3245)}
.node.done .bub{background:linear-gradient(135deg,#19b56b,#0ea968)}
.node .lab{font-size:12.5px;font-weight:850;color:var(--ink);letter-spacing:-.01em}
.node.locked .lab{color:var(--faint)}
.crowns{display:flex;gap:3px;height:11px}
.crowns i{width:9px;height:9px;border-radius:2px;transform:rotate(45deg);background:var(--line2)}
.crowns i.on{background:linear-gradient(135deg,#ffd75e,#ffb01f);box-shadow:0 1px 3px rgba(245,158,11,.5)}
.node .conn{position:absolute;top:-12px;width:4px;height:16px;background:var(--line2);border-radius:2px;left:calc(50% - 2px)}
.node:first-child .conn{display:none}
.node.z1{transform:translateX(-58px)}
.node.z3{transform:translateX(58px)}
.node .start{position:absolute;top:-46px;left:50%;transform:translateX(-50%) scale(.9);background:var(--solid);color:var(--ink);
  border:1px solid var(--line);box-shadow:var(--shadow);border-radius:13px;padding:7px 13px;font-size:12px;font-weight:900;white-space:nowrap;opacity:0;pointer-events:none;transition:.18s ease;z-index:5}
.node .start:after{content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%) rotate(45deg);width:11px;height:11px;background:var(--solid);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.node.sel .start{opacity:1;pointer-events:auto;transform:translateX(-50%) scale(1)}

/* ---------- league preview ---------- */
.lgcard{margin-top:22px;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:15px 16px;box-shadow:var(--shadow);cursor:pointer}
.lgcard:active{transform:scale(.99)}
.lghead{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.lghead b{font-size:15px;letter-spacing:-.01em}.lghead span{font-size:12px;color:var(--faint);font-weight:700}
.lgrow{display:flex;align-items:center;gap:11px;padding:7px 0}
.lgrow+.lgrow{border-top:1px solid var(--line)}
.rank{width:24px;text-align:center;font-weight:950;font-size:14px;color:var(--faint);flex:0 0 auto}
.av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:900;font-size:13px;flex:0 0 auto}
.lgrow .nm{flex:1;min-width:0;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lgrow .xp{font-size:13px;font-weight:900;color:var(--muted)}
.lgrow.me{background:color-mix(in srgb,var(--a) 12%,transparent);margin:0 -10px;padding:8px 10px;border-radius:12px;border:0}

/* ---------- LESSON ---------- */
.lhead{display:flex;align-items:center;gap:13px;padding:12px 16px 8px}
.xbtn{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;color:var(--faint);font-size:22px;flex:0 0 auto}
.xbtn:active{transform:scale(.9)}
.pbar{flex:1;height:14px;border-radius:999px;background:var(--line2);overflow:hidden}
.pbar i{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--a),var(--b));transition:width .3s cubic-bezier(.4,1.3,.5,1)}
.hearts{display:flex;align-items:center;gap:1px;font-size:15px;flex:0 0 auto}
.timer{height:6px;border-radius:999px;background:var(--line2);margin:0 16px;overflow:hidden;display:none}
.timer.on{display:block}
.timer i{display:block;height:100%;background:linear-gradient(90deg,var(--warn),var(--bad));width:100%}
.qbody{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:8px 18px 6px;display:flex;flex-direction:column}
.qbody::-webkit-scrollbar{display:none}
.qkind{font-size:12px;font-weight:900;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin:6px 0 12px}
.visual{align-self:center;width:min(290px,86%);background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:14px;margin-bottom:14px;box-shadow:0 10px 26px rgba(40,55,95,.1)}
.visual svg{display:block;width:100%;height:auto}
.prompt{font-size:34px;font-weight:950;letter-spacing:-.02em;text-align:center;margin:2px 0 18px}
.prompt .q{color:var(--b)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.choice{min-height:64px;border-radius:18px;background:var(--solid);border:2px solid var(--line2);font-size:21px;font-weight:900;
  display:grid;place-items:center;transition:transform .12s ease,border-color .12s,background .12s}
.choice:active{transform:scale(.97)}
.choice.sel{border-color:var(--b);background:color-mix(in srgb,var(--b) 10%,var(--solid))}
.choice.right{border-color:var(--good);background:var(--goodbg);color:var(--good)}
.choice.wrongpick{border-color:var(--bad);background:var(--badbg);color:var(--bad)}
.choice.dim{opacity:.45}
.tf{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tf .choice{min-height:72px;font-size:18px;gap:8px}
/* keypad */
.kpwrap{margin-top:auto}
.kpdisp{min-height:62px;border-radius:16px;border:2px solid var(--line2);background:var(--solid);display:grid;place-items:center;
  font-size:30px;font-weight:950;letter-spacing:.04em;margin-bottom:12px}
.kpdisp.empty{color:var(--faint)}
.kpdisp.right{border-color:var(--good);background:var(--goodbg);color:var(--good)}
.kpdisp.wrongpick{border-color:var(--bad);background:var(--badbg);color:var(--bad)}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.kp button{min-height:56px;border-radius:15px;background:var(--panel);border:1px solid var(--line);font-size:23px;font-weight:850}
.kp button:active{transform:scale(.95);background:color-mix(in srgb,var(--a) 12%,var(--panel))}
/* match */
.match{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mcol{display:flex;flex-direction:column;gap:10px}
.mtile{min-height:56px;border-radius:15px;background:var(--solid);border:2px solid var(--line2);font-size:18px;font-weight:900;display:grid;place-items:center;transition:.12s}
.mtile:active{transform:scale(.97)}
.mtile.sel{border-color:var(--b);background:color-mix(in srgb,var(--b) 12%,var(--solid))}
.mtile.gone{opacity:0;pointer-events:none;transform:scale(.6)}
.mtile.bad{animation:shake .34s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* footer / feedback */
.lfoot{flex:0 0 auto;padding:13px 16px calc(13px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--line);background:var(--solid)}
[data-theme=dark] .lfoot{background:var(--bg2)}
.lfoot.good{background:var(--goodbg);border-color:transparent}
.lfoot.bad{background:var(--badbg);border-color:transparent}
.fb{display:none;align-items:center;gap:11px;margin-bottom:11px}
.fb.on{display:flex}
.fbic{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:21px;flex:0 0 auto}
.fb.good .fbic{background:var(--good)}.fb.bad .fbic{background:var(--bad)}
.fb .ft b{font-size:15px;display:block}.fb.good .ft b{color:var(--good)}.fb.bad .ft b{color:var(--bad)}
.fb .ft p{font-size:13px;color:var(--muted);font-weight:650;margin-top:2px}
.btn{width:100%;min-height:54px;border-radius:16px;font-size:16px;font-weight:950;letter-spacing:.02em;color:#fff;
  background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 14px 28px color-mix(in srgb,var(--a) 26%,transparent);transition:transform .12s ease,opacity .12s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;box-shadow:none}
.btn.green{background:linear-gradient(135deg,#19b56b,#0ea968);box-shadow:0 14px 28px rgba(25,181,107,.28)}
.btn.gho{background:var(--panel);color:var(--ink);border:1px solid var(--line);box-shadow:none}

/* ---------- COMPLETE ---------- */
.done-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 22px;gap:6px}
.bigcrown{font-size:74px;filter:drop-shadow(0 12px 22px rgba(245,158,11,.4));animation:pop .5s cubic-bezier(.3,1.5,.5,1) both}
@keyframes pop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
.done-wrap h2{font-size:26px;letter-spacing:-.02em;margin-top:4px}
.done-wrap .sub{font-size:14px;color:var(--muted);font-weight:700}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%;max-width:340px;margin:18px 0 4px}
.tile{border-radius:18px;border:1px solid var(--line);background:var(--panel);padding:13px;text-align:left}
.tile .k{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.tile .v{font-size:24px;font-weight:950;margin-top:5px;letter-spacing:-.02em}
.tile.xp .v{color:var(--a)}.tile.gem .v{color:#3aa0ff}.tile.acc .v{color:var(--good)}.tile.str .v{color:var(--b)}
.done-foot{width:100%;padding:14px 16px calc(14px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:9px}

/* ---------- sheets (league / shop) ---------- */
.sheethead{display:flex;align-items:center;gap:12px;padding:13px 16px 6px}
.sheethead h2{font-size:20px;letter-spacing:-.02em;flex:1}
.shopitem{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:11px}
.shopitem .si{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:23px;background:color-mix(in srgb,var(--a) 14%,var(--solid));flex:0 0 auto}
.shopitem .sd{flex:1;min-width:0}.shopitem .sd b{font-size:14.5px}.shopitem .sd p{font-size:12px;color:var(--muted);font-weight:650;margin-top:2px;line-height:1.3}
.cost{padding:9px 14px;border-radius:12px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:900;font-size:13px;white-space:nowrap}
.cost:disabled{opacity:.4}
.cost.owned{background:var(--good)}

/* toast / flash */
.toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom,0px));transform:translate(-50%,16px);opacity:0;
  background:rgba(20,26,43,.94);color:#fff;font-size:13.5px;font-weight:800;padding:11px 16px;border-radius:999px;
  max-width:84%;box-shadow:0 16px 38px rgba(0,0,0,.3);pointer-events:none;transition:.24s;z-index:60}
.toast.on{opacity:1;transform:translate(-50%,0)}
.flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:50;transition:opacity .12s}
.flash.good{background:radial-gradient(circle at 50% 60%,rgba(25,181,107,.28),transparent 60%);opacity:1}
.flash.bad{background:radial-gradient(circle at 50% 60%,rgba(239,68,68,.26),transparent 60%);opacity:1}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media (max-width:360px){.prompt{font-size:30px}.node .bub{width:70px;height:64px}}
</style>
</head>
<body>
<div class="app">
  <!-- HOME -->
  <section class="screen on" id="s-home">
    <div class="safetop"></div>
    <header class="hdr">
      <div class="mark">✕</div>
      <div class="htitle"><h1>Times Table Quest</h1><p id="homeSub">Standalone · keep your streak alive</p></div>
      <button class="iconbtn" id="themeBtn" aria-label="Theme">◐</button>
    </header>
    <div class="stats">
      <span class="chip"><span>🔥</span><b id="cStreak">0</b></span>
      <span class="chip tap" id="goShop"><span>💎</span><b id="cGems">0</b></span>
      <span class="chip"><span>⭐</span><b id="cXp">0</b></span>
    </div>
    <div class="scroll">
      <div class="goal">
        <svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.5" fill="none" stroke="var(--line2)" stroke-width="5"/>
          <circle id="goalArc" cx="18" cy="18" r="15.5" fill="none" stroke="url(#gg)" stroke-width="5" stroke-linecap="round" stroke-dasharray="0 100" transform="rotate(-90 18 18)"/>
          <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--a)"/><stop offset="1" stop-color="var(--b)"/></linearGradient></defs>
          <text id="goalTxt" x="18" y="21.5" text-anchor="middle" font-size="9" font-weight="900" fill="var(--ink)">0%</text></svg>
        <div class="gt"><b id="goalHd">Daily goal</b><p id="goalSub">Earn 30 XP today to keep the flame.</p></div>
      </div>
      <div class="sectlabel">Your quest</div>
      <div class="path" id="path"></div>
      <div class="lgcard" id="goLeague">
        <div class="lghead"><b>Family League</b><span>This week ›</span></div>
        <div id="leaguePrev"></div>
      </div>
    </div>
  </section>

  <!-- LESSON -->
  <section class="screen" id="s-lesson">
    <div class="safetop"></div>
    <header class="lhead">
      <button class="xbtn" id="quitLesson">✕</button>
      <div class="pbar"><i id="prog"></i></div>
      <div class="hearts" id="hearts"></div>
    </header>
    <div class="timer" id="timer"><i></i></div>
    <div class="qbody" id="qbody"></div>
    <footer class="lfoot" id="lfoot">
      <div class="fb" id="fb"><div class="fbic" id="fbic"></div><div class="ft"><b id="fbT"></b><p id="fbP"></p></div></div>
      <button class="btn" id="checkBtn" disabled>Check</button>
    </footer>
  </section>

  <!-- COMPLETE -->
  <section class="screen" id="s-done">
    <div class="safetop"></div>
    <div class="done-wrap">
      <div class="bigcrown" id="doneIcon">👑</div>
      <h2 id="doneTitle">Lesson complete!</h2>
      <p class="sub" id="doneSub"></p>
      <div class="tiles" id="doneTiles"></div>
    </div>
    <div class="done-foot">
      <button class="btn green" id="doneCont">Continue</button>
    </div>
  </section>

  <!-- LEAGUE -->
  <section class="screen" id="s-league">
    <div class="safetop"></div>
    <header class="sheethead"><button class="iconbtn" id="leagueBack">‹</button><h2>Family League</h2></header>
    <div class="scroll"><p style="font-size:13px;color:var(--muted);font-weight:650;margin:2px 2px 14px">This week's XP across the circle. Every lesson you finish climbs the board.</p><div id="leagueFull"></div></div>
  </section>

  <!-- SHOP -->
  <section class="screen" id="s-shop">
    <div class="safetop"></div>
    <header class="sheethead"><button class="iconbtn" id="shopBack">‹</button><h2>Shop</h2><span class="chip"><span>💎</span><b id="shopGems">0</b></span></header>
    <div class="scroll" id="shopBody"></div>
  </section>
</div>
<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
const APP_ID="times-table-quest";
const PREFIX="kinetik_polished_times_table_quest";
const GOAL_XP=30, MAX_HEARTS=5, BOSS_TIME=6000;
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));

/* ===================== ADAPTIVE ENGINE ===================== */
const fkey=(a,b)=>a+"x"+b;
const fget=(a,b)=>S.facts[fkey(a,b)]||{s:0,n:0};
function frecord(a,b,ok){const k=fkey(a,b),f=S.facts[k]||{s:0,n:0};f.n++;f.s=clamp(ok?f.s+1:f.s-1,0,5);S.facts[k]=f;}
/* weak/new facts weighted into each session; mistake recycling happens live */
function buildQueue(node){
  const pool=node.facts, LEN=node.boss?20:14, bag=[];
  pool.forEach(([a,b])=>{const f=fget(a,b);const w=(6-f.s)+(f.n===0?3:1);for(let i=0;i<w;i++)bag.push([a,b]);});
  shuffle(bag);
  const q=[],seen=new Set();
  for(const fc of bag){if(q.length>=LEN)break;const k=fkey(fc[0],fc[1]);if(seen.has(k)&&pool.length>=LEN)continue;seen.add(k);q.push(fc);}
  while(q.length<LEN)q.push(pool[Math.floor(Math.random()*pool.length)]);
  return q.slice(0,LEN);
}
/* plausible wrong answers near the product */
function distractors(a,b,answer){
  const c=new Set(),add=v=>{if(v>0&&v!==answer)c.add(v);};
  add(a*(b+1));add(a*(b-1));add((a+1)*b);add((a-1)*b);add(answer+a);add(answer-a);add(answer+b);add(answer-b);add(a+b);add(answer+1);add(answer-1);add(answer+10);
  return shuffle([...c]).slice(0,3);
}
const crownOf=id=>S.crowns[id]||0;
function nodeUnlocked(i){return i===0|| crownOf(NODES[i-1].id)>=1;}

    o.connect(g);g.connect(this.ac.destination);const n=this.ac.currentTime+t;g.gain.setValueAtTime(.0001,n);g.gain.exponentialRampToValueAtTime(.22,n+.02);g.gain.exponentialRampToValueAtTime(.0001,n+dur);o.start(n);o.stop(n+dur+.02);}catch(e){}},
  correct(){this.init();[[660,0],[880,.08],[1175,.16]].forEach(([f,t])=>this.beep(f,t,.18,"triangle"));},
  wrong(){this.init();this.beep(180,0,.22,"sawtooth");this.beep(140,.08,.22,"sawtooth");},

/* ===================== LESSON FLOW ===================== */
const L={node:null,q:[],i:0,hearts:MAX_HEARTS,correct:0,total:0,wrong:0,answered:false,cur:null,timerId:null};
let kpVal="";
function startLesson(idx){
  Snd.init();
  const node=NODES[idx]; L.node=node;L.q=buildQueue(node);L.i=0;L.hearts=MAX_HEARTS;L.correct=0;L.total=0;L.wrong=0;
  $("#lfoot").className="lfoot";show("lesson");renderQuestion();
}
function lessonTypes(){
  const c=crownOf(L.node.id); if(L.node.boss)return shuffle(["mc","type","tf"]);
  const sets=[["mc"],["mc","tf"],["mc","tf","type"],["mc","tf","type","missing"],["type","missing","mc","tf","match"]];
  let set=sets[Math.min(c,4)].slice();
  if(set.includes("match")&&(L.q.length-L.i<4||Math.random()>0.34))set.splice(set.indexOf("match"),1);
  return shuffle(set);
}
function renderHearts(){$("#hearts").innerHTML=Array.from({length:MAX_HEARTS},(_,k)=>k<L.hearts?"❤️":"🤍").join("");}
function renderQuestion(){
  L.answered=false;
  $("#prog").style.width=(L.i/L.q.length*100)+"%";
  renderHearts();
  $("#fb").className="fb";$("#lfoot").className="lfoot";
  const btn=$("#checkBtn");btn.className="btn";btn.textContent="Check";btn.disabled=true;btn.onclick=submit;
  stopTimer();
  const [a,b]=L.q[L.i]; const type=lessonTypes()[0];
  L.cur={a,b,type,answer:a*b,picked:null};
  const body=$("#qbody"); body.scrollTop=0;
  if(type==="match")return renderMatch(body);
  let head={mc:"Pick the answer",tf:"True or false?",type:"Type the answer",missing:"Find the missing number"}[type];
  if(L.node.boss)head="⚡ Beat the clock";
  let html=`<div class="qkind">${head}</div>`;
  if(type==="mc"||type==="tf")html+=dotVisual(a,b);
  if(type==="mc"){
    html+=`<div class="prompt">${a} × ${b} = <span class="q">?</span></div>`;
    const opts=shuffle([a*b,...distractors(a,b,a*b)]);
    html+=`<div class="choices">${opts.map(o=>`<button class="choice" data-v="${o}">${o}</button>`).join("")}</div>`;
  }else if(type==="tf"){
    const showWrong=Math.random()<.5; const shown=showWrong?(distractors(a,b,a*b)[0]||a*b+1):a*b;
    L.cur.tfTrue=shown===a*b;
    html+=`<div class="prompt">${a} × ${b} = ${shown}</div>`;
    html+=`<div class="tf"><button class="choice" data-v="true">✓ True</button><button class="choice" data-v="false">✗ False</button></div>`;
  }else if(type==="type"){
    html+=`<div class="prompt">${a} × ${b} = <span class="q">?</span></div>`+keypad();
  }else if(type==="missing"){
    const hideA=Math.random()<.5; L.cur.answer=hideA?a:b;
    html+=`<div class="prompt">${hideA?'<span class="q">?</span>':a} × ${hideA?b:'<span class="q">?</span>'} = ${a*b}</div>`+keypad();
  }
  body.innerHTML=html;
  if(type==="mc"||type==="tf")wireChoices();
  else wireKeypad();
  if(L.node.boss)startTimer();
}
function dotVisual(a,b){
  const cols=Math.min(b,12),rows=Math.min(a,12),pad=10;
  const cw=(260-pad*2)/cols, rh=Math.min(cw,18), r=Math.max(3,Math.min(cw/2-1.5,7));
  const W=260,H=pad*2+rows*rh;
  let dots="";for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)dots+=`<circle cx="${pad+cw*x+cw/2}" cy="${pad+rh*y+rh/2}" r="${r}" fill="url(#dg)"/>`;
  return `<div class="visual"><svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--a)"/><stop offset="1" stop-color="var(--b)"/></linearGradient></defs>${dots}</svg></div>`;
}
function keypad(){
  return `<div class="kpwrap"><div class="kpdisp empty" id="kpDisp">–</div>
   <div class="kp">${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-k="${n}">${n}</button>`).join("")}
   <button data-k="clr">⌫</button><button data-k="0">0</button><button data-k="ok" style="background:linear-gradient(135deg,var(--a),var(--b));color:#fff">✓</button></div></div>`;
}
function wireKeypad(){
  kpVal="";const disp=$("#kpDisp");
  $$(".kp button").forEach(bt=>bt.onclick=()=>{
    if(L.answered)return;const k=bt.dataset.k;
    if(k==="clr")kpVal=kpVal.slice(0,-1);
    else if(k==="ok"){if(kpVal)submit();return;}
    else if(kpVal.length<4)kpVal+=k;
    disp.textContent=kpVal||"–";disp.classList.toggle("empty",!kpVal);
    $("#checkBtn").disabled=!kpVal;
  });
}
function wireChoices(){
  $$(".choice").forEach(ch=>ch.onclick=()=>{
    if(L.answered)return;
    $$(".choice").forEach(c=>c.classList.remove("sel"));ch.classList.add("sel");
    L.cur.picked=ch.dataset.v;$("#checkBtn").disabled=false;
  });
}
function renderMatch(body){
  const pool=[],seen=new Set();
  const cand=[L.q[L.i],...shuffle(L.node.facts.slice())];
  for(const fc of cand){const k=fkey(fc[0],fc[1]);if(seen.has(k))continue;seen.add(k);pool.push(fc);if(pool.length>=4)break;}
  L.cur.match={done:0,n:pool.length};
  const left=pool.map((fc,i)=>({i,t:fc[0]+" × "+fc[1]}));
  const right=shuffle(pool.map((fc,i)=>({i,t:String(fc[0]*fc[1])})));
  body.innerHTML=`<div class="qkind">Match each fact to its answer</div>
    <div class="match"><div class="mcol">${left.map(o=>`<button class="mtile" data-side="L" data-i="${o.i}">${o.t}</button>`).join("")}</div>
    <div class="mcol">${right.map(o=>`<button class="mtile" data-side="R" data-i="${o.i}">${o.t}</button>`).join("")}</div></div>`;
  const btn=$("#checkBtn");btn.disabled=true;btn.textContent="Match them all";
  let selL=null,selR=null;
  $$(".mtile").forEach(t=>t.onclick=()=>{
    if(t.classList.contains("gone")||L.answered)return;
    if(t.dataset.side==="L"){$$('[data-side=L]').forEach(x=>x.classList.remove("sel"));t.classList.add("sel");selL=t;}
    else{$$('[data-side=R]').forEach(x=>x.classList.remove("sel"));t.classList.add("sel");selR=t;}
    if(selL&&selR){
      if(selL.dataset.i===selR.dataset.i){
        Snd.init();Snd.beep(720,0,.12,"triangle");[selL,selR].forEach(x=>{x.classList.add("gone");x.classList.remove("sel");});
        L.cur.match.done++;selL=selR=null;
        if(L.cur.match.done>=L.cur.match.n)finalizeAnswer(true,"Nice matching!","");
      }else{
        vibrate(20);[selL,selR].forEach(x=>{x.classList.add("bad");setTimeout(()=>x.classList.remove("bad"),350);x.classList.remove("sel");});
        selL=selR=null;
      }
    }
  });
}
function submit(){
  if(L.answered)return;
  const {type,a,b}=L.cur; let ok=false;
  if(type==="mc")ok=Number(L.cur.picked)===a*b;
  else if(type==="tf")ok=(L.cur.picked==="true")===L.cur.tfTrue;
  else if(type==="type")ok=Number(kpVal)===a*b;
  else if(type==="missing")ok=Number(kpVal)===L.cur.answer;
  if(type==="mc")$$(".choice").forEach(c=>{const v=Number(c.dataset.v);if(v===a*b)c.classList.add("right");else if(c.classList.contains("sel"))c.classList.add("wrongpick");else c.classList.add("dim");});
  if(type==="tf")$$(".choice").forEach(c=>{const val=c.dataset.v==="true";if(val===L.cur.tfTrue)c.classList.add("right");else if(c.classList.contains("sel"))c.classList.add("wrongpick");});
  if(type==="type"||type==="missing"){$("#kpDisp").classList.add(ok?"right":"wrongpick");if(!ok)$("#kpDisp").textContent=(kpVal||"–")+" → "+(type==="missing"?L.cur.answer:a*b);}
  finalizeAnswer(ok,ok?pick(["Correct!","Nice!","Perfect!","You've got it!"]):"Not quite",ok?"":a+" × "+b+" = "+(a*b));
}
function finalizeAnswer(ok,title,sub){
  if(L.answered)return;
  L.answered=true;stopTimer();L.total++;
  frecord(L.cur.a,L.cur.b,ok);
  if(ok)L.correct++; else {L.wrong++;L.hearts--;recycle(L.q[L.i]);}
  renderHearts();
  const fl=$("#flash");fl.className="flash "+(ok?"good":"bad");setTimeout(()=>fl.className="flash",150);
  ok?Snd.correct():Snd.wrong(); vibrate(ok?[12]:[40,30,40]);
  const fb=$("#fb");fb.className="fb on "+(ok?"good":"bad");$("#fbic").textContent=ok?"✓":"✕";$("#fbT").textContent=title;$("#fbP").textContent=sub;
  $("#lfoot").className="lfoot "+(ok?"good":"bad");
  const btn=$("#checkBtn");btn.className="btn "+(ok?"green":"");btn.textContent=L.i+1>=L.q.length?"Finish":"Continue";btn.disabled=false;btn.onclick=next;
  if(L.hearts<=0){btn.textContent="See results";btn.onclick=()=>finishLesson(false);}
}
function recycle(fc){const at=Math.min(L.q.length,L.i+2+Math.floor(Math.random()*2));L.q.splice(at,0,fc);}
function next(){L.i++;if(L.i>=L.q.length)return finishLesson(true);renderQuestion();}

/* boss timer */
function startTimer(){const t=$("#timer");t.classList.add("on");const bar=t.querySelector("i");bar.style.transition="none";bar.style.width="100%";
  requestAnimationFrame(()=>{bar.style.transition="width "+BOSS_TIME+"ms linear";bar.style.width="0%";});
  L.timerId=setTimeout(()=>{if(!L.answered){
    if(L.cur.type==="mc")$$(".choice").forEach(c=>{if(Number(c.dataset.v)===L.cur.a*L.cur.b)c.classList.add("right");});
    if(L.cur.type==="tf")$$(".choice").forEach(c=>{if((c.dataset.v==="true")===L.cur.tfTrue)c.classList.add("right");});
    finalizeAnswer(false,"Too slow!",L.cur.a+" × "+L.cur.b+" = "+(L.cur.a*L.cur.b));}},BOSS_TIME);}
function stopTimer(){if(L.timerId){clearTimeout(L.timerId);L.timerId=null;}$("#timer").classList.remove("on");}

/* ===================== FINISH + REWARDS ===================== */
function finishLesson(reachedEnd){
  stopTimer();
  const passed=L.hearts>0&&reachedEnd;
  const acc=Math.round(L.correct/Math.max(1,L.total)*100);
  const perfect=L.wrong===0&&passed;
  let xp=L.correct*2+(L.node.boss?6:4); if(perfect)xp+=5; if(S.boost>0){xp*=2;S.boost--;}
  let gems=passed?(1+(perfect?2:0)+(L.node.boss?2:0)):0;
  if(passed){const c=crownOf(L.node.id);if(c<5)S.crowns[L.node.id]=c+1;}
  S.xp+=xp; S.gems+=gems; rolloverDay(); S.dayXp+=xp;
  if(passed)bumpStreak();
  save(); loadLeague();
  Bridge.create("xp_events",{personId:CTX.personId,name:CTX.personName,xp,app:APP_ID,date:today()});
  if(passed)Bridge.send("SHOW_TOAST",{message:"+"+xp+" XP in Times Table Quest"});
  showComplete({xp,gems,acc,perfect,passed});
}
function bumpStreak(){
  const d=today(); if(S.lastDay===d)return;
  const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
  if(S.lastDay===yest||S.lastDay==="")S.streak=(S.streak||0)+1;
  else if(S.freeze>0){S.freeze--;S.streak=(S.streak||0)+1;}
  else S.streak=1;
  S.lastDay=d;save();
}
function showComplete(r){
  $("#doneIcon").textContent=r.perfect?"🌟":r.passed?"👑":"💔";
  $("#doneTitle").textContent=r.perfect?"Flawless!":r.passed?"Lesson complete!":"Out of hearts";
  $("#doneSub").textContent=r.passed?(L.node.label+" · crown "+crownOf(L.node.id)+"/5"):"Give it another go — you'll get them next time.";
  $("#doneTiles").innerHTML=`
    <div class="tile xp"><div class="k">XP earned</div><div class="v">+${r.xp}</div></div>
    <div class="tile acc"><div class="k">Accuracy</div><div class="v">${r.acc}%</div></div>
    <div class="tile gem"><div class="k">Gems</div><div class="v">+${r.gems}</div></div>
    <div class="tile str"><div class="k">Day streak</div><div class="v">${S.streak} 🔥</div></div>`;
  const cont=$("#doneCont");cont.textContent=r.passed?"Continue":"Try again";
  cont.onclick=()=>{ if(!r.passed){startLesson(NODES.indexOf(L.node));return;} renderHome();show("home"); };
  show("done"); if(r.perfect)Snd.win();
}

/* ===================== LEAGUE ===================== */
let LEAGUE=[];
async function loadLeague(){
  let rows=null; try{rows=await Bridge.list("xp_events");}catch(e){}
  const wkStart=weekStart(), agg={};
  if(rows&&rows.length)rows.forEach(it=>{const p=it.payload||it;if(!p||(p.date&&p.date<wkStart))return;const id=p.personId||p.name||"?";agg[id]=agg[id]||{name:p.name||id,xp:0,id};agg[id].xp+=Number(p.xp)||0;});
  const selfWeekly=S.dayXp;
  (CTX.people.length?CTX.people:[{id:CTX.personId,name:CTX.personName}]).forEach(p=>{
    if(!agg[p.id]){const seed=p.id===CTX.personId?selfWeekly:Math.round((Math.abs(hash(p.name||p.id))%70)+8);agg[p.id]={name:p.id===CTX.personId?"You":(p.name||"Member"),xp:seed,id:p.id};}
  });
  if(!agg[CTX.personId])agg[CTX.personId]={name:"You",xp:selfWeekly,id:CTX.personId};
  else{agg[CTX.personId].xp=Math.max(agg[CTX.personId].xp,selfWeekly);agg[CTX.personId].name="You";}
  LEAGUE=Object.values(agg).sort((a,b)=>b.xp-a.xp);
  renderLeaguePrev(); if($("#s-league").classList.contains("on"))renderLeagueFull();
}
function weekStart(){const d=new Date();const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10);}
function hash(s){let h=0;s=String(s);for(let i=0;i<s.length;i++)h=(h<<5)-h+s.charCodeAt(i)|0;return h;}
function leagueRow(p,rank){
  const me=p.id===CTX.personId, medal=["🥇","🥈","🥉"][rank-1]||rank;
  const col=COLORS[Math.abs(hash(p.id))%COLORS.length];
  return `<div class="lgrow ${me?"me":""}"><div class="rank">${medal}</div>
    <div class="av" style="background:${col}">${(p.name||"?")[0].toUpperCase()}</div>
    <div class="nm">${p.name}</div><div class="xp">${p.xp} XP</div></div>`;
}
function fallbackLeague(){return LEAGUE.length?LEAGUE:[{id:CTX.personId,name:"You",xp:S.dayXp}];}
function renderLeaguePrev(){$("#leaguePrev").innerHTML=fallbackLeague().slice(0,3).map((p,i)=>leagueRow(p,i+1)).join("");}
function renderLeagueFull(){$("#leagueFull").innerHTML=fallbackLeague().map((p,i)=>leagueRow(p,i+1)).join("");}

/* ===================== SHOP ===================== */
const SHOP=[
  {id:"freeze",ic:"🧊",name:"Streak Freeze",desc:"Protects your streak for one missed day.",cost:10,max:2},
  {id:"boost",ic:"⚡",name:"XP Boost",desc:"Double XP on your next lesson.",cost:15,max:3},
  {id:"refill",ic:"❤️",name:"Heart Refill",desc:"Hearts refill at the start of every lesson — you're always covered.",cost:0,free:true}
];
function renderShop(){
  $("#shopGems").textContent=S.gems;
  $("#shopBody").innerHTML=`<p style="font-size:13px;color:var(--muted);font-weight:650;margin:2px 2px 14px">Earn 💎 by finishing lessons. Spend them to protect your streak and power up.</p>`+
    SHOP.map(it=>{
      const owned=it.id==="freeze"?S.freeze:it.id==="boost"?S.boost:0;
      const btn=it.free?`<span class="cost owned">Built in</span>`:`<button class="cost" data-buy="${it.id}" ${S.gems<it.cost||owned>=it.max?"disabled":""}>${owned>=it.max?"Max":it.cost+" 💎"}</button>`;
      const sub=it.id==="freeze"&&S.freeze?` · you have ${S.freeze}`:it.id==="boost"&&S.boost?` · ${S.boost} ready`:"";
      return `<div class="shopitem"><div class="si">${it.ic}</div><div class="sd"><b>${it.name}${sub}</b><p>${it.desc}</p></div>${btn}</div>`;
    }).join("");
  $$("[data-buy]").forEach(b=>b.onclick=()=>buy(b.dataset.buy));
}
function buy(id){const it=SHOP.find(x=>x.id===id);if(!it||S.gems<it.cost)return;
  if(id==="freeze"){if(S.freeze>=it.max)return;S.freeze++;}
  if(id==="boost"){if(S.boost>=it.max)return;S.boost++;}
  S.gems-=it.cost;save();Snd.init();Snd.beep(880,0,.12,"triangle");UI.toast(it.name+" purchased!");renderShop();$("#cGems").textContent=S.gems;
}

/* ===================== UI util ===================== */
const UI={toast(m){const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(this._t);this._t=setTimeout(()=>t.classList.remove("on"),1900);}};

/* ===================== WIRING ===================== */
$("#themeBtn").onclick=()=>setTheme(S.theme==="dark"?"light":"dark");
$("#quitLesson").onclick=()=>{stopTimer();renderHome();show("home");};
$("#goShop").onclick=()=>{renderShop();show("shop");};
$("#shopBack").onclick=()=>{renderHome();show("home");};
$("#goLeague").onclick=()=>{renderLeagueFull();show("league");};
$("#leagueBack").onclick=()=>{renderHome();show("home");};
$("#path").addEventListener("click",e=>{
  const start=e.target.closest(".start"); if(start){const i=+start.dataset.i;if(nodeUnlocked(i))startLesson(i);return;}
  const bub=e.target.closest(".bub"); if(!bub)return;
  const i=+bub.dataset.i; if(!nodeUnlocked(i)){UI.toast("Finish the previous quest to unlock this!");return;}
  const node=bub.closest(".node"), open=node.classList.contains("sel");
  $$(".node").forEach(n=>n.classList.remove("sel")); if(!open)node.classList.add("sel");
});

/* boot */
setTheme(S.theme);
renderHome();
loadLeague();
})();
</script>
</body>
</html>
