<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Grocery Buddy - Kinetik</title>
<script type="application/kinetik-app+json">
{
  "appId": "grocery-buddy",
  "name": "Grocery Buddy",
  "shortName": "Grocery",
  "icon": "🛒",
  "gradient": ["#10b981", "#3b82f6"],
  "category": "productivity",
  "tagline": "Shared lists for everything.",
  "about": "One shared list engine for groceries, household tasks, trips, souvenirs, events and pantry inventory. Assign items, track cost, check off together in real time. Pulls ingredients straight from Cook Simple and Event Poll when they are installed.",
  "audience": "all",
  "circleTypes": ["family", "friends"],
  "worksWith": ["offline", "standalone", "calendar"],
  "status": "live",
  "minMembers": 1
}
</script>
<meta name="theme-color" content="#10b981">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{
  --radius-sm:14px; --radius-md:20px; --radius-lg:28px;
  --font:Inter,ui-sans-serif,system-ui,-apple-system,"SF Pro Display","Segoe UI",sans-serif;
  --dur1:.2s; --dur2:.38s; --ease:cubic-bezier(.32,.72,.28,1);
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --safeb:max(var(--sab),8px); --navh:calc(64px + var(--safeb));
  --acc:#10b981; --acc2:#3b82f6;
}
html[data-theme="dark"]{ --bg0:#05070f;--bg1:#0a1022;--bg2:#101a36;--text:#eef2ff;
  --dim:rgba(228,234,255,.62);--faint:rgba(228,234,255,.38);
  --glass:rgba(15,22,44,.55);--glass2:rgba(20,30,58,.72);
  --brd:rgba(255,255,255,.1);--brd2:rgba(255,255,255,.16);
  --shadow:0 24px 80px rgba(0,0,0,.45);--chip:rgba(255,255,255,.07);
  --ok:#34d399;--warn:#fbbf24;--bad:#fb7185; color-scheme:dark; }
html[data-theme="light"]{ --bg0:#eef2fb;--bg1:#e6ecfa;--bg2:#dfe7f8;--text:#0d1426;
  --dim:rgba(16,24,48,.7);--faint:rgba(16,24,48,.48);
  --glass:rgba(255,255,255,.62);--glass2:rgba(255,255,255,.85);
  --brd:rgba(255,255,255,.75);--brd2:rgba(120,140,190,.25);
  --shadow:0 24px 70px rgba(53,75,120,.18);--chip:rgba(20,40,90,.06);
  --ok:#059669;--warn:#d97706;--bad:#e11d48; color-scheme:light; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overscroll-behavior:none}
body{
  font-family:var(--font);color:var(--text);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(120% 80% at 12% -8%,color-mix(in srgb,var(--acc) 16%,transparent),transparent 46%),
    radial-gradient(120% 80% at 92% -4%,color-mix(in srgb,var(--acc2) 14%,transparent),transparent 42%),
    linear-gradient(180deg,var(--bg1),var(--bg0));
}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}

.app{height:100dvh;display:flex;flex-direction:column;max-width:640px;margin:0 auto;position:relative}
.top{display:flex;align-items:center;gap:11px;padding:calc(12px + var(--sat)) 16px 8px}
.mark{width:40px;height:40px;border-radius:14px;flex:0 0 auto;display:grid;place-items:center;font-size:21px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 10px 24px color-mix(in srgb,var(--acc) 34%,transparent)}
.top .ttl{min-width:0;flex:1}
.top h1{font-size:19px;letter-spacing:-.02em;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top .sub{font-size:11.5px;color:var(--faint);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;
  background:var(--chip);border:1px solid var(--brd2);color:var(--text);transition:transform var(--dur1) var(--ease)}
.iconbtn:active{transform:scale(.92)}

.view{flex:1;overflow-y:auto;padding:6px 16px calc(var(--navh) + 16px)}
.glass{background:var(--glass);backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);
  border:1px solid var(--brd);box-shadow:var(--shadow);border-radius:var(--radius-md)}
.card{padding:15px}
.lbl{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:11px 18px;
  font-weight:700;font-size:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  box-shadow:0 8px 26px color-mix(in srgb,var(--acc) 35%,transparent);transition:transform var(--dur1) var(--ease),opacity var(--dur1)}
.btn:active{transform:scale(.96)}
.btn[disabled]{opacity:.4;pointer-events:none}
.btn.ghost{background:var(--chip);border:1px solid var(--brd2);color:var(--text);box-shadow:none}
.btn.danger{background:linear-gradient(135deg,#f43f5e,#fb7185);box-shadow:0 8px 22px rgba(244,63,94,.3)}
.btn.sm{padding:8px 13px;font-size:12.5px}
.btn.block{width:100%}

.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:700;
  background:var(--chip);border:1px solid transparent;color:var(--dim);transition:all var(--dur1);white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.on{background:color-mix(in srgb,var(--acc) 18%,transparent);color:var(--text);border-color:color-mix(in srgb,var(--acc) 45%,transparent)}

.av{width:30px;height:30px;border-radius:50%;display:inline-grid;place-items:center;font-size:11.5px;font-weight:800;color:#fff;
  flex:0 0 auto;border:2px solid rgba(255,255,255,.25)}

input.fld,select.fld{width:100%;background:var(--chip);border:1px solid var(--brd2);border-radius:13px;padding:12px 13px;
  font-size:14px;outline:none;transition:border-color var(--dur1)}
input.fld:focus,select.fld:focus{border-color:color-mix(in srgb,var(--acc) 55%,transparent);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--acc) 12%,transparent)}

.hero{display:flex;align-items:center;gap:14px;padding:16px;margin:8px 0 12px;color:#fff;border-radius:var(--radius-lg);
  background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 18px 44px color-mix(in srgb,var(--acc2) 36%,transparent);position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.12)}
.hero .em{font-size:38px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.18));z-index:1}
.hero h2{font-size:20px;letter-spacing:-.02em;z-index:1}
.hero p{font-size:12.5px;opacity:.92;z-index:1;font-weight:600}
.ring{display:flex;gap:7px;margin-top:9px;z-index:1}
.ring b{background:rgba(255,255,255,.2);border-radius:11px;padding:6px 11px;font-size:12px;font-weight:800;backdrop-filter:blur(6px)}

.cat{margin-bottom:11px}
.cathead{display:flex;align-items:center;gap:9px;padding:8px 4px;cursor:pointer}
.cathead .cn{font-weight:800;font-size:14px;flex:1}
.cathead .cc{font-size:11.5px;color:var(--faint);font-weight:700}
.cathead .caret{transition:transform var(--dur2) var(--ease);color:var(--faint)}
.cat.closed .caret{transform:rotate(-90deg)}
.cat.closed .items{display:none}
.items{display:flex;flex-direction:column;gap:8px}

.row{position:relative;overflow:hidden;border-radius:var(--radius-sm)}
.row .surface{display:flex;align-items:center;gap:11px;padding:12px 13px;position:relative;z-index:1;
  background:var(--glass);backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);
  border:1px solid var(--brd);border-radius:var(--radius-sm);transition:transform var(--dur2) var(--ease)}
.row.swiped .surface{transform:translateX(-128px)}
.check{width:26px;height:26px;border-radius:9px;border:2px solid var(--brd2);flex:0 0 auto;display:grid;place-items:center;
  color:#fff;transition:all var(--dur1);background:transparent}
.check.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent}
.row .body{flex:1;min-width:0}
.row .body b{font-size:14.5px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .body .meta{font-size:11.5px;color:var(--faint);font-weight:600;display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:1px}
.row.done .body b{text-decoration:line-through;color:var(--faint)}
.row.done .surface{opacity:.62}
.link-badge{display:inline-flex;align-items:center;gap:3px;color:var(--acc)}
.qty{font-size:11px;font-weight:800;color:var(--dim);background:var(--chip);border-radius:8px;padding:3px 7px;flex:0 0 auto}
.swipe-actions{position:absolute;top:0;right:0;bottom:0;display:flex;z-index:0}
.swipe-actions button{width:64px;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:800;gap:3px}
.sa-edit{background:linear-gradient(135deg,#6366f1,#818cf8)}
.sa-del{background:linear-gradient(135deg,#f43f5e,#fb7185)}

.composer{margin:12px 0 4px;display:flex;flex-direction:column;gap:9px}
.composer .line1{display:grid;grid-template-columns:1fr auto;gap:8px}
.composer .line2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addbtn{width:46px;border-radius:13px;display:grid;place-items:center;font-size:24px;color:#fff;
  background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 8px 22px color-mix(in srgb,var(--acc) 32%,transparent)}
.addbtn:active{transform:scale(.93)}
.toggle-extra{font-size:12px;font-weight:700;color:var(--acc);text-align:center;padding:4px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat{padding:13px;text-align:center}
.stat b{font-size:22px;font-weight:800;display:block;line-height:1;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat span{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:6px;display:block}

.prow{display:flex;align-items:center;gap:11px;padding:12px 13px;margin-bottom:8px}
.prow .body{flex:1;min-width:0}
.prow .body b{font-size:14px;font-weight:700}
.prow .body span{font-size:11.5px;color:var(--faint);font-weight:600;display:block}
.bal{font-weight:800;font-size:14px}

.empty{text-align:center;padding:42px 20px;color:var(--faint)}
.empty .em{font-size:48px;margin-bottom:10px}
.empty b{display:block;color:var(--text);font-size:16px;margin-bottom:4px}
.empty p{font-size:13px}

.nav{position:absolute;left:0;right:0;bottom:0;height:var(--navh);display:flex;justify-content:center;gap:2px;
  padding:7px 12px var(--safeb);border-radius:26px 26px 0 0;background:var(--glass2);
  backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);
  border-top:1px solid var(--brd);box-shadow:0 -10px 40px rgba(20,35,70,.14);z-index:40}
.nav .pill{position:absolute;z-index:0;top:7px;height:48px;border-radius:20px;
  background:color-mix(in srgb,var(--acc) 14%,transparent);transition:left .34s var(--ease),width .34s var(--ease),opacity .25s;opacity:0}
.nav button{position:relative;z-index:1;flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border-radius:20px;font-size:10px;font-weight:700;color:var(--faint);transition:color var(--dur2) var(--ease)}
.nav button.on{color:var(--acc)}
.nav button.on svg{transform:translateY(-1px) scale(1.08)}
.nav svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;transition:transform var(--dur2) var(--ease)}

.toast{position:absolute;left:50%;bottom:calc(var(--navh) + 14px);transform:translate(-50%,16px) scale(.92);opacity:0;
  background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--brd);border-radius:999px;padding:11px 18px;
  font-size:13px;font-weight:700;box-shadow:var(--shadow);z-index:60;pointer-events:none;transition:all .3s var(--ease);white-space:nowrap}
.toast.show{transform:translate(-50%,0) scale(1);opacity:1}

.scrim{position:absolute;inset:0;background:rgba(5,8,18,.4);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity var(--dur2);z-index:50}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:51;transform:translateY(110%);transition:transform var(--dur2) var(--ease);
  background:var(--glass2);backdrop-filter:blur(28px) saturate(1.4);border-top:1px solid var(--brd);
  border-radius:26px 26px 0 0;padding:18px 18px calc(20px + var(--sab));box-shadow:0 -16px 50px rgba(0,0,0,.3);max-width:640px;margin:0 auto}
.sheet.show{transform:translateY(0)}
.sheet h3{font-size:18px;letter-spacing:-.02em;margin-bottom:13px}
.sheet .grid{display:flex;flex-direction:column;gap:11px}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.seg button{padding:11px 6px;border-radius:13px;background:var(--chip);border:1px solid var(--brd2);font-weight:700;font-size:12px;
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:all var(--dur1)}
.seg button .se{font-size:20px}
.seg button.on{background:color-mix(in srgb,var(--acc) 16%,transparent);border-color:color-mix(in srgb,var(--acc) 50%,transparent);color:var(--text)}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.rise{animation:rise .42s var(--ease) both}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="mark" id="hmark">🛒</div>
    <div class="ttl"><h1 id="htitle">Grocery Buddy</h1><div class="sub" id="hsub">Standalone</div></div>
    <button class="iconbtn" id="themeBtn" aria-label="Theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M6 6 4.5 4.5M19.5 19.5 18 18M18 6l1.5-1.5M4.5 19.5 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/></svg>
    </button>
  </header>

  <main class="view" id="view"></main>

  <nav class="nav" id="nav">
    <span class="pill" id="pill"></span>
    <button data-tab="items" class="on">
      <svg viewBox="0 0 24 24"><path d="M5 7h14l-1.2 9.5a2 2 0 0 1-2 1.7H8.2a2 2 0 0 1-2-1.7L5 7Z"/><path d="M9 7V5.5A2.5 2.5 0 0 1 11.5 3h1A2.5 2.5 0 0 1 15 5.5V7"/></svg>
      <span>Items</span>
    </button>
    <button data-tab="people">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 6.5a3 3 0 0 1 0 5.5M16.5 19a5.5 5.5 0 0 0-2-4.2"/></svg>
      <span>People</span>
    </button>
    <button data-tab="insights">
      <svg viewBox="0 0 24 24"><path d="M5 19V11M12 19V5M19 19v-6"/></svg>
      <span>Insights</span>
    </button>
    <button data-tab="more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7.5"/><path d="M12 8.4v.01M12 11.5v4.1"/></svg>
      <span>More</span>
    </button>
  </nav>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const APP_ID="grocery-buddy";
const CHANNEL="kinetik-kitchen";

const TYPES={
  shopping:{icon:"🛒",label:"Shopping",cats:["Produce","Dairy","Protein","Pantry","Frozen","Other"],cost:false,assign:false},
  household:{icon:"🏠",label:"Household",cats:["Maintenance","Cleaning","Decor","Supplies","Repairs"],cost:true,assign:true},
  trip:{icon:"✈️",label:"Trip",cats:["Documents","Clothing","Toiletries","Electronics","Gear"],cost:false,assign:true},
  souvenirs:{icon:"🎁",label:"Souvenirs",cats:["For Family","For Friends","For Me","Gifts"],cost:true,assign:false},
  event:{icon:"🎉",label:"Event",cats:["Decorations","Food","Drinks","Supplies"],cost:true,assign:true},
  inventory:{icon:"📦",label:"Inventory",cats:["Pantry","Freezer","Garage","Bathroom"],cost:false,assign:false}
};

const Bridge={
  embedded:window.self!==window.top, ctx:null, pend:{}, rq:0,
  init(cb){
    addEventListener("message",e=>{
      const m=e.data||{};
      if(m.type==="INIT_APP"){this.ctx=m.payload||{};if(this.ctx.theme)setTheme(this.ctx.theme);cb&&cb();}
      else if((m.type==="DATA_RESULT"||m.type==="SESSION_CONTEXT")&&this.pend[m.reqId]){this.pend[m.reqId](m.items||m.payload);delete this.pend[m.reqId];}
    });
    if(this.embedded){parent.postMessage({type:"QUERY_SESSION",reqId:++this.rq},"*");}
  },
  call(msg){return new Promise(res=>{const id=++this.rq;this.pend[id]=res;msg.reqId=id;parent.postMessage(msg,"*");
    setTimeout(()=>{if(this.pend[id]){delete this.pend[id];res(null);}},2500);});},
  async list(appId,collection){
    if(this.embedded){const r=await this.call({type:"DATA_LIST",appId,collection});if(r)return r.map(x=>({_id:x.id,...x.payload}));}
    return LS.get(appId+"_"+collection);
  },
  async create(appId,collection,payload){
    if(this.embedded){const r=await this.call({type:"DATA_CREATE",appId,collection,payload,ownerPersonId:false});if(r&&r[0])return r[0].id;}
    const a=LS.get(appId+"_"+collection);const _id="ls_"+uid();a.push({_id,...payload});LS.set(appId+"_"+collection,a);return _id;
  },
  async update(appId,collection,id,payload){
    if(this.embedded&&!String(id).startsWith("ls_")){await this.call({type:"DATA_UPDATE",id,payload});return;}
    const a=LS.get(appId+"_"+collection);const i=a.findIndex(x=>x._id===id);if(i>=0){a[i]={_id:id,...payload};LS.set(appId+"_"+collection,a);}
  },
  async remove(appId,collection,id){
    if(this.embedded&&!String(id).startsWith("ls_")){await this.call({type:"DATA_REMOVE",id});return;}
    let a=LS.get(appId+"_"+collection);a=a.filter(x=>x._id!==id);LS.set(appId+"_"+collection,a);
  },
  toast(m){if(this.embedded)parent.postMessage({type:"SHOW_TOAST",message:m},"*");toast(m);},
  calendar(p){if(this.embedded)parent.postMessage({type:"ADD_TO_CALENDAR",payload:p},"*");}
};
const LS={
  cid(){return (Bridge.ctx&&Bridge.ctx.circleId)||"solo";},
  key(k){return "kinetik_"+APP_ID+"_"+k+"_"+this.cid();},
  get(k){try{return JSON.parse(localStorage.getItem(this.key(k)))||[]}catch(e){return[]}},
  set(k,v){localStorage.setItem(this.key(k),JSON.stringify(v));}
};

const state={tab:"items",list:null,items:[],closedCats:{},swiped:null,showExtra:false,mineOnly:false,theme:"light",booted:false};

function setTheme(t){state.theme=t==="dark"?"dark":"light";document.documentElement.dataset.theme=state.theme;
  try{localStorage.setItem("kinetik_"+APP_ID+"_theme",state.theme)}catch(e){}}

function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1700);}

function people(){return (Bridge.ctx&&Bridge.ctx.people)||[];}
function meId(){return (Bridge.ctx&&Bridge.ctx.personId)||"me";}
function pName(id){const p=people().find(p=>p.id===id);return p?p.name:(id===meId()?"You":"Someone");}
function pColor(id){const p=people().find(p=>p.id===id);return p?p.color:"#10b981";}
function initials(n){return String(n||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();}

async function loadAll(){
  if(state.booted)return;state.booted=true;
  const lists=await Bridge.list(APP_ID,"lists");
  if(lists.length){state.list=lists[lists.length-1];}
  else{
    state.list={_id:null,type:"shopping",title:"Weekly Shop"};
    const id=await Bridge.create(APP_ID,"lists",{type:"shopping",title:"Weekly Shop"});
    state.list._id=id;
  }
  await loadItems();
}
async function loadItems(){
  const own=await Bridge.list(APP_ID,"items");
  const inbox=await Bridge.list(CHANNEL,"grocery_inbox");
  for(const inb of inbox){
    if(!own.find(o=>o.inboxId===inb._id)){
      const item={text:inb.text,category:inb.category||TYPES[state.list.type].cats[0],qty:inb.qty||"",unit:inb.unit||"",
        done:false,addedBy:inb.addedBy||"",source:inb.source||"recipe",linkLabel:inb.linkLabel||"",inboxId:inb._id};
      const id=await Bridge.create(APP_ID,"items",item);own.push({_id:id,...item});
    }
  }
  state.items=own;
}

function render(){
  if(!state.list)return;
  $("#hmark").textContent=TYPES[state.list.type].icon;
  $("#htitle").textContent=state.list.title;
  $("#hsub").textContent=(Bridge.ctx&&Bridge.ctx.circleName?Bridge.ctx.circleName+" · ":"")+TYPES[state.list.type].label+(Bridge.embedded?"":" · standalone");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===state.tab));
  movePill();
  const v=$("#view");
  if(state.tab==="items")v.innerHTML=viewItems();
  else if(state.tab==="people")v.innerHTML=viewPeople();
  else if(state.tab==="insights")v.innerHTML=viewInsights();
  else v.innerHTML=viewMore();
  wire();
}
function movePill(){const btn=document.querySelector(".nav button.on");if(!btn)return;
  const pill=$("#pill");pill.style.opacity="1";pill.style.left=btn.offsetLeft+"px";pill.style.width=btn.offsetWidth+"px";}

function viewItems(){
  const T=TYPES[state.list.type];
  let h=`<div class="hero rise"><div class="em">${T.icon}</div><div style="flex:1;min-width:0">
    <h2>${esc(state.list.title)}</h2><p>${state.items.filter(i=>!i.done).length} to get · ${state.items.filter(i=>i.done).length} done</p>
    <div class="ring"><b>${state.items.length} items</b>${T.cost?`<b>~${money(totalCost())}</b>`:""}</div></div></div>`;
  h+=`<div class="composer">
    <div class="line1"><input class="fld" id="addText" placeholder="Add ${T.label.toLowerCase()} item…" autocomplete="off"><button class="addbtn" id="addBtn">+</button></div>
    <div class="line2"><select class="fld" id="addCat">${T.cats.map(c=>`<option>${c}</option>`).join("")}</select>
    <input class="fld" id="addQty" placeholder="Qty (e.g. 2 kg)"></div>`;
  if(T.assign||T.cost){
    h+=`<div class="toggle-extra" id="toggleExtra">${state.showExtra?"– less":"+ assign / cost"}</div>`;
    if(state.showExtra){
      h+=`<div class="line2">`;
      if(T.assign)h+=`<select class="fld" id="addAssign"><option value="">Unassigned</option>${people().map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select>`;
      if(T.cost)h+=`<input class="fld" id="addCost" placeholder="Cost" inputmode="decimal">`;
      h+=`</div>`;
    }
  }
  h+=`</div>`;
  if(!state.items.length){
    h+=`<div class="empty"><div class="em">${T.icon}</div><b>List is empty</b><p>Add your first item above to get started.</p></div>`;return h;
  }
  const groups={};T.cats.forEach(c=>groups[c]=[]);
  state.items.forEach(it=>{(groups[it.category]||(groups[it.category]=[])).push(it);});
  for(const cat of Object.keys(groups)){
    const arr=groups[cat];if(!arr.length)continue;
    const done=arr.filter(i=>i.done).length;const closed=state.closedCats[cat];
    h+=`<div class="cat ${closed?"closed":""}" data-cat="${esc(cat)}">
      <div class="cathead" data-cathead="${esc(cat)}">
        <span class="cn">${esc(cat)}</span><span class="cc">${done}/${arr.length}</span>
        <svg class="caret" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div><div class="items">${arr.map(rowHtml).join("")}</div></div>`;
  }
  return h;
}
function rowHtml(it){
  const T=TYPES[state.list.type];const meta=[];
  if(it.qty)meta.push(`<span class="qty">${esc(it.qty)}${it.unit?" "+esc(it.unit):""}</span>`);
  if(it.source&&it.source!=="manual"&&it.linkLabel)meta.push(`<span class="link-badge">🔗 ${esc(it.linkLabel)}</span>`);
  if(T.assign&&it.assignedTo)meta.push(`<span style="color:${pColor(it.assignedTo)}">●</span> ${esc(pName(it.assignedTo))}`);
  else if(T.assign&&!it.assignedTo)meta.push(`<span style="color:var(--faint)">unassigned</span>`);
  if(T.cost&&it.cost)meta.push(money(it.cost));
  return `<div class="row ${it.done?"done":""} ${state.swiped===it._id?"swiped":""}" data-id="${it._id}">
    <div class="swipe-actions">
      <button class="sa-edit" data-edit="${it._id}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20h4L18 10l-4-4L4 16v4Z" stroke="#fff" stroke-width="1.9" stroke-linejoin="round"/></svg>Edit</button>
      <button class="sa-del" data-del="${it._id}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 7h14M10 7V5h4v2M6 7l1 13h10l1-13" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>Del</button>
    </div>
    <div class="surface">
      <button class="check ${it.done?"on":""}" data-toggle="${it._id}">${it.done?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>':""}</button>
      <div class="body"><b>${esc(it.text)}</b>${meta.length?`<div class="meta">${meta.join("")}</div>`:""}</div>
    </div></div>`;
}

function viewPeople(){
  const ppl=people();const T=TYPES[state.list.type];
  let h=`<div class="card glass rise" style="margin:8px 0 12px"><div class="lbl">Filter</div>
    <div style="margin-top:9px;display:flex;gap:8px"><button class="chip ${!state.mineOnly?"on":""}" data-filter="all">Everyone</button>
    <button class="chip ${state.mineOnly?"on":""}" data-filter="mine">Only mine</button></div></div>`;
  if(!ppl.length){h+=`<div class="empty"><div class="em">👥</div><b>Standalone mode</b><p>Circle members appear here when opened inside Kinetik.</p></div>`;return h;}
  h+=`<div class="lbl" style="padding:4px">Members</div>`;
  ppl.forEach(p=>{
    const assigned=state.items.filter(i=>i.assignedTo===p.id);
    const cost=state.items.filter(i=>i.cost&&i.assignedTo===p.id).reduce((s,i)=>s+(+i.cost||0),0);
    h+=`<div class="prow glass"><div class="av" style="background:${p.color}">${initials(p.name)}</div>
      <div class="body"><b>${esc(p.name)}</b><span>${assigned.length} item${assigned.length!==1?"s":""} assigned${assigned.filter(i=>i.done).length?` · ${assigned.filter(i=>i.done).length} done`:""}</span></div>
      ${T.cost&&cost?`<div class="bal">${money(cost)}</div>`:""}</div>`;
  });
  return h;
}

function viewInsights(){
  const T=TYPES[state.list.type];
  const open=state.items.filter(i=>!i.done).length, done=state.items.length-open;
  let h=`<div class="stats rise">
    <div class="stat glass"><b>${open}</b><span>Open</span></div>
    <div class="stat glass"><b>${done}</b><span>Done</span></div>
    <div class="stat glass"><b>${state.items.length}</b><span>Total</span></div></div>`;
  if(T.cost){h+=`<div class="card glass" style="margin-bottom:12px"><div class="lbl">Cost</div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;font-weight:800;font-size:15px"><span>Estimated total</span><span>${money(totalCost())}</span></div></div>`;}
  h+=`<div class="card glass" style="margin-bottom:12px"><div class="lbl">Recently added</div><div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">`;
  const recent=[...state.items].slice(-5).reverse();
  if(!recent.length)h+=`<p style="color:var(--faint);font-size:13px">Nothing yet.</p>`;
  recent.forEach(i=>{h+=`<div style="display:flex;justify-content:space-between;font-size:13.5px"><span>${i.done?"✓ ":""}${esc(i.text)}</span><span style="color:var(--faint)">${esc(i.category)}</span></div>`;});
  h+=`</div></div>`;
  h+=`<div style="display:flex;gap:9px"><button class="btn ghost" style="flex:1" id="shareBtn">Share card</button><button class="btn ghost" style="flex:1" id="clearBtn">Clear done</button></div>`;
  return h;
}

function viewMore(){
  const T=TYPES[state.list.type];
  let h=`<div class="card glass rise" style="margin:8px 0 12px"><div class="lbl">List</div>
    <div style="margin-top:11px;display:flex;flex-direction:column;gap:10px">
      <button class="btn ghost block" id="changeType" style="justify-content:space-between"><span>${T.icon} ${T.label}</span><span style="color:var(--faint)">change</span></button>
      <input class="fld" id="renameList" value="${esc(state.list.title)}" placeholder="List name">
    </div></div>`;
  h+=`<div class="card glass" style="margin-bottom:12px"><div class="lbl">Appearance</div>
    <button class="btn ghost block" style="margin-top:11px" id="themeBtn2">Switch to ${state.theme==="dark"?"light":"dark"} mode</button></div>`;
  h+=`<div class="card glass" style="margin-bottom:12px"><div class="lbl" style="color:var(--bad)">Danger</div>
    <button class="btn danger block" style="margin-top:11px" id="resetBtn">Clear entire list</button></div>`;
  h+=`<div class="empty" style="padding:20px"><p>Grocery Buddy · one shared list engine for shopping, household, trips, souvenirs, events & inventory. Connects with Cook Simple and Event Poll when installed.</p></div>`;
  return h;
}

function money(n){n=+n||0;return "$"+(n%1?n.toFixed(2):n);}
function totalCost(){return state.items.reduce((s,i)=>s+(+i.cost||0),0);}

function wire(){
  if(state.tab==="items"){
    const add=async()=>{
      const text=$("#addText").value.trim();if(!text)return;
      const item={text,category:$("#addCat").value,qty:$("#addQty").value.trim(),unit:"",done:false,addedBy:meId(),source:"manual",linkLabel:""};
      if($("#addAssign"))item.assignedTo=$("#addAssign").value;
      if($("#addCost"))item.cost=+$("#addCost").value||0;
      const id=await Bridge.create(APP_ID,"items",item);state.items.push({_id:id,...item});
      toast("Added");render();$("#addText").focus();
    };
    $("#addBtn").onclick=add;
    $("#addText").addEventListener("keydown",e=>{if(e.key==="Enter")add();});
    if($("#toggleExtra"))$("#toggleExtra").onclick=()=>{state.showExtra=!state.showExtra;render();};
    document.querySelectorAll("[data-cathead]").forEach(el=>el.onclick=()=>{const c=el.dataset.cathead;state.closedCats[c]=!state.closedCats[c];render();});
    document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=async e=>{e.stopPropagation();
      const it=state.items.find(i=>i._id===b.dataset.toggle);it.done=!it.done;it.doneBy=it.done?meId():null;
      await Bridge.update(APP_ID,"items",it._id,strip(it));
      if(it.done&&state.items.length&&state.items.every(i=>i.done))toast("All done! 🎉");
      render();});
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
      await Bridge.remove(APP_ID,"items",b.dataset.del);state.items=state.items.filter(i=>i._id!==b.dataset.del);state.swiped=null;toast("Removed");render();});
    document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{state.swiped=null;openEdit(b.dataset.edit);});
    enableSwipe();
  }
  if(state.tab==="people"){document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{state.mineOnly=b.dataset.filter==="mine";render();});}
  if(state.tab==="insights"){
    $("#shareBtn").onclick=shareCard;
    $("#clearBtn").onclick=async()=>{const done=state.items.filter(i=>i.done);for(const d of done)await Bridge.remove(APP_ID,"items",d._id);
      state.items=state.items.filter(i=>!i.done);toast("Cleared done");render();};
  }
  if(state.tab==="more"){
    $("#changeType").onclick=openTypePicker;
    $("#renameList").onchange=async e=>{state.list.title=e.target.value.trim()||"My List";
      if(state.list._id)await Bridge.update(APP_ID,"lists",state.list._id,{type:state.list.type,title:state.list.title});render();};
    $("#themeBtn2").onclick=()=>{setTheme(state.theme==="dark"?"light":"dark");render();};
    $("#resetBtn").onclick=async()=>{for(const it of state.items)await Bridge.remove(APP_ID,"items",it._id);state.items=[];toast("List cleared");render();};
  }
}
function strip(it){const{_id,...rest}=it;return rest;}

function enableSwipe(){
  document.querySelectorAll(".row").forEach(row=>{
    let sx=0,sy=0,dragging=false;
    row.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=false;},{passive:true});
    row.addEventListener("touchmove",e=>{const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)dragging=true;},{passive:true});
    row.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-sx;
      if(dragging&&dx<-40){state.swiped=row.dataset.id;render();}
      else if(dragging&&dx>40&&state.swiped===row.dataset.id){state.swiped=null;render();}},{passive:true});
  });
  $("#view").onclick=e=>{if(state.swiped&&!e.target.closest(".swipe-actions")&&!e.target.closest("[data-toggle]")){const r=e.target.closest(".row");if(!r||r.dataset.id!==state.swiped){state.swiped=null;render();}}};
}

function openEdit(id){
  const it=state.items.find(i=>i._id===id);if(!it)return;const T=TYPES[state.list.type];
  let h=`<h3>Edit item</h3><div class="grid">
    <input class="fld" id="eText" value="${esc(it.text)}">
    <select class="fld" id="eCat">${T.cats.map(c=>`<option ${c===it.category?"selected":""}>${c}</option>`).join("")}</select>
    <input class="fld" id="eQty" value="${esc(it.qty||"")}" placeholder="Quantity">`;
  if(T.assign)h+=`<select class="fld" id="eAssign"><option value="">Unassigned</option>${people().map(p=>`<option value="${p.id}" ${p.id===it.assignedTo?"selected":""}>${esc(p.name)}</option>`).join("")}</select>`;
  if(T.cost)h+=`<input class="fld" id="eCost" value="${it.cost||""}" placeholder="Cost" inputmode="decimal">`;
  h+=`<button class="btn block" id="eSave">Save</button></div>`;
  openSheet(h);
  $("#eSave").onclick=async()=>{it.text=$("#eText").value.trim()||it.text;it.category=$("#eCat").value;it.qty=$("#eQty").value.trim();
    if($("#eAssign"))it.assignedTo=$("#eAssign").value;if($("#eCost"))it.cost=+$("#eCost").value||0;
    await Bridge.update(APP_ID,"items",it._id,strip(it));closeSheet();toast("Saved");render();};
}
function openTypePicker(){
  let h=`<h3>List type</h3><div class="seg">`;
  for(const k of Object.keys(TYPES))h+=`<button data-type="${k}" class="${k===state.list.type?"on":""}"><span class="se">${TYPES[k].icon}</span>${TYPES[k].label}</button>`;
  h+=`</div><p style="color:var(--faint);font-size:12px;margin-top:12px">Changing type updates categories. Existing items keep their data.</p>`;
  openSheet(h);
  document.querySelectorAll("[data-type]").forEach(b=>b.onclick=async()=>{state.list.type=b.dataset.type;
    if(state.list._id)await Bridge.update(APP_ID,"lists",state.list._id,{type:state.list.type,title:state.list.title});
    closeSheet();render();});
}
function shareCard(){
  const T=TYPES[state.list.type];
  const lines=state.items.filter(i=>!i.done).map(i=>`· ${i.text}${i.qty?" ("+i.qty+")":""}`);
  const txt=`${T.icon} ${state.list.title}\n${lines.join("\n")||"(all done!)"}\n\nShared via Kinetik — Plans. People. Play.`;
  if(navigator.share){navigator.share({text:txt}).catch(()=>{});}
  else{navigator.clipboard.writeText(txt).then(()=>toast("Copied to clipboard")).catch(()=>toast("Copy failed"));}
}

function openSheet(html){$("#sheet").innerHTML=html;$("#sheet").classList.add("show");$("#scrim").classList.add("show");}
function closeSheet(){$("#sheet").classList.remove("show");$("#scrim").classList.remove("show");}
$("#scrim").onclick=closeSheet;

document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.swiped=null;render();});
$("#themeBtn").onclick=()=>{setTheme(state.theme==="dark"?"light":"dark");render();};
addEventListener("resize",movePill);

(function boot(){
  try{const t=localStorage.getItem("kinetik_"+APP_ID+"_theme");if(t)setTheme(t);}catch(e){}
  Bridge.init(async()=>{await loadAll();render();});
  if(!Bridge.embedded){loadAll().then(render);}
  else{setTimeout(()=>{if(!state.booted){loadAll().then(render);}},900);}
})();
</script>
</body>
</html>
