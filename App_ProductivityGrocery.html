<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#f6f8fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Grocery">
  <title>Grocery Buddy - Kinetik</title>
  <script type="application/kinetik-app+json">
{
  "appId": "grocery-buddy",
  "name": "Grocery Run",
  "shortName": "Grocery",
  "icon": "<svg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg' aria-hidden='true' fill='none' stroke='white' stroke-width='4.6' stroke-linecap='round' stroke-linejoin='round'><path d='M14 17h7l5 28h21l5-20H25'/><circle cx='30' cy='51' r='3' fill='white' stroke='none'/><circle cx='45' cy='51' r='3' fill='white' stroke='none'/><path d='M39 15c5 0 8 4 8 9-6 0-10-3-10-8M35 24c-5-2-8-6-7-12 6 1 9 5 9 12'/></svg>",
  "gradient": [
    "#23b993",
    "#4d8dff"
  ],
  "category": "productivity",
  "tagline": "Finish the shop together.",
  "about": "A shared grocery run app for lists, favorites, reusable baskets, shopping history, and circle helper points.",
  "audience": "all",
  "circleTypes": [
    "family",
    "friends"
  ],
  "worksWith": [
    "offline",
    "standalone"
  ],
  "status": "live",
  "minMembers": 1
}
</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root{
      color-scheme:light;
      --bg:#f6f8fb;
      --bg2:#edf4f1;
      --surface:rgba(255,255,255,.82);
      --surface2:rgba(255,255,255,.64);
      --line:rgba(20,35,54,.1);
      --line2:rgba(20,35,54,.16);
      --text:#101827;
      --muted:#657087;
      --faint:#96a0b3;
      --accent:#0fae8f;
      --accent2:#3b82f6;
      --good:#10b981;
      --danger:#e54865;
      --warn:#d97706;
      --shadow:0 18px 45px rgba(46,69,104,.14);
      --r:16px;
      --safe-b:env(safe-area-inset-bottom,0px);
      --safe-t:env(safe-area-inset-top,0px);
      --font:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    }
    [data-theme="dark"]{
      color-scheme:dark;
      --bg:#070b18;
      --bg2:#111827;
      --surface:rgba(21,29,48,.82);
      --surface2:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.1);
      --line2:rgba(255,255,255,.16);
      --text:#eef3ff;
      --muted:#a4b0cd;
      --faint:#66738f;
      --shadow:0 18px 54px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(120% 80% at 86% -10%, color-mix(in srgb,var(--accent2) 18%, transparent), transparent 54%),
        radial-gradient(100% 76% at 0 0, color-mix(in srgb,var(--accent) 18%, transparent), transparent 48%),
        linear-gradient(180deg,var(--bg2),var(--bg) 58%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow:hidden;
    }
    button,input{font:inherit;color:inherit}
    button{border:0;background:none;cursor:pointer}
    input{border:0;outline:0}
    h1,h2,h3,p{margin:0}
    ::-webkit-scrollbar{width:0;height:0}

    #app{max-width:520px;height:100dvh;margin:0 auto;display:grid;grid-template-rows:auto minmax(0,1fr) auto}
    header{
      padding:calc(var(--safe-t) + 14px) 16px 10px;
      background:linear-gradient(180deg,color-mix(in srgb,var(--bg2) 82%,transparent),transparent);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      z-index:5;
    }
    .brandrow{display:flex;align-items:center;gap:10px}
    .logo{
      width:38px;height:38px;border-radius:13px;display:grid;place-items:center;flex:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;font-size:21px;box-shadow:0 10px 22px color-mix(in srgb,var(--accent) 24%,transparent);
    }
    .brand{min-width:0}
    .brand h1{font-size:18px;font-weight:900;letter-spacing:0;line-height:1.05;white-space:nowrap}
    .brand p{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .spacer{flex:1}
    .xp-pill{
      min-width:54px;height:36px;padding:0 11px;border-radius:999px;display:flex;align-items:center;justify-content:center;gap:5px;
      background:var(--surface);border:1px solid var(--line);font-size:13px;font-weight:900;box-shadow:0 8px 22px rgba(35,50,80,.06);
    }
    .xp-pill b{color:var(--accent)}
    .iconbtn{
      width:36px;height:36px;border-radius:12px;display:grid;place-items:center;
      background:var(--surface);border:1px solid var(--line);box-shadow:0 8px 22px rgba(35,50,80,.06);
    }
    .iconbtn svg,.mini-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    main{min-height:0;overflow:hidden;padding:8px 14px calc(74px + var(--safe-b))}
    .view{display:none;height:100%;min-height:0;overflow-y:auto;animation:fade .22s ease}
    .view.active{display:block}
    #v-browse.active{display:flex;flex-direction:column;overflow:hidden}
    .browse-sticky{flex:none;position:relative;z-index:4;padding-bottom:6px}
    .browse-sticky:after{
      content:"";position:absolute;left:-14px;right:-14px;bottom:-12px;height:18px;pointer-events:none;
      background:linear-gradient(180deg,var(--bg),transparent);
    }
    .browse-scroll{min-height:0;overflow-y:auto;padding:2px 0 6px}
    @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

    .searchbar,.addbar{
      display:flex;align-items:center;gap:8px;padding:7px;border-radius:20px;
      background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.5));
      border:1px solid rgba(20,35,54,.08);box-shadow:0 16px 40px rgba(42,60,90,.11);
    }
    [data-theme="dark"] .searchbar,[data-theme="dark"] .addbar{background:var(--surface);border-color:var(--line)}
    .searchbar{margin-bottom:14px}
    .searchbar .mag{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;color:var(--muted);flex:none}
    .searchbar input,.addbar input{flex:1;min-width:0;background:transparent;font-size:14px;font-weight:650;padding:8px 3px}
    .searchbar input::placeholder,.addbar input::placeholder{color:var(--faint)}
    .nextbtn{
      height:34px;padding:0 12px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:5px;flex:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:12px;font-weight:950;box-shadow:0 8px 18px color-mix(in srgb,var(--accent) 20%,transparent);
    }
    .nextbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}

    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:13px 2px 9px}
    .section-head h2{font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .section-head small{font-size:11.5px;color:var(--faint);font-weight:850}
    .fav-strip,.chips{display:flex;gap:9px;overflow-x:auto;padding:1px 2px 2px;margin:0 -2px;scroll-snap-type:x proximity}
    .favorite-card{
      position:relative;flex:0 0 134px;height:64px;border-radius:19px;text-align:left;padding:9px 31px 9px 10px;
      display:grid;grid-template-columns:32px minmax(0,1fr);grid-template-rows:1fr 16px;column-gap:8px;align-items:center;
      background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.82));
      border:1px solid rgba(20,35,54,.08);box-shadow:0 14px 32px rgba(42,60,90,.11);
      scroll-snap-align:start;overflow:hidden;
    }
    [data-theme="dark"] .favorite-card{background:linear-gradient(180deg,rgba(35,45,66,.9),rgba(22,29,48,.84));border-color:var(--line)}
    .favorite-card b{
      display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
      grid-column:2;grid-row:1;max-width:72px;font-size:12.2px;line-height:1.05;font-weight:950;letter-spacing:0;white-space:normal;
    }
    .favorite-card .fav-meta{grid-column:2;grid-row:2;display:block;color:var(--muted);font-size:10.5px;line-height:1;font-weight:900;white-space:nowrap}
    .favorite-card .fav-ic{
      grid-column:1;grid-row:1/3;width:32px;height:32px;border-radius:11px;display:grid;place-items:center;
      background:color-mix(in srgb,#fbbf24 18%,white);font-size:20px;line-height:1;filter:drop-shadow(0 2px 3px rgba(217,119,6,.18));
    }
    .favorite-card.add{
      flex-basis:106px;display:grid;grid-template-columns:30px 1fr;grid-template-rows:1fr 14px;align-items:center;gap:0 8px;
      padding:9px 10px;text-align:left;color:var(--accent);font-weight:950;border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);
      background:linear-gradient(145deg,color-mix(in srgb,var(--accent) 12%,rgba(255,255,255,.88)),color-mix(in srgb,var(--accent2) 9%,rgba(255,255,255,.64)));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 12px 28px rgba(42,60,90,.09);
    }
    .favorite-card.add .plus{
      grid-row:1/3;width:30px;height:30px;border-radius:12px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:20px;line-height:1;box-shadow:0 8px 18px color-mix(in srgb,var(--accent) 22%,transparent);
    }
    .favorite-card.add .add-label{font-size:12.5px;line-height:1.02;font-weight:950;letter-spacing:0;max-width:48px;color:var(--text)}
    .favorite-card.add .add-sub{font-size:10.5px;line-height:1;font-weight:900;color:var(--muted)}
    .favorite-card .fav-del{
      position:absolute;right:7px;top:7px;width:23px;height:23px;border-radius:50%;
      display:grid;place-items:center;background:color-mix(in srgb,var(--danger) 12%,white);
      color:var(--danger);font-size:16px;line-height:1;font-weight:950;box-shadow:0 6px 14px rgba(229,72,101,.12);
    }
    .favorite-card .fav-del:active{transform:scale(.9)}
    .chips{padding-bottom:12px}
    .chip{
      flex:none;padding:8px 13px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);
      color:var(--muted);font-size:12.5px;font-weight:850;white-space:nowrap;scroll-snap-align:start;
    }
    .chip.on{color:white;border-color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 20%,transparent)}

    .catalog-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .tile{
      position:relative;min-height:78px;aspect-ratio:1;border-radius:18px;padding:8px 4px 7px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      background:var(--surface);border:1px solid var(--line);box-shadow:0 12px 28px rgba(42,60,90,.08);
      transition:transform .14s ease,border-color .16s ease,background .16s ease;
    }
    .tile:active{transform:scale(.94)}
    .tile.added{border-color:color-mix(in srgb,var(--accent) 68%,white);background:color-mix(in srgb,var(--accent) 10%,var(--surface))}
    .tile .emoji{font-size:27px;line-height:1}
    .tile .name{max-width:100%;padding:0 2px;font-size:10.8px;line-height:1.12;font-weight:800;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .qbadge{
      position:absolute;right:-4px;top:-5px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;
      display:grid;place-items:center;background:#ef4444;color:white;font-size:11px;font-weight:950;
      box-shadow:0 5px 14px rgba(239,68,68,.32);transform:scale(0);transition:transform .18s cubic-bezier(.2,1.5,.4,1);
    }
    .tile.added .qbadge{transform:scale(1)}
    @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.09)}100%{transform:scale(1)}}
    .tile.pulse{animation:pop .28s ease}

    .addbar{
      padding:6px;margin-bottom:12px;border-radius:22px;
      background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 14%,rgba(255,255,255,.58)),color-mix(in srgb,var(--accent2) 13%,rgba(255,255,255,.44)));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.62),0 16px 36px rgba(42,60,90,.12);
    }
    .addbar input{padding-left:10px}
    .actbtn{
      width:40px;height:40px;border-radius:14px;display:grid;place-items:center;flex:none;
      background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.52);color:var(--muted);
    }
    .actbtn.primary{background:linear-gradient(135deg,var(--accent),var(--good));color:white;border-color:transparent;box-shadow:0 8px 18px color-mix(in srgb,var(--accent) 24%,transparent)}
    .actbtn.export{
      width:52px;grid-template-columns:auto;gap:1px;color:white;font-size:10px;font-weight:950;border-color:transparent;
      background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 82%,var(--accent2)),color-mix(in srgb,var(--accent2) 82%,var(--accent)));
      box-shadow:0 8px 18px color-mix(in srgb,var(--accent2) 18%,transparent);
    }
    .actbtn.export svg{width:15px;height:15px}
    .actbtn.finish{background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;border-color:transparent}
    .actbtn:disabled{opacity:.42;pointer-events:none}
    .actbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.25;stroke-linecap:round;stroke-linejoin:round}

    .aisle{margin-bottom:15px}
    .aisle-title{display:flex;align-items:center;gap:7px;margin:0 2px 8px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
    .aisle-title .count{margin-left:auto;color:var(--faint);letter-spacing:0}
    .list-item{
      display:grid;grid-template-columns:34px minmax(0,1fr) auto 36px;align-items:center;gap:9px;
      min-height:58px;padding:10px;border-radius:16px;background:var(--surface);border:1px solid var(--line);box-shadow:0 10px 24px rgba(42,60,90,.07);margin-bottom:8px;
    }
    .list-item .emoji{font-size:23px;text-align:center}
    .list-item b{display:block;font-size:14.5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-item small{display:block;margin-top:3px;color:var(--faint);font-size:11.2px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .qty{min-width:34px;height:28px;padding:0 8px;border-radius:999px;display:grid;place-items:center;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-size:12px;font-weight:950}
    .remove{
      width:34px;height:34px;border-radius:12px;display:grid;place-items:center;
      color:var(--danger);background:color-mix(in srgb,var(--danger) 9%,transparent);border:1px solid color-mix(in srgb,var(--danger) 18%,transparent);
    }
    .remove svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round}

    .done-current{
      display:none;margin-bottom:14px;padding:13px;border-radius:18px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);
      grid-template-columns:1fr auto;gap:10px;align-items:center;
    }
    .done-current.show{display:grid}
    .done-current b{font-size:14px}
    .done-current span{display:block;margin-top:2px;color:var(--muted);font-size:12px;font-weight:700}
    .smallbtn{
      min-height:36px;padding:0 12px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:12px;font-weight:900;
    }
    .run-card{
      padding:14px;border-radius:18px;background:var(--surface);border:1px solid var(--line);box-shadow:0 12px 28px rgba(42,60,90,.08);margin-bottom:10px;
    }
    .run-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .label{
      display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:color-mix(in srgb,var(--accent) 12%,transparent);
      color:var(--accent);font-size:10px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;
    }
    .run-date{margin-top:8px;font-size:14px;font-weight:900}
    .run-count{margin-top:2px;font-size:12px;color:var(--muted);font-weight:800}
    .run-items{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.45;font-weight:650}
    .run-actions{display:flex;gap:8px;margin-top:12px}
    .run-actions button{
      min-height:36px;border-radius:12px;padding:0 12px;font-size:12px;font-weight:900;
      background:var(--surface2);border:1px solid var(--line);color:var(--text);
    }
    .run-actions button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-color:transparent}
    .run-actions button.danger{color:var(--danger);background:color-mix(in srgb,var(--danger) 8%,var(--surface2));border-color:color-mix(in srgb,var(--danger) 18%,transparent)}

    .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat{padding:14px;border-radius:16px;background:var(--surface);border:1px solid var(--line);box-shadow:0 10px 24px rgba(42,60,90,.07)}
    .stat .v{font-size:24px;font-weight:950;line-height:1;color:var(--accent)}
    .stat .k{margin-top:5px;font-size:11.5px;color:var(--muted);font-weight:800}
    .standings{padding:13px;border-radius:18px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow)}
    .standings h2{font-size:14px;margin-bottom:10px}
    .lb-row{display:grid;grid-template-columns:24px 30px 1fr auto;align-items:center;gap:9px;padding:9px 2px;border-top:1px solid var(--line)}
    .lb-row:first-of-type{border-top:0}
    .avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:white;font-size:11px;font-weight:900}
    .lb-row b{font-size:13px}
    .lb-row small{display:block;color:var(--faint);font-size:10.5px;font-weight:800;margin-top:1px}
    .points{color:var(--accent);font-weight:950;font-size:13px}

    .empty{padding:52px 22px;text-align:center;color:var(--muted)}
    .empty .big{font-size:43px;margin-bottom:12px}
    .empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
    .empty p{font-size:13px;line-height:1.5}
    .toast{
      position:fixed;left:50%;bottom:calc(88px + var(--safe-b));z-index:30;max-width:90%;
      transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;
      padding:10px 15px;border-radius:999px;background:#172033;color:white;font-size:13px;font-weight:850;box-shadow:0 12px 34px rgba(0,0,0,.24);
      transition:all .22s ease;text-align:center;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast b{color:#7dd3fc}
    .confirm-layer{
      position:fixed;inset:0;z-index:60;display:grid;place-items:end center;padding:18px 14px calc(18px + var(--safe-b));
      background:rgba(16,24,39,.26);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    }
    .confirm-card{
      width:min(100%,420px);padding:16px;border-radius:22px;background:var(--surface);border:1px solid var(--line);
      box-shadow:0 24px 70px rgba(16,24,39,.22);
    }
    .confirm-card h3{font-size:16px;font-weight:950;margin-bottom:5px}
    .confirm-card p{font-size:13px;line-height:1.45;color:var(--muted);font-weight:700}
    .confirm-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
    .confirm-actions button{height:42px;border-radius:14px;font-size:13px;font-weight:950;border:1px solid var(--line);background:var(--surface2)}
    .confirm-actions .delete{background:linear-gradient(135deg,#ef4444,#fb7185);color:white;border-color:transparent}

    nav{
      position:fixed;left:0;right:0;bottom:0;z-index:20;max-width:520px;margin:0 auto;
      display:flex;padding:8px 12px calc(8px + var(--safe-b));
      background:color-mix(in srgb,var(--surface) 88%,transparent);border-top:1px solid var(--line);
      backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);
    }
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--muted);font-size:10.5px;font-weight:850}
    .tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .tab.on{color:var(--accent)}
    @media(max-width:360px){
      .catalog-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .favorite-card{flex-basis:126px}
      .favorite-card.add{flex-basis:116px}
    }
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="brandrow">
        <div class="logo">🛒</div>
        <div class="brand">
          <h1>Grocery Buddy</h1>
          <p id="sub">Build your grocery list</p>
        </div>
        <div class="spacer"></div>
        <div class="xp-pill" title="Your grocery points this week">⚡ <b id="xpVal">0</b></div>
        <button class="iconbtn" id="themeBtn" title="Theme" aria-label="Theme">
          <svg viewBox="0 0 24 24"><path d="M12 3v2.2M12 18.8V21M4.4 4.4 6 6M18 18l1.6 1.6M3 12h2.2M18.8 12H21M4.4 19.6 6 18M18 6l1.6-1.6"/><circle cx="12" cy="12" r="4.2"/></svg>
        </button>
      </div>
    </header>

    <main>
      <section class="view active" id="v-browse">
        <div class="browse-sticky">
          <div class="searchbar">
            <span class="mag"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16.5 16.5 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
            <input id="searchInput" placeholder="Search groceries" autocomplete="off">
            <button class="nextbtn" id="browseNext" type="button">Next <svg viewBox="0 0 24 24"><path d="M5 12h13"/><path d="m13 6 6 6-6 6"/></svg></button>
          </div>
          <div class="section-head"><h2>Favorites</h2><small id="favHint">Reusable lists</small></div>
          <div class="fav-strip" id="favStrip"></div>
          <div class="section-head"><h2>Categories</h2><small id="resultCount"></small></div>
          <div class="chips" id="catChips"></div>
        </div>
        <div class="browse-scroll">
          <div class="section-head"><h2 id="gridTitle">Produce</h2><small>Tap to add</small></div>
          <div class="catalog-grid" id="catGrid"></div>

      <section class="view" id="v-list">
        <div class="addbar">

          <button class="actbtn primary" id="addGo" title="Add item" aria-label="Add item">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>

          <button class="actbtn export" id="exportPng" title="Export PNG" aria-label="Export PNG">
            <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="m8 15 2.5-3 2.2 2.4 1.6-1.7L18 17"/><circle cx="8.5" cy="8.5" r="1.4"/></svg>
            <span>PNG</span>
          </button>
          <button class="actbtn finish" id="finishNow" title="Finish list" aria-label="Finish list">

      <section class="view" id="v-done">
        <div class="done-current" id="doneCurrent">
          <div><b id="doneCurrentTitle">Current list ready</b><span id="doneCurrentSub"></span></div>
          <button class="smallbtn" id="doneFinish">Finish</button>
        </div>
        <div class="section-head"><h2>Recent Runs</h2><small id="runCountLabel"></small></div>
        <div id="histBody"></div>
      </section>

      <section class="view" id="v-you">
        <div class="statgrid">
          <div class="stat"><div class="v" id="sWeek">0</div><div class="k">Points this week</div></div>
          <div class="stat"><div class="v" id="sItems">0</div><div class="k">Items on list</div></div>
          <div class="stat"><div class="v" id="sBought">0</div><div class="k">Items finished</div></div>
          <div class="stat"><div class="v" id="sRuns">0</div><div class="k">Runs completed</div></div>
        </div>
        <div class="standings">
          <h2>Circle standings</h2>
          <div id="miniLb"></div>
        </div>
      </section>
    </main>

    <nav>
      <button class="tab on" data-v="browse" aria-label="Browse">
        <svg viewBox="0 0 24 24"><path d="M5 5h6v6H5zM13 5h6v6h-6zM5 13h6v6H5zM13 13h6v6h-6z"/></svg><span>Browse</span>
      </button>
      <button class="tab" data-v="list" aria-label="List">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg><span>List</span>
      </button>
      <button class="tab" data-v="done" aria-label="Done">
        <svg viewBox="0 0 24 24"><path d="M20 7 10 17l-5-5"/></svg><span>Done</span>
      </button>
      <button class="tab" data-v="you" aria-label="You">
        <svg viewBox="0 0 24 24"><path d="M12 3 9.2 8.8 3 9.7l4.5 4.4-1.1 6.2L12 17.4l5.6 2.9-1.1-6.2L21 9.7l-6.2-.9z"/></svg><span>You</span>
      </button>
    </nav>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const APP_MANIFEST_ID = "grocery-buddy";
    const COLLECTIONS = {
      items:"grocery_items",
      runs:"grocery_runs",
      favorites:"grocery_favorites",
      xp:"grocery_xp"
    };
    const CATALOG = {
      Produce:[["🍎","Apples"],["🍌","Bananas"],["🥑","Avocado"],["🍅","Tomatoes"],["🥬","Lettuce"],["🥕","Carrots"],["🧅","Onions"],["🥔","Potatoes"],["🍋","Lemons"],["🫑","Peppers"],["🥦","Broccoli"],["🍓","Strawberries"]],
      "Dairy & Eggs":[["🥛","Milk"],["🧀","Cheese"],["🧈","Butter"],["🥚","Eggs"],["🍦","Yogurt"],["🧁","Cream"]],
      Bakery:[["🍞","Bread"],["🥐","Croissants"],["🥯","Bagels"],["🫓","Pita"],["🧇","Waffles"]],
      "Meat & Fish":[["🍗","Chicken"],["🥩","Beef"],["🐟","Fish"],["🍤","Shrimp"],["🥓","Bacon"],["🌭","Sausages"]],
      Pantry:[["🍚","Rice"],["🍝","Pasta"],["🫒","Olive oil"],["🧂","Salt"],["🥫","Canned beans"],["🌾","Flour"],["🍯","Honey"],["☕","Coffee"],["🍵","Tea"],["🥜","Peanut butter"]],
      Frozen:[["🧊","Ice"],["🍕","Pizza"],["🍨","Ice cream"],["🥟","Dumplings"],["🍟","Fries"]],
      Drinks:[["💧","Water"],["🧃","Juice"],["🥤","Soda"],["🍷","Wine"],["🫖","Sparkling water"]],
      Household:[["🧻","Paper towels"],["🧼","Soap"],["🧴","Detergent"],["🪥","Toothpaste"],["🗑️","Bin bags"],["🔋","Batteries"]]
    };
    const AISLES = [...Object.keys(CATALOG),"Other"];
    const AISLE_EMOJI = {Produce:"🥬","Dairy & Eggs":"🥛",Bakery:"🍞","Meat & Fish":"🍗",Pantry:"🥫",Frozen:"🧊",Drinks:"🧃",Household:"🧻",Other:"🛒"};
    const $ = id => document.getElementById(id);
    const embedded = (()=>{try{return window.self!==window.top}catch(e){return true}})();
    const state = {
      ctx:{appId:APP_MANIFEST_ID,circleId:"standalone",circleName:"Personal",circleType:"personal",personId:"you",personName:"You",people:[{id:"you",name:"You",color:"#0fae8f"}]},
      cat:"Produce",query:"",items:[],runs:[],favorites:[],xp:[],loaded:false
    };
    const Bridge = (() => {
      let reqId = 0;
      const pending = {};
      function send(type,payload){
        if(!embedded) return;
        try{ window.parent.postMessage({type,appId:state.ctx.appId,...payload},"*"); }catch(e){}
      }
      function request(type,payload,timeout=1600){
        if(!embedded) return Promise.resolve({items:[]});
        const id = "grocery_"+(++reqId);
        send(type,{...payload,reqId:id});
        return new Promise(resolve=>{
          pending[id]=resolve;
          setTimeout(()=>{ if(pending[id]){ delete pending[id]; resolve({items:[],timeout:true}); } },timeout);
        });
      }
      window.addEventListener("message",e=>{
        const m=e.data||{};
        if(m.type==="INIT_APP"){
          const p=m.payload||{};
          state.ctx = {
            appId:p.appId||state.ctx.appId,
            circleId:p.circleId||state.ctx.circleId,
            circleName:p.circleName||state.ctx.circleName,
            circleType:p.circleType||state.ctx.circleType,
            personId:p.personId||state.ctx.personId,
            personName:p.personName||p.userName||state.ctx.personName,
            people:Array.isArray(p.people)&&p.people.length?p.people:state.ctx.people
          };
          applyContext();
          loadAll();
        }
        if(m.type==="DATA_RESULT" && m.reqId && pending[m.reqId]){
          pending[m.reqId]({items:m.items||[]});
          delete pending[m.reqId];
        }
      });
      return {request,send};
    })();

    function storageKey(collection){ return "kinetik:grocery:"+state.ctx.circleId+":"+collection; }
    function localRead(collection){ try{return JSON.parse(localStorage.getItem(storageKey(collection))||"[]")}catch(e){return []} }
    function localWrite(collection,items){ try{localStorage.setItem(storageKey(collection),JSON.stringify(items))}catch(e){} }
    function uid(prefix){ return prefix+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
    function cleanPayload(item){ const o={...item}; delete o._recordId; delete o._ownerPersonId; delete o._creating; return o; }
    function fromRecord(r){ return {...(r.payload||{}),_recordId:r.id,_ownerPersonId:r.ownerPersonId}; }
    async function listRecords(collection){
      if(!embedded) return localRead(collection);
      const res = await Bridge.request("DATA_LIST",{collection});
      return (res.items||[]).map(fromRecord);
    }
    async function createRecord(collection,payload,ownerPersonId=false){
      const body = cleanPayload(payload);
      if(!embedded){
        const out = {...body,_recordId:body.id||uid("local")};
        const cur = localRead(collection).filter(x=>x.id!==out.id);
        cur.push(out); localWrite(collection,cur); return out;
      }
      const res = await Bridge.request("DATA_CREATE",{collection,payload:body,ownerPersonId});
      const rec = (res.items||[])[0];
      return rec ? fromRecord(rec) : {...body,_recordId:body.id};
    }
    async function updateRecord(collection,item){
      const body = cleanPayload(item);
      if(!embedded){
        const cur = localRead(collection).map(x=>x.id===body.id?{...x,...body}:x);
        localWrite(collection,cur); return item;
      }
      if(!item._recordId) return createRecord(collection,body,false);
      await Bridge.request("DATA_UPDATE",{id:item._recordId,payload:body});
      return item;
    }
    async function removeRecord(collection,item){
      if(!embedded){
        localWrite(collection,localRead(collection).filter(x=>x.id!==item.id));
        return;
      }
      if(item._recordId) await Bridge.request("DATA_REMOVE",{id:item._recordId});
    }
    async function loadAll(){
      const [items,runs,favorites,xp] = await Promise.all([
        listRecords(COLLECTIONS.items),
        listRecords(COLLECTIONS.runs),
        listRecords(COLLECTIONS.favorites),
        listRecords(COLLECTIONS.xp)
      ]);
      state.items = items.filter(i=>!i.archived);
      state.runs = runs.sort((a,b)=>(b.ts||0)-(a.ts||0));
      state.favorites = favorites.sort((a,b)=>(b.ts||0)-(a.ts||0));
      state.xp = xp;
      state.loaded = true;
      refreshAll();
    }

    function applyContext(){
      $("sub").textContent = state.ctx.circleName ? `${state.ctx.personName} · ${state.ctx.circleName}` : `Hi ${state.ctx.personName}`;
    }
    function applyTheme(theme){
      const t = theme==="dark" ? "dark" : "light";
      document.documentElement.dataset.theme = t;
      try{localStorage.setItem("kinetik:grocery:theme",t)}catch(e){}
    }
    function bootTheme(){
      let t="light";
      try{t=localStorage.getItem("kinetik:grocery:theme")||"light"}catch(e){}
      applyTheme(t);
    }
    function escapeHtml(text){ return String(text??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
    function toast(html){
      const t=$("toast"); t.innerHTML=html; t.classList.add("show");
      Bridge.send("SHOW_TOAST",{message:t.textContent||""});
      clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove("show"),1500);
    }
    function askDelete(message){
      return new Promise(resolve=>{
        const layer=document.createElement("div");
        layer.className="confirm-layer";
        layer.innerHTML=`<div class="confirm-card" role="dialog" aria-modal="true" aria-label="Confirm delete">
          <h3>Are you sure?</h3>
          <p></p>
          <div class="confirm-actions"><button type="button" data-cancel>Cancel</button><button type="button" class="delete" data-delete>Delete</button></div>
        </div>`;
        layer.querySelector("p").textContent=message;
        const finish=value=>{layer.remove();resolve(value);};
        layer.querySelector("[data-cancel]").onclick=()=>finish(false);
        layer.querySelector("[data-delete]").onclick=()=>finish(true);
        layer.onclick=e=>{if(e.target===layer)finish(false);};
        layer.addEventListener("keydown",e=>{if(e.key==="Escape")finish(false);});
        document.body.appendChild(layer);
        layer.querySelector("[data-cancel]").focus();
      });
    }
    function weekKey(){
      const d=new Date(), start=new Date(d);
      start.setDate(d.getDate()-d.getDay());
      return start.getFullYear()+"-W"+Math.ceil((((start-new Date(start.getFullYear(),0,1))/864e5)+1)/7);
    }
    function emojiFor(name){
      const n=String(name||"").toLowerCase();
      for(const aisle in CATALOG){
        for(const [emoji,label] of CATALOG[aisle]){
          const l=label.toLowerCase();
          if(l===n || l.includes(n) || n.includes(l)) return [emoji,aisle];
        }
      }
      return ["🛒","Other"];
    }
    function personColor(personId){
      const p=state.ctx.people.find(x=>x.id===personId||x.name===personId);
      return p && p.color || "#64748b";
    }
    function initials(name){ return String(name||"?").trim().slice(0,1).toUpperCase(); }
    function itemCount(items=state.items){ return items.reduce((s,i)=>s+(Number(i.qty)||1),0); }
    function itemKey(name){ return String(name||"").trim().toLowerCase(); }
    function activeQty(name){ const it=state.items.find(i=>itemKey(i.name)===itemKey(name)); return it ? Number(it.qty)||1 : 0; }
    function catalogEntries(){
      return Object.entries(CATALOG).flatMap(([aisle,items])=>items.map(([emoji,name])=>({emoji,name,aisle})));
    }

    async function recordXP(points,reason){
      const ev = {
        id:uid("xp"),personId:state.ctx.personId,personName:state.ctx.personName,
        points,reason,week:weekKey(),ts:Date.now()
      };
      const saved = await createRecord(COLLECTIONS.xp,ev,false);
      state.xp.push(saved);
      renderYou();
    }
    async function addOrMerge(payload,points=2){
      const name = payload.name.trim();
      let existing = state.items.find(i=>itemKey(i.name)===itemKey(name));
      if(existing){
        existing.qty = (Number(existing.qty)||1) + (Number(payload.qty)||1);
        existing.updatedTs = Date.now();
        refreshAll();
        if(existing._creating) await existing._creating;
        await updateRecord(COLLECTIONS.items,existing);
      }else{
        const item = {
          id:uid("item"),name,aisle:payload.aisle||emojiFor(name)[1],emoji:payload.emoji||emojiFor(name)[0],
          qty:Number(payload.qty)||1,byPersonId:state.ctx.personId,byName:state.ctx.personName,ts:Date.now()
        };
        state.items.push(item);
        refreshAll();
        item._creating = createRecord(COLLECTIONS.items,item,false).then(async saved=>{
          const finalQty = Number(item.qty)||1;
          Object.assign(item,saved);
          item.qty = finalQty;
          delete item._creating;
          if(finalQty !== (Number(saved.qty)||1)) await updateRecord(COLLECTIONS.items,item);
          return item;
        });
        existing = await item._creating;
      }
      if(points) await recordXP(points,"Added "+name);
      refreshAll();
      return existing;
    }
    async function tapCatalog(name,emoji,aisle,el){
      await addOrMerge({name,emoji,aisle,qty:1},1);
      if(el){ el.classList.add("pulse"); setTimeout(()=>el.classList.remove("pulse"),280); }
      toast(`<b>${escapeHtml(name)}</b> added`);
    }
    async function addTyped(){
      const input=$("addInput");
      const v=input.value.trim();
      if(!v) return;
      const [emoji,aisle]=emojiFor(v);
      input.value="";
      await addOrMerge({name:v,emoji,aisle,qty:1},2);
      toast(`<b>${escapeHtml(v)}</b> added`);
    }
    async function reduceItem(id){
      const item=state.items.find(i=>i.id===id);
      if(!item) return;
      if((Number(item.qty)||1)>1){
        item.qty = Number(item.qty)-1;
        await updateRecord(COLLECTIONS.items,item);
      }else{
        if(!await askDelete(`Delete ${item.name} from your list?`)) return;
        await removeRecord(COLLECTIONS.items,item);
        state.items = state.items.filter(i=>i.id!==id);
      }
      refreshAll();
    }
    async function finishList(){
      if(!state.items.length){ toast("Your list is empty"); go("browse"); return; }
      const runItems = state.items.map(i=>({name:i.name,aisle:i.aisle,emoji:i.emoji,qty:Number(i.qty)||1,byPersonId:i.byPersonId,byName:i.byName}));
      const run = {
        id:uid("run"),ts:Date.now(),byPersonId:state.ctx.personId,byName:state.ctx.personName,
        count:itemCount(runItems),items:runItems
      };
      const saved = await createRecord(COLLECTIONS.runs,run,false);
      state.runs.unshift(saved);
      await recordXP(10,"Finished a grocery run");
      const old=[...state.items];
      await Promise.all(old.map(i=>removeRecord(COLLECTIONS.items,i)));
      state.items=[];
      refreshAll();
      go("done");
      toast("Run saved to <b>Done</b>");
    }
    async function repeatItems(items,label){
      if(!Array.isArray(items)||!items.length) return;
      for(const item of items){
        await addOrMerge({name:item.name,emoji:item.emoji,aisle:item.aisle,qty:Number(item.qty)||1},0);
      }
      await recordXP(3,"Repeated "+label);
      refreshAll();
      go("browse");
      toast("Repeated. Fine-tune in <b>Browse</b>");
    }
    async function saveFavorite(){
      if(!state.items.length){ toast("Add items before saving a favorite"); return; }
      const name = prompt("Name this favorite list", "Weekly basics");
      if(!name || !name.trim()) return;
      const fav = {id:uid("fav"),name:name.trim(),icon:"⭐",ts:Date.now(),items:state.items.map(i=>({name:i.name,aisle:i.aisle,emoji:i.emoji,qty:Number(i.qty)||1}))};
      const saved = await createRecord(COLLECTIONS.favorites,fav,false);
      state.favorites.unshift(saved);
      renderFavorites();
      toast("Favorite list saved");
    }
    async function deleteFavorite(id){
      const fav=state.favorites.find(f=>f.id===id);
      if(!fav) return;
      if(!await askDelete(`Delete favorite list "${fav.name}"?`)) return;
      await removeRecord(COLLECTIONS.favorites,fav);
      state.favorites=state.favorites.filter(f=>f.id!==id);
      renderFavorites();
    }
    async function deleteRun(id){
      const run=state.runs.find(r=>r.id===id);
      if(!run) return;
      if(!await askDelete(`Delete this run from history? ${formatDate(run.ts)} will be removed.`)) return;
      await removeRecord(COLLECTIONS.runs,run);
      state.runs=state.runs.filter(r=>r.id!==id);
      renderDone();
      renderYou();
      toast("Run deleted");
    }

    function renderBrowse(){
      $("searchInput").value = state.query;
      const cats = Object.keys(CATALOG);
      $("catChips").innerHTML = cats.map(c=>`<button class="chip ${c===state.cat&&!state.query?"on":""}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join("");
      document.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{state.cat=b.dataset.cat;state.query="";renderBrowse();});
      renderFavorites();
      let entries = state.query ? catalogEntries().filter(x=>(x.name+" "+x.aisle).toLowerCase().includes(state.query.toLowerCase())) : CATALOG[state.cat].map(([emoji,name])=>({emoji,name,aisle:state.cat}));
      $("gridTitle").textContent = state.query ? "Search results" : state.cat;
      $("resultCount").textContent = entries.length+" item"+(entries.length===1?"":"s");
      $("catGrid").innerHTML = entries.length ? entries.map(x=>{
        const qty=activeQty(x.name);
        return `<button class="tile ${qty?"added":""}" data-name="${escapeHtml(x.name)}" data-emoji="${escapeHtml(x.emoji)}" data-aisle="${escapeHtml(x.aisle)}">
          ${qty?`<span class="qbadge">${qty>9?"9+":qty}</span>`:""}<span class="emoji">${x.emoji}</span><span class="name">${escapeHtml(x.name)}</span>
        </button>`;
      }).join("") : `<div class="empty" style="grid-column:1/-1"><div class="big">🔎</div><h3>No matches</h3><p>Try a simpler grocery name.</p></div>`;
      document.querySelectorAll(".tile").forEach(b=>b.onclick=()=>tapCatalog(b.dataset.name,b.dataset.emoji,b.dataset.aisle,b));
    }
    function renderFavorites(){
      const add = `<button class="favorite-card add" id="saveFav"><span class="plus">＋</span><span class="add-label">New</span><span class="add-sub">favorite</span></button>`;
      const cards = state.favorites.map(f=>`<div class="favorite-card" role="button" tabindex="0" data-fav="${f.id}" aria-label="Repeat ${escapeHtml(f.name)}">
        <span class="fav-ic">${f.icon||"⭐"}</span><b>${escapeHtml(f.name)}</b><span class="fav-meta">${itemCount(f.items)} item${itemCount(f.items)===1?"":"s"}</span>
        <button class="fav-del" data-del-fav="${f.id}" aria-label="Delete ${escapeHtml(f.name)}">×</button>
      </div>`).join("");
      $("favStrip").innerHTML = add + cards;
      $("favHint").textContent = state.favorites.length ? state.favorites.length+" saved" : "Save current list";
      $("saveFav").onclick=saveFavorite;
      document.querySelectorAll("[data-fav]").forEach(b=>b.onclick=e=>{
        if(e.target.dataset.delFav) return;
        const fav=state.favorites.find(f=>f.id===b.dataset.fav);
        if(fav) repeatItems(fav.items,fav.name);
      });
      document.querySelectorAll("[data-fav]").forEach(b=>b.onkeydown=e=>{
        if(e.key!=="Enter"&&e.key!==" ") return;
        e.preventDefault();
        const fav=state.favorites.find(f=>f.id===b.dataset.fav);
        if(fav) repeatItems(fav.items,fav.name);
      });
      document.querySelectorAll("[data-del-fav]").forEach(b=>b.onclick=e=>{e.stopPropagation();deleteFavorite(b.dataset.delFav);});
    }
    function renderList(){
      const body=$("listBody");
      $("finishNow").disabled = !state.items.length;
      $("exportPng").disabled = !state.items.length;
      if(!state.items.length){
        body.innerHTML = `<div class="empty"><div class="big">🧺</div><h3>Your list is clear</h3><p>Start in Browse, use search, or type a custom item above.</p></div>`;
        return;
      }
      const groups={};
      state.items.forEach(i=>(groups[i.aisle||"Other"]=groups[i.aisle||"Other"]||[]).push(i));
      body.innerHTML = AISLES.filter(a=>groups[a]).map(a=>`<div class="aisle">
        <div class="aisle-title">${AISLE_EMOJI[a]||"🛒"} ${escapeHtml(a)}<span class="count">${groups[a].length}</span></div>
        ${groups[a].map(i=>`<div class="list-item">
          <div class="emoji">${i.emoji||"🛒"}</div>
          <div><b>${escapeHtml(i.name)}</b><small>${escapeHtml(i.byName||state.ctx.personName)}</small></div>
          <div class="qty">x${Number(i.qty)||1}</div>
          <button class="remove" data-remove="${i.id}" title="Remove one" aria-label="Remove one"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        </div>`).join("")}
      </div>`).join("");
      document.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>reduceItem(b.dataset.remove));
    }
    function renderDone(){
      const cur=$("doneCurrent");
      cur.classList.toggle("show",!!state.items.length);
      $("doneCurrentTitle").textContent = "Current list ready";
      $("doneCurrentSub").textContent = `${itemCount()} item${itemCount()===1?"":"s"} can be saved to history`;
      $("runCountLabel").textContent = state.runs.length ? state.runs.length+" saved" : "";
      const body=$("histBody");
      if(!state.runs.length){
        body.innerHTML = `<div class="empty"><div class="big">🧾</div><h3>No runs yet</h3><p>Finish a list once, then repeat it from here next time.</p></div>`;
        return;
      }
      body.innerHTML = state.runs.map((r,i)=>`<div class="run-card">
        <div class="run-top"><span class="label">${i===0?"Recent run":"Previous run"}</span><span class="points">${r.count||itemCount(r.items)} items</span></div>
        <div class="run-date">${formatDate(r.ts)}</div>
        <div class="run-count">Finished by ${escapeHtml(r.byName||"Someone")}</div>
        <div class="run-items">${runSummary(r.items)}</div>
        <div class="run-actions">
          <button class="primary" data-repeat="${r.id}">Repeat Run</button>
          <button data-run-png="${r.id}">Export PNG</button>
          <button class="danger" data-run-delete="${r.id}">Delete</button>
        </div>
      </div>`).join("");
      document.querySelectorAll("[data-repeat]").forEach(b=>b.onclick=()=>{
        const run=state.runs.find(r=>r.id===b.dataset.repeat);
        if(run) repeatItems(run.items,"run");
      });
      document.querySelectorAll("[data-run-png]").forEach(b=>b.onclick=()=>{
        const run=state.runs.find(r=>r.id===b.dataset.runPng);
        if(run) exportPng(run.items,"Grocery Run",`grocery-run-${dateSlug(run.ts)}.png`,formatDate(run.ts));
      });
      document.querySelectorAll("[data-run-delete]").forEach(b=>b.onclick=()=>deleteRun(b.dataset.runDelete));
    }
    function renderYou(){
      const week=weekKey();
      const myPoints = state.xp.filter(e=>e.week===week&&e.personId===state.ctx.personId).reduce((s,e)=>s+(Number(e.points)||0),0);
      $("xpVal").textContent = myPoints;
      $("sWeek").textContent = myPoints;
      $("sItems").textContent = itemCount();
      $("sBought").textContent = state.runs.reduce((s,r)=>s+(Number(r.count)||itemCount(r.items)),0);
      $("sRuns").textContent = state.runs.length;
      const by={};
      state.ctx.people.forEach(p=>by[p.id]={person:p,pts:0});
      state.xp.filter(e=>e.week===week).forEach(e=>{
        const id=e.personId||e.personName||"unknown";
        if(!by[id]) by[id]={person:{id,name:e.personName||"Someone",color:"#64748b"},pts:0};
        by[id].pts += Number(e.points)||0;
      });
      const rows=Object.values(by).sort((a,b)=>b.pts-a.pts);
      $("miniLb").innerHTML = rows.map((r,i)=>`<div class="lb-row">
        <span>${["🥇","🥈","🥉"][i]||i+1}</span>
        <span class="avatar" style="background:${r.person.color||personColor(r.person.id)}">${initials(r.person.name)}</span>
        <span><b>${escapeHtml(r.person.name)}${r.person.id===state.ctx.personId?" (you)":""}</b><small>${i===0&&r.pts>0?"Leading this week":"Grocery points"}</small></span>
        <span class="points">${r.pts}</span>
      </div>`).join("");
    }
    function refreshAll(){ renderBrowse(); renderList(); renderDone(); renderYou(); }

    function runSummary(items=[]){
      if(!items.length) return "No item detail saved for this older run.";
      const parts=items.slice(0,8).map(i=>`${i.emoji||"🛒"} ${escapeHtml(i.name)}${Number(i.qty)>1?" x"+Number(i.qty):""}`);
      return parts.join(" · ")+(items.length>8?` · +${items.length-8} more`:"");
    }
    function formatDate(ts){
      const d=ts?new Date(ts):new Date();
      return d.toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    }
    function dateSlug(ts){
      const d=ts?new Date(ts):new Date();
      return d.toISOString().slice(0,10);
    }
    function cssVar(name,fallback){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||fallback}
    function rounded(ctx,x,y,w,h,r){
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return}
      ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
    }
    function fitText(ctx,text,max){
      let out=String(text||"");
      if(ctx.measureText(out).width<=max) return out;
      while(out.length>1 && ctx.measureText(out+"...").width>max) out=out.slice(0,-1);
      return out+"...";
    }
    function exportPng(items=state.items,title="Grocery List",filename="grocery-list.png",meta){
      if(!items.length){toast("Nothing to export");return}
      const normalized=items.map(i=>({...i,qty:Number(i.qty)||1,aisle:i.aisle||"Other",emoji:i.emoji||"🛒"}));
      const groups={}; normalized.forEach(i=>(groups[i.aisle]=groups[i.aisle]||[]).push(i));
      const cols=normalized.length>26?3:(normalized.length>8?2:1);
      const maxRowsPerBlock=cols===1?999:(cols===2?8:7);
      const blocks=[];
      AISLES.filter(a=>groups[a]).forEach(a=>{
        for(let i=0;i<groups[a].length;i+=maxRowsPerBlock){
          blocks.push({aisle:a,items:groups[a].slice(i,i+maxRowsPerBlock)});
        }
      });
      const columns=Array.from({length:cols},()=>({blocks:[],units:0}));
      const totalUnits=blocks.reduce((s,b)=>s+1+b.items.length,0);
      const target=Math.ceil(totalUnits/cols);
      let col=0;
      blocks.forEach(block=>{
        if(col<cols-1 && columns[col].units && columns[col].units+1+block.items.length>target) col++;
        columns[col].blocks.push(block);
        columns[col].units+=1+block.items.length;
      });
      const dpr=Math.min(window.devicePixelRatio||1,2), width=1200, pad=54;
      const rowH=35, headH=30, blockGap=13;
      const columnHeights=columns.map(c=>c.blocks.reduce((s,b)=>s+headH+(b.items.length*rowH)+blockGap,0));
      const headerH=124, footerH=48;
      const height=Math.max(500,pad+headerH+Math.max(...columnHeights)+footerH);
      const canvas=document.createElement("canvas"); canvas.width=width*dpr; canvas.height=height*dpr;
      const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
      const accent=cssVar("--accent","#0fae8f"), accent2=cssVar("--accent2","#3b82f6");
      const bg=ctx.createLinearGradient(0,0,width,height);
      bg.addColorStop(0,"#e8f7f2"); bg.addColorStop(.5,"#f5f8fb"); bg.addColorStop(1,"#edf4ff");
      ctx.fillStyle=bg; ctx.fillRect(0,0,width,height);

      const cardX=pad, cardY=pad, cardW=width-pad*2, cardH=height-pad*2;
      ctx.fillStyle="rgba(255,255,255,.72)"; rounded(ctx,cardX,cardY,cardW,cardH,34); ctx.fill();
      ctx.strokeStyle="rgba(20,35,54,.08)"; ctx.lineWidth=1; ctx.stroke();

      const headerGrad=ctx.createLinearGradient(cardX+16,cardY+14,cardX+cardW-16,cardY+98);
      headerGrad.addColorStop(0,accent); headerGrad.addColorStop(1,accent2);
      ctx.fillStyle=headerGrad; rounded(ctx,cardX+16,cardY+14,cardW-32,90,27); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.18)"; rounded(ctx,cardX+24,cardY+23,56,56,18); ctx.fill();
      ctx.fillStyle="white"; ctx.font='32px "Segoe UI Emoji", sans-serif'; ctx.fillText("🛒",cardX+35,cardY+62);
      ctx.fillStyle="white"; ctx.font="900 33px Inter, Segoe UI, sans-serif"; ctx.fillText(title,cardX+96,cardY+51);
      ctx.fillStyle="rgba(255,255,255,.82)"; ctx.font="750 16px Inter, Segoe UI, sans-serif";
      const line = meta || formatDate(Date.now());
      ctx.fillText(`${line} · ${state.ctx.circleName}`,cardX+98,cardY+78);
      const totalQty=itemCount(normalized), badgeText=`${totalQty} item${totalQty===1?"":"s"}`;
      ctx.font="900 18px Inter, Segoe UI, sans-serif";
      const badgeW=Math.max(118,ctx.measureText(badgeText).width+34);
      ctx.fillStyle="rgba(255,255,255,.2)"; rounded(ctx,cardX+cardW-badgeW-36,cardY+35,badgeW,44,22); ctx.fill();
      ctx.fillStyle="white"; ctx.fillText(badgeText,cardX+cardW-badgeW-19,cardY+63);

      const gap=26, listX=cardX+32, listY=cardY+headerH, availableW=cardW-64;
      const colW=(availableW-gap*(cols-1))/cols;
      columns.forEach((column,ci)=>{
        let x=listX+ci*(colW+gap), y=listY;
        column.blocks.forEach(block=>{
          const headText=`${AISLE_EMOJI[block.aisle]||"🛒"} ${block.aisle}`.toUpperCase();
          ctx.font="900 12px Inter, Segoe UI, sans-serif";
          const headW=Math.min(colW,ctx.measureText(headText).width+31);
          const headGrad=ctx.createLinearGradient(x,y,x+headW,y);
          headGrad.addColorStop(0,accent); headGrad.addColorStop(1,accent2);
          ctx.fillStyle=headGrad; rounded(ctx,x,y,headW,24,12); ctx.fill();
          ctx.fillStyle="white"; ctx.fillText(headText,x+11,y+16);
          y+=headH;
          block.items.forEach((item,idx)=>{
            if(idx%2===0){ ctx.fillStyle="rgba(15,174,143,.045)"; rounded(ctx,x,y+1,colW,rowH-5,10); ctx.fill(); }
            ctx.strokeStyle="rgba(20,35,54,.07)"; ctx.beginPath(); ctx.moveTo(x+4,y+rowH-1); ctx.lineTo(x+colW-4,y+rowH-1); ctx.stroke();
            ctx.strokeStyle="rgba(15,174,143,.5)"; ctx.lineWidth=2;
            rounded(ctx,x+8,y+9,15,15,5); ctx.stroke(); ctx.lineWidth=1;
            ctx.font='18px "Segoe UI Emoji", sans-serif'; ctx.fillStyle="#101827"; ctx.fillText(item.emoji,x+33,y+23);
            ctx.font="800 16px Inter, Segoe UI, sans-serif"; ctx.fillStyle="#101827";
            const label=fitText(ctx,item.name,colW-126);
            const labelX=x+60;
            ctx.fillText(label,labelX,y+23);
            const labelW=ctx.measureText(label).width;
            const qText="x"+item.qty;
            ctx.font="900 12px Inter, Segoe UI, sans-serif";
            const qW=Math.max(34,ctx.measureText(qText).width+18);
            const qX=Math.min(labelX+labelW+10,x+colW-qW-8);
            ctx.fillStyle="rgba(15,174,143,.13)"; rounded(ctx,qX,y+7,qW,21,10.5); ctx.fill();
            ctx.fillStyle=accent; ctx.fillText(qText,qX+(qW-ctx.measureText(qText).width)/2,y+21);
            y+=rowH;
          });
          y+=blockGap;
        });
      });
      ctx.fillStyle="#7b8496"; ctx.font="750 15px Inter, Segoe UI, sans-serif"; ctx.fillText("Grocery Buddy",cardX+30,cardY+cardH-28);
      ctx.fillStyle=accent; ctx.font="900 15px Inter, Segoe UI, sans-serif"; ctx.fillText("Kinetik",cardX+cardW-86,cardY+cardH-28);
      const href=canvas.toDataURL("image/png");
      const a=document.createElement("a"); a.download=filename; a.href=href;
      document.body.appendChild(a); a.click(); a.remove();
      toast("PNG exported");
      return href;
    }

    function go(v){
      document.querySelectorAll(".view").forEach(s=>s.classList.toggle("active",s.id==="v-"+v));
      document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.v===v));
      if(v==="browse") renderBrowse();
      if(v==="list") renderList();
      if(v==="done") renderDone();
      if(v==="you") renderYou();
      document.querySelector("main").scrollTop=0;
    }

    $("themeBtn").onclick=()=>applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark");
    $("searchInput").addEventListener("input",e=>{state.query=e.target.value.trim();renderBrowse();});
    $("browseNext").onclick=()=>go("list");
    $("addGo").onclick=addTyped;
    $("addInput").addEventListener("keydown",e=>{if(e.key==="Enter")addTyped();});
    $("finishNow").onclick=finishList;
    $("doneFinish").onclick=finishList;
    $("exportPng").onclick=()=>exportPng(state.items,"Grocery List",`grocery-list-${dateSlug(Date.now())}.png`);
    document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>go(t.dataset.v));

    bootTheme();
    applyContext();
    if(!embedded) loadAll();
  </script>
</body>
</html>
