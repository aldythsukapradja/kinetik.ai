<!doctype html>
<!--
KINETIK APP STANDARD v1.0 — App_EventPoll.html

Modular single-file app inside the Kinetik ecosystem.
Works A) embedded in Kinetik.html via iframe + AppBridge, B) standalone with localStorage.
Data: AppRecords collection "polls" payload {question,options[],votes{personId/name:option},open,createdBy}.
Share invite text (§72.4). Circle-scoped: circleId/personId only.

APP BRIDGE: receives INIT_APP {circleId,circleType,personId,theme,appId,people[]}.
Sends DATA_LIST/CREATE/UPDATE, ADD_TO_CALENDAR (winning option), SHOW_TOAST.

React/TS scale-up: becomes a feature module; keep AppBridge/DataAPI contracts.
-->
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Event Poll</title>
<script type="application/kinetik-app+json">
{"appId":"event-poll","name":"Event Poll","shortName":"Poll","icon":"🗳️","gradient":["#8b5cf6","#d946ef"],"category":"productivity","tagline":"Find the best time, fast.","about":"Propose dates, let everyone in the circle vote with one tap, and watch the bars race. Close the poll and the winning time lands on the shared calendar automatically.","audience":"all","circleTypes":["family","friends"],"worksWith":["calendar"],"status":"live","minMembers":2}
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{--r:16px;--font:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;--acc:#8b5cf6;--acc2:#d946ef}
html[data-theme="dark"]{--bg:#0a0716;--bg2:#160f2e;--text:#f2eeff;--dim:rgba(235,228,255,.6);--glass:rgba(28,19,58,.66);--brd:rgba(255,255,255,.1);--chip:rgba(255,255,255,.07);color-scheme:dark}
html[data-theme="light"]{--bg:#f1edfb;--bg2:#e7e0fa;--text:#171029;--dim:rgba(30,20,52,.6);--glass:rgba(255,255,255,.72);--brd:rgba(255,255,255,.8);--chip:rgba(40,20,90,.06);color-scheme:light}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;
background:radial-gradient(110% 80% at 85% -5%,color-mix(in srgb,var(--acc) 18%,transparent),transparent 55%),linear-gradient(165deg,var(--bg2),var(--bg));-webkit-font-smoothing:antialiased}
#app{max-width:560px;margin:0 auto;padding:18px 18px 60px}
h1{font-size:23px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
h1 small{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--acc2);text-transform:uppercase}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin:13px 0;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.lbl{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:9px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:999px;padding:12px 22px;font-weight:700;font-size:14px;font-family:var(--font);color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 8px 24px color-mix(in srgb,var(--acc) 35%,transparent);transition:transform .15s}
.btn:active{transform:scale(.96)}.btn.ghost{background:var(--chip);color:var(--text);box-shadow:none;border:1px solid var(--brd)}
.btn.sm{padding:8px 15px;font-size:12.5px}.btn[disabled]{opacity:.4;pointer-events:none}
input.fld{width:100%;background:var(--chip);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;margin-bottom:9px}
input.fld:focus{border-color:var(--acc)}
.opt{width:100%;text-align:left;border:1.5px solid var(--brd);background:var(--chip);border-radius:13px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-family:var(--font);color:var(--text);position:relative;overflow:hidden;transition:.15s}
.opt .fill{position:absolute;inset:0;background:color-mix(in srgb,var(--acc) 16%,transparent);transform-origin:left;z-index:0}
.opt .in{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:14.5px;font-weight:600}
.opt .ct{font-size:12px;color:var(--dim);font-weight:700}
.opt.mine{border-color:var(--acc)}
.opt.win{border-color:#fbbf24}
.opt small{display:block;font-weight:500;font-size:11.5px;color:var(--dim)}
.who{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tag{font-size:10.5px;font-weight:700;background:var(--chip);border-radius:99px;padding:3px 9px;color:var(--dim)}
.status{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:99px}
.status.open{background:color-mix(in srgb,#34d399 16%,transparent);color:#34d399}
.status.closed{background:var(--chip);color:var(--dim)}
.phead{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:10px}
.phead b{font-size:16.5px;letter-spacing:-.01em}
.note{font-size:12px;color:var(--dim)}
.wrap{display:flex;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const APP_ID="event-poll";
let CTX=null,embedded=false,polls=[],creating=false;

/* ---- Bridge / storage ---- */
const pend={};let rq=0;
function bridge(msg){return new Promise(res=>{const id=++rq;pend[id]=res;msg.reqId=id;msg.appId=APP_ID;parent.postMessage(msg,"*");setTimeout(()=>{if(pend[id]){delete pend[id];res(null);}},2500);});}
addEventListener("message",e=>{
  const m=e.data||{};
  if(m.type==="INIT_APP"){CTX=m.payload;embedded=true;document.documentElement.dataset.theme=CTX.theme||"dark";load().then(render);}
  if(m.type==="DATA_RESULT"&&pend[m.reqId]){pend[m.reqId](m.items);delete pend[m.reqId];}
});
const LS={get k(){return "poll_local_"+(CTX?CTX.circleId:"solo");},
  load(){try{return JSON.parse(localStorage.getItem(this.k))||[]}catch(e){return[]}},
  save(a){localStorage.setItem(this.k,JSON.stringify(a));}};
async function load(){
  if(embedded){const items=await bridge({type:"DATA_LIST",collection:"polls"});if(items){polls=items.map(r=>({recId:r.id,...r.payload}));return;}}
  polls=LS.load();
}
async function persist(p){
  if(embedded){
    if(p.recId)await bridge({type:"DATA_UPDATE",collection:"polls",id:p.recId,payload:stripped(p)});
    else{const r=await bridge({type:"DATA_CREATE",collection:"polls",payload:stripped(p)});if(r&&r[0])p.recId=r[0].id;}
    return;
  }
  LS.save(polls);
}
const stripped=p=>({question:p.question,options:p.options,votes:p.votes,open:p.open,createdBy:p.createdBy});
function toast(m){if(embedded)parent.postMessage({type:"SHOW_TOAST",message:m},"*");else{const t=document.createElement("div");t.textContent=m;t.style.cssText="position:fixed;left:50%;transform:translateX(-50%);bottom:30px;background:var(--glass);border:1px solid var(--brd);backdrop-filter:blur(14px);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:99";document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}}
const myId=()=>CTX?CTX.personId:"me";
const nameOf=id=>{if(CTX&&CTX.people){const p=CTX.people.find(p=>p.id===id);if(p)return p.name;}return id==="me"?"Me":id;};

/* ---- UI ---- */
function render(){
  const A=$("#app");
  A.innerHTML=`<h1>🗳️ Event Poll <small>Kinetik</small></h1>
  ${!embedded?'<p class="note" style="margin:3px 0 6px">Standalone mode · data stays on this device</p>':""}
  <div id="body"></div>`;
  const B=$("#body");
  if(creating){renderCreate(B);return;}
  B.innerHTML=`<button class="btn" id="newP" style="margin:6px 0 4px">+ New poll</button>
  ${polls.length?polls.map((p,i)=>pollCard(p,i)).join(""):'<div class="card" style="text-align:center;color:var(--dim)">No polls yet.<br>Create one to find the best time 🗳️</div>'}`;
  $("#newP").onclick=()=>{creating=true;render();};
  polls.forEach((p,i)=>wireCard(p,i));
}
function counts(p){
  const c={};p.options.forEach(o=>c[o]=[]);
  Object.entries(p.votes||{}).forEach(([who,opt])=>{if(c[opt])c[opt].push(who);});
  return c;
}
function pollCard(p,i){
  const c=counts(p),tot=Object.keys(p.votes||{}).length;
  const max=Math.max(1,...Object.values(c).map(a=>a.length));
  const winner=p.options.reduce((w,o)=>c[o].length>((c[w]||[]).length)?o:w,p.options[0]);
  return `<div class="card" id="poll${i}">
    <div class="phead"><b>${esc(p.question)}</b><span class="status ${p.open?"open":"closed"}">${p.open?"Open":"Closed"}</span></div>
    ${p.options.map(o=>{
      const vs=c[o],mine=(p.votes||{})[myId()]===o,isWin=!p.open&&o===winner&&vs.length>0;
      return `<button class="opt ${mine?"mine":""} ${isWin?"win":""}" data-i="${i}" data-o="${esc(o)}" ${p.open?"":"disabled"}>
        <span class="fill" style="transform:scaleX(${vs.length/max})"></span>
        <span class="in"><span>${isWin?"🏆 ":""}${esc(o)}${mine?" · your vote":""}</span><span class="ct">${vs.length}</span></span>
        ${vs.length?`<span class="who">${vs.map(v=>`<span class="tag">${esc(nameOf(v))}</span>`).join("")}</span>`:""}
      </button>`;}).join("")}
    <div class="wrap" style="margin-top:7px">
      <button class="btn sm ghost" data-share="${i}">Share invite</button>
      ${p.open?`<button class="btn sm ghost" data-close="${i}">Close poll</button>`
        :embedded?`<button class="btn sm" data-cal="${i}">Add "${esc(winner)}" to Calendar</button>`:""}
    </div>
    <p class="note" style="margin-top:8px">${tot} vote${tot!==1?"s":""}${p.open?" · tap an option to vote":" · winner: "+esc(winner)}</p>
  </div>`;
}
function wireCard(p,i){
  const el=$("#poll"+i);if(!el)return;
  el.querySelectorAll(".opt").forEach(b=>b.onclick=async()=>{
    if(!p.open)return;
    p.votes=p.votes||{};p.votes[myId()]=b.dataset.o;
    await persist(p);render();toast("Vote saved ✓");
  });
  const cl=el.querySelector("[data-close]");if(cl)cl.onclick=async()=>{p.open=false;await persist(p);render();toast("Poll closed");};
  const sh=el.querySelector("[data-share]");if(sh)sh.onclick=async()=>{
    const c=counts(p);
    const txt=`🗳️ ${p.question}\n${p.options.map(o=>`· ${o} (${c[o].length})`).join("\n")}\n\nVote in Kinetik — Plans. People. Play.`;
    if(navigator.share){try{await navigator.share({text:txt});return;}catch(e){}}
    try{await navigator.clipboard.writeText(txt);toast("Invite copied ✓");}catch(e){toast("Copy failed");}
  };
  const ca=el.querySelector("[data-cal]");if(ca)ca.onclick=()=>{
    const c=counts(p);const winner=p.options.reduce((w,o)=>c[o].length>((c[w]||[]).length)?o:w,p.options[0]);
    const d=new Date();d.setDate(d.getDate()+((5-d.getDay()+7)%7||7)); /* next Friday default */
    parent.postMessage({type:"ADD_TO_CALENDAR",payload:{title:p.question+" — "+winner,date:d.toISOString().slice(0,10),startTime:"19:00",endTime:"21:00"}},"*");
  };
}
function renderCreate(B){
  let opts=["",""];
  const draw=()=>{
    B.innerHTML=`<div class="card"><div class="lbl">New poll</div>
    <input class="fld" id="q" placeholder="Question — e.g. Padel this Friday?">
    <div class="lbl" style="margin-top:6px">Options</div>
    <div id="opts">${opts.map((o,i)=>`<input class="fld" data-i="${i}" placeholder="Option ${i+1} — e.g. Fri 8pm" value="${esc(o)}">`).join("")}</div>
    <button class="btn sm ghost" id="addO">+ Option</button>
    <div class="wrap" style="margin-top:13px"><button class="btn" id="mk">Create poll</button><button class="btn ghost" id="cx">Cancel</button></div></div>`;
    B.querySelectorAll("#opts .fld").forEach(f=>f.oninput=()=>{opts[+f.dataset.i]=f.value;});
    $("#addO").onclick=()=>{opts=B.q?opts:opts;opts.push("");const q=$("#q").value;draw();$("#q").value=q;};
    $("#cx").onclick=()=>{creating=false;render();};
    $("#mk").onclick=async()=>{
      const q=$("#q").value.trim(),os=opts.map(o=>o.trim()).filter(Boolean);
      if(!q||os.length<2)return toast("Need a question + 2 options");
      const p={question:q,options:os,votes:{},open:true,createdBy:myId()};
      polls.unshift(p);await persist(p);creating=false;render();toast("Poll created ✓");
    };
  };
  draw();
}

/* ---- boot ---- */
setTimeout(()=>{if(!embedded){
  if(matchMedia("(prefers-color-scheme: light)").matches)document.documentElement.dataset.theme="light";
  load().then(render);
}},650);
</script>
</body>
</html>
